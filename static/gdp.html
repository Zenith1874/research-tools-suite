<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>中美 GDP | 研究工作台</title><link rel="stylesheet" href="/research-nav.css">
<script src="/vendor/chart.umd.min.js"></script><style>
:root{color-scheme:dark}body{margin:0;background:#07111f;color:#dce8f6;font:14px system-ui}.wrap{max-width:1380px;margin:auto;padding:28px 22px 60px}h1{font-size:28px;margin:0 0 8px}.muted{color:#8fa4bd}.tabs,.controls{display:flex;gap:8px;flex-wrap:wrap;margin:22px 0}.tabs button,.controls button,select,input{background:#0d1b2d;color:#dce8f6;border:1px solid #263b55;border-radius:8px;padding:9px 13px}.tabs button.active,.controls button.active{background:#1666d8;border-color:#4a94ff}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.card{background:#0b1829;border:1px solid #213751;border-radius:12px;padding:18px}.wide{grid-column:1/-1}.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.kpi{background:#0e2035;padding:14px;border-radius:9px}.kpi strong{font-size:23px;display:block;margin-top:6px}.chart{height:390px}.region-layout{display:grid;grid-template-columns:minmax(360px,.85fr) minmax(500px,1.15fr);gap:16px}table{width:100%;border-collapse:collapse}th,td{padding:9px;border-bottom:1px solid #1b3048;text-align:right}th:first-child,td:first-child{text-align:left}tbody tr{cursor:pointer}tbody tr:hover,tbody tr.selected{background:#123052}.notice{padding:16px;border:1px solid #805f1b;background:#2c240e;border-radius:9px;color:#f6d77c}.hidden{display:none}@media(max-width:800px){.grid,.region-layout,.kpis{grid-template-columns:1fr}.chart{height:320px}}
</style></head><body><main class="wrap"><h1>中美 GDP</h1><p class="muted">全国规模与增长 · 中国省级 · 美国州级。不同币种、价格口径与地区核算制度不混为同一指标。</p>
<div class="tabs"><button data-tab="national" class="active">中美全国</button><button data-tab="cn">中国省级</button><button data-tab="us">美国州级</button><button id="update">更新官方数据</button></div>
<section id="national"><div class="kpis"><div class="kpi">中国 GDP（现价美元）<strong id="cnKpi">—</strong><span id="cnPeriod" class="muted"></span></div><div class="kpi">美国 GDP（现价美元）<strong id="usKpi">—</strong><span id="usPeriod" class="muted"></span></div><div class="kpi">中美规模比<strong id="ratioKpi">—</strong><span class="muted">同年现价美元直接比较</span></div></div><div class="grid" style="margin-top:16px"><div class="card wide"><h3>GDP 规模历史</h3><div class="controls"><button id="linear" class="active">线性轴</button><button id="log">对数轴</button></div><div class="chart"><canvas id="nationalChart"></canvas></div></div><div class="card wide"><h3>名义美元 GDP 年增长</h3><p class="muted">受本币名义增长和汇率共同影响，不等同于官方实际 GDP 增速。</p><div class="chart"><canvas id="growthChart"></canvas></div></div></div></section>
<section id="regions" class="hidden"><div id="cnNotice" class="notice hidden"></div><div class="controls"><label>年份 <select id="year"></select></label><label>指标 <select id="metric"><option value="nominal_gdp">名义 GDP</option><option value="real_gdp">实际 GDP</option><option value="real_growth">实际 GDP 增速</option></select></label><input id="search" placeholder="搜索省/州"></div><div class="region-layout"><div class="card"><h3 id="rankTitle">地区排行</h3><table><thead><tr><th>地区</th><th>数值</th></tr></thead><tbody id="ranking"></tbody></table></div><div class="card"><h3 id="historyTitle">点击地区查看历史</h3><div class="chart"><canvas id="regionChart"></canvas></div></div></div></section>
<div class="card wide" style="margin-top:16px"><h3>口径与覆盖</h3><div id="methods" class="muted">加载中…</div></div></main><script src="/research-nav.js"></script><script>
let payload,tab='national',nationalChart,growthChart,regionChart,selected=null;
const colors={CN:'#27d3b2',US:'#5795ff'};const money=v=>v==null?'—':(v/1e12).toFixed(2)+' 万亿美元';
function chart(canvas,config){return new Chart(canvas,config)}function lineOptions(yType='linear'){return{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},scales:{x:{ticks:{color:'#8fa4bd',maxTicksLimit:12},grid:{color:'#14263a'}},y:{type:yType,ticks:{color:'#8fa4bd'},grid:{color:'#14263a'}}},plugins:{legend:{labels:{color:'#cbd8e6'}}}}}
function drawNational(type='linear'){nationalChart?.destroy();growthChart?.destroy();
const pick=(rows,y)=>{const hit=rows.find(x=>x.period===y);return hit?hit.value:null;};
const years=[...new Set([...payload.national.CN.series,...payload.national.US.series].map(x=>x.period))].sort();
const ds=c=>({label:c==='CN'?'中国':'美国',data:years.map(y=>{const v=pick(payload.national[c].series,y);return v==null?null:v/1e12;}),borderColor:colors[c],pointRadius:0,tension:.15,spanGaps:false});
nationalChart=chart(document.getElementById('nationalChart'),{type:'line',data:{labels:years,datasets:[ds('CN'),ds('US')]},options:lineOptions(type)});
const gyears=[...new Set([...payload.national.CN.growth,...payload.national.US.growth].map(x=>x.period))].sort();
const gds=c=>({label:c==='CN'?'中国':'美国',data:gyears.map(y=>pick(payload.national[c].growth,y)),borderColor:colors[c],pointRadius:0,tension:.15,spanGaps:false});
growthChart=chart(document.getElementById('growthChart'),{type:'line',data:{labels:gyears,datasets:[gds('CN'),gds('US')]},options:lineOptions()});}
function regionRows(country,metric){const base=payload.regions[country];if(metric!=='real_growth')return base.filter(x=>x.indicator_code===metric);const out=[];const grouped={};base.filter(x=>x.indicator_code==='real_gdp').forEach(x=>(grouped[x.region_code]??=[]).push(x));Object.values(grouped).forEach(a=>{a.sort((x,y)=>x.period.localeCompare(y.period));for(let i=1;i<a.length;i++)if(a[i-1].value)out.push({...a[i],indicator_code:'real_growth',value:(a[i].value/a[i-1].value-1)*100,unit:'%'});});return out;}
function drawRegions(){const country=tab==='cn'?'CN':'US',metric=document.getElementById('metric').value,year=document.getElementById('year').value,q=document.getElementById('search').value.toLowerCase();const all=regionRows(country,metric),rows=all.filter(x=>x.period===year&&x.region_name.toLowerCase().includes(q)).sort((a,b)=>b.value-a.value);document.getElementById('ranking').innerHTML=rows.map(x=>`<tr data-code="${x.region_code}" class="${selected===x.region_code?'selected':''}"><td>${x.region_name}</td><td>${metric==='real_growth'?x.value.toFixed(2)+'%':x.value.toLocaleString()}</td></tr>`).join('');if(!selected&&rows[0])selected=rows[0].region_code;const history=all.filter(x=>x.region_code===selected).sort((a,b)=>a.period.localeCompare(b.period));document.getElementById('historyTitle').textContent=(history[0]?.region_name||'点击地区')+' · 历史';regionChart?.destroy();regionChart=chart(document.getElementById('regionChart'),{type:'line',data:{labels:history.map(x=>x.period),datasets:[{label:metric==='real_growth'?'实际增速 %':metric==='real_gdp'?'实际 GDP（百万链式美元）':'名义 GDP（百万美元）',data:history.map(x=>x.value),borderColor:'#27d3b2',pointRadius:2}]},options:lineOptions()});}
function switchTab(next){tab=next;document.querySelectorAll('[data-tab]').forEach(b=>b.classList.toggle('active',b.dataset.tab===next));document.getElementById('national').classList.toggle('hidden',next!=='national');document.getElementById('regions').classList.toggle('hidden',next==='national');if(next!=='national'){const c=next==='cn'?'CN':'US',years=payload.coverage[c].years;document.getElementById('year').innerHTML=years.map(y=>`<option>${y}</option>`).join('');document.getElementById('cnNotice').classList.toggle('hidden',next!=='cn'||payload.regions.CN.length>0);document.getElementById('cnNotice').textContent=payload.china_region_source.message;selected=null;drawRegions();}}
fetch('/api/gdp/data').then(r=>r.json()).then(p=>{payload=p;for(const c of ['CN','US']){const x=p.national[c].latest;document.getElementById(c.toLowerCase()+'Kpi').textContent=money(x?.value);document.getElementById(c.toLowerCase()+'Period').textContent=x?.period||'';}const a=p.national.CN.latest,b=p.national.US.latest;document.getElementById('ratioKpi').textContent=a&&b?(a.value/b.value*100).toFixed(1)+'%':'—';document.getElementById('methods').innerHTML=`全国：${p.methods.national}<br>美国州级：${p.methods.US}<br>覆盖：全国 ${p.coverage.national_start}–${p.coverage.national_end}；美国 ${p.coverage.US.regions} 个州级地区，${p.coverage.US.years.at(-1)||'—'}–${p.coverage.US.years[0]||'—'}。`;drawNational();});
document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));document.getElementById('linear').onclick=()=>drawNational('linear');document.getElementById('log').onclick=()=>drawNational('logarithmic');['year','metric'].forEach(id=>document.getElementById(id).onchange=()=>{selected=null;drawRegions()});document.getElementById('search').oninput=drawRegions;document.getElementById('ranking').onclick=e=>{const tr=e.target.closest('tr');if(tr){selected=tr.dataset.code;drawRegions()}};document.getElementById('update').onclick=()=>fetch('/api/gdp/update',{method:'POST'}).then(r=>r.json()).then(()=>alert('更新任务已启动，请稍后刷新'));
</script></body></html>
