<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>宏观统计分析</title><script src="/vendor/react.min.js"></script><script src="/vendor/react-dom.min.js"></script><script src="/vendor/babel.min.js"></script>
<style>
:root{--bg:#07111f;--panel:#0d1728;--panel2:#111d31;--bd:#22324b;--text:#e5edf7;--muted:#8ea0b8;--blue:#4f8fff;--cyan:#00d4aa;--gold:#f5a623;--pink:#ff5b78}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,"Segoe UI","Microsoft YaHei",sans-serif}.wrap{max-width:1380px;margin:auto;padding:20px}h1{font-size:21px;margin:0}.sub,.meta,.note{color:var(--muted);font-size:11px;line-height:1.7}.tabs{display:flex;gap:7px;margin:18px 0}.tabs button{border:1px solid var(--bd);background:var(--panel);color:var(--muted);padding:9px 18px;border-radius:6px;cursor:pointer}.tabs button.on{color:#fff;border-color:var(--blue);background:#14294a}.section-title{font-size:15px;margin:20px 0 10px}.cards{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.card{border:1px solid var(--bd);background:var(--panel);border-radius:8px;padding:14px;min-width:0}.card h2{font-size:13px;margin:0 0 8px}.conclusion{font-size:18px;font-weight:700;line-height:1.45;min-height:52px}.badge{font-size:9px;border:1px solid #178b78;color:#8fe3cf;border-radius:4px;padding:1px 5px;margin-left:5px}.badge.bad{border-color:#9b6b20;color:#ffd28a}.chart{width:100%;height:190px;margin-top:12px}.axis{font-size:9px;fill:#8ea0b8}.legend{font-size:10px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap}.legend i{display:inline-block;width:12px;height:3px;margin-right:4px}.table-wrap{overflow:auto;margin-top:10px}table{border-collapse:collapse;width:100%;font-size:10px}th,td{padding:7px;border-bottom:1px solid var(--bd);text-align:left;white-space:nowrap}th{color:var(--muted)}.guard{color:#ffd28a}.caveats{margin:8px 0;color:#aab8ca;font-size:9px;line-height:1.55}.disclaimer{margin-top:10px;padding-top:8px;border-top:1px solid var(--bd);color:#70839d;font-size:9px}.top{display:flex;justify-content:space-between;gap:14px;align-items:flex-start}.stamp{text-align:right}.wide{grid-column:span 2}@media(max-width:1000px){.cards{grid-template-columns:repeat(2,1fr)}}@media(max-width:680px){.wrap{padding:13px}.cards{grid-template-columns:1fr}.wide{grid-column:auto}.top{display:block}.stamp{text-align:left;margin-top:5px}}
</style><link rel="stylesheet" href="/research-nav.css"><script src="/research-nav.js" defer></script></head><body><div id="root"></div>
<script type="text/babel">
const {useEffect,useState}=React;const COLORS=['#4f8fff','#00d4aa','#f5a623','#ff5b78','#a78bfa'];
function fmt(v,d=2){return v==null?'—':Number(v).toLocaleString('zh-CN',{maximumFractionDigits:d,minimumFractionDigits:d})}
function linesFrom(rows){if(!rows||rows.length<2)return null;const numeric=rows.filter(r=>typeof r.value==='number'&&!String(r.period).match(/^\d+m$/));if(numeric.length<2)return null;const W=620,H=190,L=43,R=8,T=12,B=24,ts=numeric.map(r=>Date.parse(String(r.period).length===7?r.period+'-01':r.period));if(ts.some(Number.isNaN))return null;const vals=numeric.map(r=>r.value),mn=Math.min(...vals),mx=Math.max(...vals),pad=(mx-mn||1)*.08,lo=mn-pad,hi=mx+pad;const sx=t=>L+(W-L-R)*(t-ts[0])/Math.max(1,ts.at(-1)-ts[0]),sy=v=>T+(H-T-B)*(1-(v-lo)/(hi-lo));const d=numeric.map((r,i)=>(i?'L':'M')+sx(ts[i]).toFixed(1)+','+sy(r.value).toFixed(1)).join(' ');return {W,H,L,R,T,B,ts,numeric,lo,hi,sx,sy,d}}
function LineChart({rows,threshold,recession=false,multi=false,keys=null}){if(keys&&keys.length){const valid=(rows||[]).filter(r=>keys.some(k=>typeof r[k.key]==='number'));if(valid.length<2)return null;const base=linesFrom(valid.map(r=>({period:r.period,value:keys.map(k=>r[k.key]).find(v=>typeof v==='number')})));if(!base)return null;const vals=valid.flatMap(r=>keys.map(k=>r[k.key]).filter(v=>typeof v==='number')),lo=Math.min(...vals),hi=Math.max(...vals),sy=v=>base.T+(base.H-base.T-base.B)*(1-(v-lo)/(hi-lo||1));const path=kk=>valid.filter(r=>typeof r[kk]==='number').map((r,i)=>(i?'L':'M')+base.sx(Date.parse(r.period)).toFixed(1)+','+sy(r[kk]).toFixed(1)).join(' ');return <><svg viewBox={`0 0 ${base.W} ${base.H}`} className="chart">{keys.map((k,i)=><path key={k.key} d={path(k.key)} fill="none" stroke={k.color||COLORS[i%COLORS.length]} strokeWidth="2"/>)}<text x={base.L} y={base.H-5} className="axis">{valid[0].period}</text><text x={base.W-base.R} y={base.H-5} textAnchor="end" className="axis">{valid.at(-1).period}</text></svg><div className="legend">{keys.map((k,i)=><span key={k.key}><i style={{background:k.color||COLORS[i%COLORS.length]}}/>{k.label}</span>)}</div></>}if(multi){const valid=(rows||[]).filter(r=>typeof r.china==='number'&&typeof r.us==='number');if(valid.length<2)return null;const base=linesFrom(valid.map(r=>({period:r.period,value:r.china})));if(!base)return null;const vals=valid.flatMap(r=>[r.china,r.us]),lo=Math.min(...vals),hi=Math.max(...vals),sy=v=>base.T+(base.H-base.T-base.B)*(1-(v-lo)/(hi-lo||1));const path=k=>valid.map((r,i)=>(i?'L':'M')+base.sx(Date.parse(r.period)).toFixed(1)+','+sy(r[k]).toFixed(1)).join(' ');return <><svg viewBox={`0 0 ${base.W} ${base.H}`} className="chart"><path d={path('china')} fill="none" stroke={COLORS[0]} strokeWidth="2"/><path d={path('us')} fill="none" stroke={COLORS[1]} strokeWidth="2"/></svg><div className="legend"><span><i style={{background:COLORS[0]}}/>中国</span><span><i style={{background:COLORS[1]}}/>美国</span></div></>};const c=linesFrom(rows);if(!c)return null;return <svg viewBox={`0 0 ${c.W} ${c.H}`} className="chart">{recession&&c.numeric.map((r,i)=>r.recession?<rect key={i} x={c.sx(c.ts[i])} y={c.T} width={Math.max(2,(c.W-c.L-c.R)/c.numeric.length)} height={c.H-c.T-c.B} fill="rgba(142,160,184,.15)"/>:null)}{threshold!=null&&<line x1={c.L} x2={c.W-c.R} y1={c.sy(threshold)} y2={c.sy(threshold)} stroke={COLORS[3]} strokeDasharray="5,4"/>}<path d={c.d} fill="none" stroke={COLORS[0]} strokeWidth="2"/><text x={c.L} y={c.H-5} className="axis">{c.numeric[0].period}</text><text x={c.W-c.R} y={c.H-5} textAnchor="end" className="axis">{c.numeric.at(-1).period}</text></svg>}
function CorrBars({rows}){if(!rows||!rows.length)return null;const W=620,H=180,L=35,R=8,T=10,B=24,max=Math.max(.01,...rows.map(r=>Math.abs(r.value))),zero=(T+H-B)/2,step=(W-L-R)/rows.length;return <svg viewBox={`0 0 ${W} ${H}`} className="chart"><line x1={L} x2={W-R} y1={zero} y2={zero} stroke="#70839d"/>{rows.map((r,i)=>{const h=Math.abs(r.value)/max*(H-B-T)/2,x=L+i*step+2,y=r.value>=0?zero-h:zero;return <g key={i}><rect x={x} y={y} width={Math.max(3,step-4)} height={h} fill={r.value>=0?COLORS[0]:COLORS[3]}/><text x={x+step/2-2} y={H-7} textAnchor="middle" className="axis">{r.period}</text></g>})}</svg>}
function InversionTable({value}){if(!value||!value.episodes)return null;return <div className="table-wrap"><table><thead><tr><th>开始</th><th>结束</th><th>月数</th><th>最深</th><th>6月</th><th>12月</th><th>18月</th><th>24月</th></tr></thead><tbody>{value.episodes.map((e,i)=><tr key={i}><td>{e.start}</td><td>{e.end}</td><td>{e.months}</td><td>{fmt(e.depth)}</td>{['6','12','18','24'].map(h=><td key={h}>{e.recession_after[h]?'是':'否'}</td>)}</tr>)}</tbody></table></div>}
function CurveTable({value}){if(!value)return null;return <div className="table-wrap"><table><thead><tr><th>期限</th><th>{value.periods.latest}</th><th>{value.periods.m3_ago}</th><th>{value.periods.y1_ago}</th></tr></thead><tbody>{value.tenors.map((t,i)=><tr key={t}><td>{t}</td><td>{fmt(value.latest[i])}%</td><td>{fmt(value.m3_ago[i])}%</td><td>{fmt(value.y1_ago[i])}%</td></tr>)}</tbody></table></div>}
function StructureTable({value}){if(!value||!value.components)return null;return <div className="table-wrap"><table><thead><tr><th>类别</th><th>占贷款总量</th><th>余额(万亿元)</th></tr></thead><tbody>{value.components.map(x=><tr key={x.label}><td>{x.label}</td><td>{fmt(x.value)}%</td><td>{fmt(x.amount)}</td></tr>)}</tbody></table></div>}
function DependencyTable({value}){if(!value)return null;const combined=new Map((value.combined_share||[]).map(x=>[x.period,x.value]));return <div className="table-wrap"><table><thead><tr><th>年度</th><th>占基金收入</th><th>占两本账收入</th></tr></thead><tbody>{(value.fund_share||[]).map(x=><tr key={x.period}><td>{x.period}</td><td>{fmt(x.value)}%</td><td>{fmt(combined.get(x.period))}%</td></tr>)}</tbody></table></div>}
function BeveridgeScatter({value}){if(!value||!value.points||value.points.length<2)return null;const pts=value.points,recent=value.recent||[],latest=value.latest,W=620,H=230,L=46,R=12,T=14,B=30;const us=pts.map(p=>p.u),vs=pts.map(p=>p.v);let ux0=Math.min(...us),ux1=Math.max(...us),vy0=Math.min(...vs),vy1=Math.max(...vs);const upad=(ux1-ux0||1)*.06,vpad=(vy1-vy0||1)*.08;ux0-=upad;ux1+=upad;vy0-=vpad;vy1+=vpad;const sx=u=>L+(W-L-R)*(u-ux0)/(ux1-ux0),sy=v=>T+(H-T-B)*(1-(v-vy0)/(vy1-vy0));const recentSet=new Set(recent.map(p=>p.period));const older=pts.filter(p=>!recentSet.has(p.period));const rpath=recent.map((p,i)=>(i?'L':'M')+sx(p.u).toFixed(1)+','+sy(p.v).toFixed(1)).join(' ');return <><svg viewBox={`0 0 ${W} ${H}`} className="chart">{older.map((p,i)=><circle key={i} cx={sx(p.u)} cy={sy(p.v)} r="2.2" fill="rgba(142,160,184,.38)"/>)}<path d={rpath} fill="none" stroke="#00d4aa" strokeWidth="1.4" opacity=".85"/>{recent.map((p,i)=><circle key={'r'+i} cx={sx(p.u)} cy={sy(p.v)} r="2.8" fill="#00d4aa"/>)}{latest&&<g><circle cx={sx(latest.u)} cy={sy(latest.v)} r="4.6" fill="none" stroke="#f5a623" strokeWidth="2"/><text x={Math.min(sx(latest.u)+7,W-52)} y={sy(latest.v)-7} className="axis" fill="#f5a623">{latest.period}</text></g>}<text x={L} y={H-4} className="axis">失业率 {ux0.toFixed(1)}%</text><text x={W-R} y={H-4} textAnchor="end" className="axis">{ux1.toFixed(1)}%</text><text x={L-4} y={T+8} textAnchor="end" className="axis">{vy1.toFixed(1)}%</text><text x={L-4} y={H-B} textAnchor="end" className="axis">{vy0.toFixed(1)}%</text></svg><div className="legend"><span><i style={{background:'rgba(142,160,184,.6)'}}/>2000年以来</span><span><i style={{background:'#00d4aa'}}/>最近24个月(连线)</span><span><i style={{background:'#f5a623'}}/>最新点</span><span style={{color:'var(--muted)'}}>横轴=失业率 · 纵轴=空缺率</span></div></>}
function Card({item}){const status=item.data_status||'missing',isCorr=item.title.includes('领先滞后'),isSahm=item.title==='Sahm Rule',isInv=item.title.includes('倒挂经验'),isHousing=item.title.includes('中美实际房价'),isBurdenCompare=item.title.includes('中美付息负担对照'),isDiff=item.title.includes('扩散指数'),isCurve=item.title.includes('曲线形态'),isStructure=item.title.includes('存量结构'),isDependency=item.title.includes('土地财政依赖度'),isBev=item.title.includes('贝弗里奇'),th=isSahm?.5:isDiff?50:null;return <article className={'card '+(isInv||isDependency||isBev?'wide':'')}><h2>{item.title}<span className={'badge '+(status==='derived'?'':'bad')}>{status}</span></h2><div className={'conclusion '+(status!=='derived'?'guard':'')}>{item.conclusion}</div>{isBev?<BeveridgeScatter value={item.value}/>:isInv?<InversionTable value={item.value}/>:isCurve?<CurveTable value={item.value}/>:isStructure?<StructureTable value={item.value}/>:isDependency?<DependencyTable value={item.value}/>:isCorr?<CorrBars rows={item.series}/>:isHousing||isBurdenCompare?<LineChart rows={item.series} multi/>:item.compare_keys?<LineChart rows={item.series} keys={item.compare_keys}/>:<LineChart rows={item.series} threshold={th} recession={isSahm}/>}<div className="meta">方法：{item.method}<br/>样本：{item.sample_start||'—'} 至 {item.sample_end||'—'} · N={item.n_obs}</div>{(item.caveats||[]).length>0&&<div className="caveats">{item.caveats.map((c,i)=><div key={i}>· {c}</div>)}</div>}<div className="disclaimer">统计关联不代表因果；样本窗口见本卡标注。</div></article>}
function App(){const [p,setP]=useState(null),[tab,setTab]=useState('china');useEffect(()=>{fetch('/api/analytics').then(r=>r.json()).then(setP)},[]);if(!p)return <div className="wrap">加载统计分析…</div>;const section=p[tab],items=[...(section.positioning||[]),...(section.analyses||[])];return <main className="wrap"><div className="top"><div><h1>宏观统计分析</h1><div className="sub">定位 · 动量 · 领先滞后相关 · 历史经验；只使用官方数据与可审计派生公式</div></div><div className="stamp meta">生成：{p.generated_at}<br/>v1不含预测、VAR、Granger或协整</div></div><div className="tabs">{[['china','中国'],['us','美国'],['cross','中美对照'],['housing','房价'],['debt','财政债务']].map(([k,v])=><button className={tab===k?'on':''} onClick={()=>setTab(k)} key={k}>{v}</button>)}</div><div className="cards">{items.map((x,i)=><Card item={x} key={x.title+i}/>)}</div>{(section.notes||[]).map((n,i)=><div className="note" key={'s'+i}>· {n}</div>)}<div className="note" style={{marginTop:14}}>{p.notes.map((n,i)=><div key={i}>· {n}</div>)}</div></main>}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
