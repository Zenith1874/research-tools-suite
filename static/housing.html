<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>中国房价 · 70城 + BIS</title>
<script src="/vendor/react.min.js"></script>
<script src="/vendor/react-dom.min.js"></script>
<script src="/vendor/babel.min.js"></script>
<style>
:root{--bg:#07111f;--panel:#0d1728;--panel2:#111d31;--bd:#22324b;--text:#e5edf7;--muted:#8ea0b8;--dim:#b8c6d8;--blue:#4f8fff;--green:#00d4aa;--red:#ff5b78;--yellow:#f5a623}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,"Segoe UI","Microsoft YaHei",sans-serif}
.wrap{max-width:1240px;margin:0 auto;padding:20px}.top{display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap}
h1{font-size:20px;margin:0 0 6px}.sub,.muted{color:var(--muted);font-size:12px;line-height:1.7}
.actions{display:flex;gap:8px;flex-wrap:wrap}.btn{min-height:34px;background:var(--panel2);border:1px solid var(--bd);color:var(--text);border-radius:6px;padding:7px 12px;text-decoration:none;font:inherit;font-size:12px;cursor:pointer;display:inline-flex;align-items:center}
.btn:hover{border-color:var(--blue)}.btn.primary{background:rgba(79,143,255,.15);border-color:rgba(79,143,255,.5)}.btn:disabled{opacity:.5}
.history-picker{display:inline-flex;align-items:center;gap:7px;color:var(--muted);font-size:12px}.history-picker select{min-height:34px;background:var(--panel2);border:1px solid var(--bd);color:var(--text);border-radius:6px;padding:6px 26px 6px 9px;font:inherit}
.city-controls{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin:12px 0}.city-chip{border:1px solid var(--bd);background:var(--panel2);color:var(--muted);border-radius:16px;padding:5px 10px;font:inherit;font-size:11px;cursor:pointer}.city-chip.active{border-color:var(--city-color);color:var(--text);box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--city-color) 35%,transparent)}.city-chip.active:before{content:'';display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--city-color);margin-right:5px}.city-chip.missing{opacity:.48;cursor:not-allowed;text-decoration:line-through}.city-chip.all{border-radius:5px}.control-help{font-size:11px;color:var(--muted)}
.banner{border:1px solid rgba(245,166,35,.45);background:var(--panel);border-radius:6px;padding:10px 12px;margin:12px 0;font-size:12px;color:#f8d89b}
.breadth{display:flex;gap:18px;background:var(--panel);border:1px solid var(--bd);border-radius:6px;padding:12px 16px;margin:14px 0;font-size:13px;flex-wrap:wrap;align-items:center}
.breadth b{font-size:20px}
.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin:14px 0}
.metric{background:var(--panel);border:1px solid var(--bd);border-radius:6px;padding:13px}
.metric-label{font-size:12px;color:var(--muted)}.metric-value{font-size:22px;font-weight:750;margin:6px 0;font-variant-numeric:tabular-nums}
.delta-up{color:var(--red)}.delta-down{color:var(--green)}
.metric-meta{font-size:11px;color:var(--muted);line-height:1.8}
.badge{display:inline-block;border:1px solid rgba(0,212,170,.55);border-radius:4px;padding:1px 6px;font-size:10px;color:#a9efd8}
.badge.listing{border-color:rgba(245,166,35,.65);color:#ffd58a;background:rgba(245,166,35,.08)}
.section{margin-top:28px;padding-top:18px;border-top:1px solid var(--bd)}.section h2{font-size:17px;margin:0 0 5px}.section-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
.notice{border-left:3px solid var(--yellow);background:rgba(245,166,35,.07);padding:9px 11px;margin:10px 0;color:#f8d89b;font-size:12px;line-height:1.7}
a.source-link{color:#9ec2ff;text-decoration:none}
.chart{margin:14px 0;background:var(--panel);border:1px solid var(--bd);border-radius:6px;padding:12px}
.chartsvg{width:100%;height:190px;display:block;cursor:crosshair}.chart-title{font-size:12px;color:var(--dim);margin-bottom:6px}
.tip{position:absolute;top:8px;transform:translateX(-50%);background:rgba(13,23,40,.96);border:1px solid var(--bd);border-radius:6px;padding:6px 10px;font-size:11px;line-height:1.7;pointer-events:none;white-space:nowrap;z-index:5}
.tip b{color:var(--dim);font-size:10px}.tip i{width:8px;height:8px;border-radius:2px;display:inline-block;margin-right:5px}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--dim);margin-top:6px}.legend span{display:inline-flex;align-items:center;gap:5px}.legend i{width:12px;height:3px;border-radius:2px;display:inline-block}
.table-title{font-size:12px;color:var(--dim);margin:14px 0 7px}.scroll{overflow:auto;border:1px solid rgba(34,50,75,.75);border-radius:6px;max-height:520px}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:680px}th,td{padding:7px 9px;border-bottom:1px solid rgba(34,50,75,.6);text-align:left}
th{color:var(--muted);font-weight:600;background:var(--panel);position:sticky;top:0}
td.num{text-align:right;font-variant-numeric:tabular-nums}
.empty{padding:16px;border:1px dashed var(--bd);border-radius:6px;color:var(--muted);font-size:12px}
@media(max-width:1000px){.grid{grid-template-columns:repeat(2,1fr)}}@media(max-width:640px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const {useEffect,useState}=React;
const FOCUS_CITIES=['北京','上海','广州','深圳','厦门','南京','合肥','常州','苏州','无锡'];
const CITY_COLORS={'北京':'#4f8fff','上海':'#ff5b6e','广州':'#f5a623','深圳':'#00d4aa','厦门':'#a974ff','南京':'#26c6da','合肥':'#ff8a50','常州':'#ec6fbe','苏州':'#9ccc65','无锡':'#8d9eff'};
function fmt(v,d=1){if(v===null||v===undefined)return '—';return Number(v).toLocaleString('zh-CN',{minimumFractionDigits:d,maximumFractionDigits:d})}
function Delta({v}){if(v===null||v===undefined)return null;const d=v-100;const cls=d>0?'delta-up':(d<0?'delta-down':'');return <span className={cls}>{d>0?'+':''}{d.toFixed(1)}%</span>}
function Pct({v}){if(v===null||v===undefined)return <span>—</span>;const n=Number(v),cls=n>0?'delta-up':(n<0?'delta-down':'');return <span className={cls}>{n>0?'+':''}{n.toFixed(2)}%</span>}
function mergeSeries(map){const byP={};Object.entries(map).forEach(([k,rows])=>(rows||[]).forEach(r=>{(byP[r.period]=byP[r.period]||{period:r.period})[k]=r.value}));return Object.values(byP).sort((a,b)=>a.period<b.period?-1:1)}
function historyMatrix(map,field,indexed=false){const byP={};Object.entries(map||{}).forEach(([city,rows])=>{const base=(rows||[]).find(r=>typeof r[field]==='number')?.[field];(rows||[]).forEach(r=>{if(typeof r[field]!=='number'||(indexed&&!base))return;(byP[r.period]=byP[r.period]||{period:r.period})[city]=indexed?Number((r[field]/base*100).toFixed(2)):r[field]})});return Object.values(byP).sort((a,b)=>a.period<b.period?-1:1)}
function Chart({title,data,series,unit='',digits=1,height=190}){
  const [hover,setHover]=useState(null);
  const pts=(data||[]).filter(d=>series.some(s=>typeof d[s.key]==='number'));
  if(pts.length<2)return <div className="empty">{title}：数据点不足(随月份累积)。</div>;
  const W=640,H=height,L=50,R=12,T=12,B=22,vals=[];
  series.forEach(s=>pts.forEach(d=>{if(typeof d[s.key]==='number')vals.push(d[s.key])}));
  let mn=Math.min(...vals),mx=Math.max(...vals);if(mn===mx){mn-=1;mx+=1}
  const sx=i=>L+(W-L-R)*(i/(pts.length-1)), sy=v=>T+(H-T-B)*(1-(v-mn)/(mx-mn));
  const pathOf=s=>{let dd='',pen=false;pts.forEach((d,i)=>{const v=d[s.key];if(typeof v==='number'){dd+=`${pen?'L':'M'}${sx(i).toFixed(1)},${sy(v).toFixed(1)} `;pen=true}else pen=false});return dd.trim()};
  const onMove=e=>{const r=e.currentTarget.getBoundingClientRect();const x=(e.clientX-r.left)/r.width*W;const i=Math.round((x-L)/(W-L-R)*(pts.length-1));setHover(Math.max(0,Math.min(pts.length-1,i)))};
  const hp=hover===null?null:pts[hover];
  const tipLeft=hover===null?0:Math.max(10,Math.min(90,sx(hover)/W*100));
  return <div className="chart"><div className="chart-title">{title}</div>
    <div style={{position:'relative'}}>
    <svg viewBox={`0 0 ${W} ${H}`} className="chartsvg" style={{height}} preserveAspectRatio="none" onMouseMove={onMove} onMouseLeave={()=>setHover(null)}>
      {[mn,(mn+mx)/2,mx].map((t,i)=><g key={i}><line x1={L} x2={W-R} y1={sy(t)} y2={sy(t)} stroke="rgba(34,50,75,.7)" strokeWidth="0.5"/><text x={L-6} y={sy(t)+3} fill="#8ea0b8" fontSize="9" textAnchor="end">{fmt(t,digits)}</text></g>)}
      {series.map(s=><path key={s.key} d={pathOf(s)} fill="none" stroke={s.color} strokeWidth="1.6"/>)}
      {hp&&<g><line x1={sx(hover)} x2={sx(hover)} y1={T} y2={H-B} stroke="#8ea0b8" strokeWidth="0.6" strokeDasharray="3,3"/>
        {series.map(s=>typeof hp[s.key]==='number'?<circle key={s.key} cx={sx(hover)} cy={sy(hp[s.key])} r="3.2" fill={s.color} stroke="#07111f" strokeWidth="1.2"/>:null)}</g>}
      <text x={L} y={H-6} fill="#8ea0b8" fontSize="9">{pts[0].period}</text>
      <text x={W-R} y={H-6} fill="#8ea0b8" fontSize="9" textAnchor="end">{pts[pts.length-1].period}</text>
    </svg>
    {hp&&<div className="tip" style={{left:tipLeft+'%'}}><b>{hp.period}</b>{series.map(s=>typeof hp[s.key]==='number'?<div key={s.key}><i style={{background:s.color}}/>{s.label}：{fmt(hp[s.key],digits)} {unit}</div>:null)}</div>}
    </div>
    <div className="legend">{series.map(s=><span key={s.key}><i style={{background:s.color}}/>{s.label}</span>)}{unit&&<span className="muted">单位：{unit}</span>}</div>
  </div>;
}
function ScatterChart({data}){
  const [hover,setHover]=useState(null),pts=data||[];
  if(!pts.length)return <div className="empty">暂无同月可比城市；缺失城市不会补零。</div>;
  const W=640,H=260,L=58,R=18,T=16,B=36,all=pts.flatMap(p=>[p.x,p.y]);
  let mn=Math.min(...all,0),mx=Math.max(...all,0);if(mn===mx){mn-=1;mx+=1}const pad=(mx-mn)*.08;mn-=pad;mx+=pad;
  const sx=v=>L+(W-L-R)*(v-mn)/(mx-mn),sy=v=>T+(H-T-B)*(1-(v-mn)/(mx-mn));
  const onMove=e=>{const r=e.currentTarget.getBoundingClientRect(),x=(e.clientX-r.left)/r.width*W,y=(e.clientY-r.top)/r.height*H;let best=null,bd=1e9;pts.forEach((p,i)=>{const d=(sx(p.x)-x)**2+(sy(p.y)-y)**2;if(d<bd){bd=d;best=i}});setHover(bd<900?best:null)};
  const hp=hover===null?null:pts[hover];
  return <div className="chart"><div className="chart-title">官方二手同比 vs 安居客挂牌同比（45°线表示完全一致）</div><div style={{position:'relative'}}>
    <svg viewBox={`0 0 ${W} ${H}`} className="chartsvg" style={{height:260}} preserveAspectRatio="none" onMouseMove={onMove} onMouseLeave={()=>setHover(null)}>
      {[mn,0,mx].map((v,i)=><g key={i}><line x1={L} x2={W-R} y1={sy(v)} y2={sy(v)} stroke="rgba(34,50,75,.7)" strokeWidth=".5"/><line y1={T} y2={H-B} x1={sx(v)} x2={sx(v)} stroke="rgba(34,50,75,.7)" strokeWidth=".5"/></g>)}
      <line x1={sx(mn)} y1={sy(mn)} x2={sx(mx)} y2={sy(mx)} stroke="#8ea0b8" strokeDasharray="5,4"/>
      {pts.map((p,i)=><circle key={p.city} cx={sx(p.x)} cy={sy(p.y)} r={hover===i?5:3.5} fill="var(--yellow)" stroke="#07111f" strokeWidth="1"/>)}
      <text x={(L+W-R)/2} y={H-7} fill="#8ea0b8" fontSize="10" textAnchor="middle">官方二手同比 %</text>
      <text x="10" y={(T+H-B)/2} fill="#8ea0b8" fontSize="10">挂牌同比 %</text>
    </svg>{hp&&<div className="tip" style={{left:Math.max(12,Math.min(88,sx(hp.x)/W*100))+'%'}}><b>{hp.city}</b><div>官方二手：{fmt(hp.x,2)}%</div><div>挂牌：{fmt(hp.y,2)}%</div></div>}
  </div></div>
}
function csvDownload(rows){
  const cols=[['city','城市'],['new_home_mom_idx','新房环比'],['new_home_yoy_idx','新房同比'],['second_home_mom_idx','二手环比'],['second_home_yoy_idx','二手同比']];
  const head=cols.map(c=>c[1]).join(',');
  const body=rows.map(r=>cols.map(([k])=>r[k]??'').join(',')).join('\n');
  const blob=new Blob(['﻿'+head+'\n'+body],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='housing_70city.csv';a.click();URL.revokeObjectURL(a.href);
}
function listingCsv(rows){
  const cols=[['city','城市'],['period','月份'],['avg_price','挂牌均价(元/㎡)'],['mom_pct','环比%'],['yoy_pct','同比%'],['data_status','状态'],['source_url','来源']];
  const body=rows.map(r=>cols.map(([k])=>r[k]??'').join(',')).join('\n');const blob=new Blob(['﻿'+cols.map(c=>c[1]).join(',')+'\n'+body],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='anjuke_listing_history_reference.csv';a.click();URL.revokeObjectURL(a.href);
}
function compareHistoryCsv(map){
  const rows=Object.values(map||{}).flat(),cols=[['city','城市'],['period','月份'],['official_second_yoy_pct','官方二手同比%'],['listing_yoy_pct','挂牌同比%'],['divergence','分歧(百分点)'],['data_status','状态']];
  const body=rows.map(r=>cols.map(([k])=>r[k]??'').join(',')).join('\n');const blob=new Blob(['﻿'+cols.map(c=>c[1]).join(',')+'\n'+body],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='housing_dual_basis_history.csv';a.click();URL.revokeObjectURL(a.href);
}
function App(){
  const [p,setP]=useState(null),[listing,setListing]=useState(null),[compare,setCompare]=useState(null),[msg,setMsg]=useState(null),[busy,setBusy]=useState(false),[listingBusy,setListingBusy]=useState(false),[historyCity,setHistoryCity]=useState('北京'),[visibleCities,setVisibleCities]=useState(null);
  async function load(){const [a,b,c]=await Promise.all([fetch('/api/housing/data'),fetch('/api/housing/anjuke'),fetch('/api/housing/compare')]);setP(await a.json());setListing(await b.json());setCompare(await c.json())}
  async function update(){
    setBusy(true);
    try{
      const r=await fetch('/api/housing/update',{method:'POST'});const j=await r.json();setMsg(j.message||j.status);
      const t=setInterval(async()=>{
        const js=await (await fetch('/api/jobs')).json();
        const job=js.jobs&&js.jobs.housing;
        if(job&&job.status!=='running'){clearInterval(t);setBusy(false);setMsg(job.status==='done'?'更新完成':'更新失败:'+(job.error||''));load()}
      },3000);
    }catch(e){setBusy(false);setMsg('请求失败:'+e)}
  }
  async function updateListing(){
    setListingBusy(true);try{const j=await (await fetch('/api/housing/anjuke/update',{method:'POST'})).json();setMsg(j.message||j.status);const t=setInterval(async()=>{const js=await (await fetch('/api/jobs')).json();const job=js.jobs&&js.jobs.anjuke;if(job&&job.status!=='running'){clearInterval(t);setListingBusy(false);setMsg(job.status==='done'?'挂牌价更新完成':'挂牌价更新失败:'+(job.error||''));load()}},3000)}catch(e){setListingBusy(false);setMsg('挂牌价请求失败:'+e)}
  }
  useEffect(()=>{load()},[]);
  if(!p)return <div className="wrap"><div className="empty">加载中…</div></div>;
  const b=p.breadth;
  const cityYoY=mergeSeries(Object.fromEntries(Object.entries(p.city_series||{}).map(([c,rows])=>[c,rows])));
  const bis=mergeSeries({real:(p.national||{}).QCNR628BIS||[],nominal:(p.national||{}).QCNN628BIS||[]});
  const historyCities=listing?.history_cities||[];
  const orderedHistoryCities=FOCUS_CITIES.filter(city=>historyCities.includes(city));
  const shownCities=(visibleCities===null?orderedHistoryCities:visibleCities.filter(city=>historyCities.includes(city)));
  const activeHistoryCity=historyCities.includes(historyCity)?historyCity:historyCities[0];
  const listingHistory=listing?.city_history?.[activeHistoryCity]||[];
  const allListingHistory=Object.values(listing?.city_history||{}).flat();
  const compareHistory=compare?.history_by_city?.[activeHistoryCity]||[];
  const citySeries=shownCities.map(city=>({key:city,label:city,color:CITY_COLORS[city]}));
  const compareCitySeries=shownCities.filter(city=>compare?.history_by_city?.[city]?.length).map(city=>({key:city,label:city,color:CITY_COLORS[city]}));
  const priceHistoryMatrix=historyMatrix(listing?.city_history,'avg_price');
  const priceIndexMatrix=historyMatrix(listing?.city_history,'avg_price',true);
  const divergenceHistoryMatrix=historyMatrix(compare?.history_by_city,'divergence');
  function toggleCity(city){if(!historyCities.includes(city))return;setVisibleCities(current=>{const base=current===null?orderedHistoryCities:current;if(base.includes(city))return base.length===1?base:base.filter(item=>item!==city);return FOCUS_CITIES.filter(item=>base.includes(item)||item===city)})}
  function showOnlyCity(city){if(!historyCities.includes(city))return;setVisibleCities([city]);setHistoryCity(city)}
  return <div className="wrap">
    <div className="top"><div><h1>中国房价</h1>
      <div className="sub">统计局 70 城商品住宅价格指数(月度,官方) + BIS 全国住宅价格指数(季度,2005起) · 最新期：{p.latest_period||'—'}
        {' · '}<a className="source-link" href={p.source_pages?.nbs} target="_blank" rel="noreferrer">统计局发布页</a></div></div>
      <div className="actions">
        <button className="btn primary" disabled={busy} onClick={update}>{busy?'更新中…':'更新数据'}</button>
        <button className="btn" disabled={listingBusy} onClick={updateListing}>{listingBusy?'挂牌更新中…':'更新挂牌参考'}</button>
        <a className="btn" href="/">首页</a></div></div>
    {msg&&<div className="banner">{msg}</div>}
    {(p.warnings||[]).map((w,i)=><div key={i} className="banner">{w}</div>)}
    {b&&<div className="breadth">
      <span>📉 70城新房环比({b.period})：</span>
      <span>上涨 <b className="delta-up">{b.up}</b> 城</span>
      <span>持平 <b>{b.flat}</b> 城</span>
      <span>下跌 <b className="delta-down">{b.down}</b> 城</span>
      <span className="muted">derived · {b.formula}</span>
    </div>}
    <div className="grid">{(p.cards||[]).map(c=><div className="metric" key={c.label}>
      <div className="metric-label">{c.label} <span className="badge">{c.data_status}</span></div>
      <div className="metric-value">{fmt(c.value)} <Delta v={c.value}/></div>
      <div className="metric-meta">
        新房同比 {fmt(c.extra?.['新房同比'])} <Delta v={c.extra?.['新房同比']}/><br/>
        二手环比 {fmt(c.extra?.['二手环比'])} <Delta v={c.extra?.['二手环比']}/> · 二手同比 {fmt(c.extra?.['二手同比'])} <Delta v={c.extra?.['二手同比']}/><br/>
        {c.source_url&&<a className="source-link" href={c.source_url} target="_blank" rel="noreferrer">月报原文</a>}
      </div>
    </div>)}</div>
    <Chart title="BIS 中国住宅价格指数(2010=100,季度,2005 起)" data={bis} series={[{key:'real',label:'实际(剔通胀)',color:'var(--blue)'},{key:'nominal',label:'名义',color:'var(--yellow)'}]} unit=""/>
    <Chart title="一线城市新房价格同比(上年同月=100,随月份累积)" data={cityYoY} series={[{key:'北京',label:'北京',color:'var(--blue)'},{key:'上海',label:'上海',color:'var(--red)'},{key:'广州',label:'广州',color:'var(--yellow)'},{key:'深圳',label:'深圳',color:'var(--green)'}]} unit=""/>
    <div className="table-title">70 城全表({p.latest_period}) <a className="source-link" style={{cursor:'pointer'}} onClick={()=>csvDownload(p.city_table||[])}>⬇ CSV</a></div>
    <div className="scroll"><table><thead><tr><th>城市</th><th>新房环比</th><th>新房同比</th><th>二手环比</th><th>二手同比</th></tr></thead>
      <tbody>{(p.city_table||[]).map(r=><tr key={r.city}>
        <td>{r.city}</td>
        <td className="num">{fmt(r.new_home_mom_idx)} <Delta v={r.new_home_mom_idx}/></td>
        <td className="num">{fmt(r.new_home_yoy_idx)} <Delta v={r.new_home_yoy_idx}/></td>
        <td className="num">{fmt(r.second_home_mom_idx)} <Delta v={r.second_home_mom_idx}/></td>
        <td className="num">{fmt(r.second_home_yoy_idx)} <Delta v={r.second_home_yoy_idx}/></td>
      </tr>)}</tbody></table></div>
    <div className="muted" style={{marginTop:10}}>{(p.notes||[]).map((n,i)=><div key={i}>· {n}</div>)}</div>
    <section className="section"><div className="section-head"><div><h2>挂牌价参考（安居客） <span className="badge listing">挂牌价·参考</span></h2><div className="sub">安居客，非官方口径 · 最新期：{listing?.latest_period||'—'} · 历史覆盖 {listing?.coverage?.earliest||'—'} 至 {listing?.coverage?.latest||'—'}</div></div><div className="actions"><label className="history-picker">单城明细<select value={activeHistoryCity||''} onChange={e=>setHistoryCity(e.target.value)}>{orderedHistoryCities.map(city=><option key={city} value={city}>{city}</option>)}</select></label><a className="btn" style={{cursor:'pointer'}} onClick={()=>listingCsv(allListingHistory)}>⬇ 历史 CSV</a></div></div>
      <div className="notice">挂牌价是卖方要价，不等于成交价；所有数据均为“挂牌价·参考”，独立保存在本机数据库，不进入公开仓库。</div>
      {(listing?.warnings||[]).map((w,i)=><div className="banner" key={i}>{w}</div>)}
      <div className="grid">{(listing?.cards||[]).map(c=><div className="metric" key={c.city}><div className="metric-label">{c.city} <span className="badge listing">{c.data_status==='listing_reference'?'挂牌价·参考':'missing'}</span></div><div className="metric-value">{c.avg_price==null?'—':fmt(c.avg_price,0)} <span style={{fontSize:12}}>元/㎡</span></div><div className="metric-meta">环比 <Pct v={c.mom_pct}/> · 同比 <Pct v={c.yoy_pct}/><br/>{c.source_url&&<a className="source-link" href={c.source_url} target="_blank" rel="noreferrer">安居客原页</a>}</div></div>)}</div>
      <div className="table-title">点名十城历史图 · 已入库 {orderedHistoryCities.length}/10 城</div><div className="city-controls"><button className="city-chip all" onClick={()=>setVisibleCities(null)}>全部显示</button>{FOCUS_CITIES.map(city=>{const available=historyCities.includes(city),active=shownCities.includes(city),points=listing?.city_history?.[city]?.length||0;return <button key={city} disabled={!available} aria-pressed={active} title={available?'单击显示/隐藏；双击只看该城':'当前页面无二手挂牌历史'} style={{'--city-color':CITY_COLORS[city]}} className={`city-chip ${available?(active?'active':''):'missing'}`} onClick={()=>toggleCity(city)} onDoubleClick={()=>showOnlyCity(city)}>{city} {available?`${points}月`:'missing'}</button>})}<span className="control-help">单击显示/隐藏，双击只看该城；至少保留一条线。</span></div>
      <Chart title={`多城市挂牌均价历史（当前显示 ${shownCities.length} 城）`} data={priceHistoryMatrix} series={citySeries} unit="元/㎡" digits={0} height={280}/>
      <Chart title="多城市挂牌价相对走势（各城市首期=100，便于比较涨跌幅）" data={priceIndexMatrix} series={citySeries} unit="指数" digits={1} height={280}/>
      <Chart title={`${activeHistoryCity||'城市'}挂牌均价历史（${listingHistory.length}个月）`} data={listingHistory} series={[{key:'avg_price',label:'挂牌均价',color:'var(--yellow)'}]} unit="元/㎡" digits={0}/>
      <div className="table-title">{activeHistoryCity||'城市'}挂牌历史明细（最新在前）</div><div className="scroll"><table><thead><tr><th>月份</th><th>挂牌均价</th><th>环比</th><th>同比</th><th>口径</th></tr></thead><tbody>{listingHistory.slice().reverse().map(r=><tr key={r.period}><td>{r.period}</td><td className="num">{fmt(r.avg_price,0)} 元/㎡</td><td className="num"><Pct v={r.mom_pct}/></td><td className="num"><Pct v={r.yoy_pct}/></td><td><span className="badge listing">挂牌价·参考</span></td></tr>)}</tbody></table></div>
      <div className="table-title">全城市挂牌参考（{listing?.latest_period||'—'}）</div><div className="scroll"><table><thead><tr><th>城市</th><th>挂牌均价</th><th>环比</th><th>同比</th><th>口径</th></tr></thead><tbody>{(listing?.city_table||[]).map(r=><tr key={r.city}><td>{r.city}</td><td className="num">{fmt(r.avg_price,0)} 元/㎡</td><td className="num"><Pct v={r.mom_pct}/></td><td className="num"><Pct v={r.yoy_pct}/></td><td><span className="badge listing">挂牌价·参考</span></td></tr>)}</tbody></table></div>
    </section>
    <section className="section"><div className="section-head"><h2>双口径对比 <span className="badge">derived</span></h2><a className="btn" style={{cursor:'pointer'}} onClick={()=>compareHistoryCsv(compare?.history_by_city)}>⬇ 历史对比 CSV</a></div><div className="notice">挂牌价均价与官方成交结构加权指数定义不同。挂牌同比主要对标官方二手住宅同比；两者分歧本身是市场情绪信号，不是简单的“误差”。</div>
      <div className="grid"><div className="metric"><div className="metric-label">可比城市</div><div className="metric-value">{compare?.summary?.comparable_cities??0}</div><div className="metric-meta">月份 {compare?.period||'—'}</div></div><div className="metric"><div className="metric-label">皮尔逊相关系数 <span className="badge">derived</span></div><div className="metric-value">{fmt(compare?.summary?.pearson_correlation,3)}</div><div className="metric-meta">{compare?.summary?.pearson_formula}</div></div><div className="metric"><div className="metric-label">方向一致率 <span className="badge">derived</span></div><div className="metric-value">{fmt(compare?.summary?.direction_agreement_pct,1)}%</div><div className="metric-meta">{compare?.summary?.direction_formula}</div></div><div className="metric"><div className="metric-label">不可比城市</div><div className="metric-value">{compare?.not_comparable?.length??0}</div><div className="metric-meta">缺任一侧即列入，不补零</div></div></div>
      <ScatterChart data={compare?.scatter_data||[]}/>
      <Chart title={`多城市挂牌-官方二手分歧历史（当前可比 ${compareCitySeries.length} 城）`} data={divergenceHistoryMatrix} series={compareCitySeries} unit="个百分点" digits={2} height={260}/>
      <div className="table-title">{activeHistoryCity||'城市'}逐月双口径历史 · 当前本地库共 {compare?.history_summary?.points??0} 个可比城市-月份点</div>
      {compareHistory.length?<><Chart title={`${activeHistoryCity}挂牌同比 vs 官方二手同比（${compareHistory.length}个月）`} data={compareHistory} series={[{key:'listing_yoy_pct',label:'挂牌同比',color:'var(--yellow)'},{key:'official_second_yoy_pct',label:'官方二手同比',color:'var(--blue)'}]} unit="%" digits={2}/><Chart title={`${activeHistoryCity}挂牌-官方二手分歧历史`} data={compareHistory} series={[{key:'divergence',label:'分歧',color:'var(--red)'}]} unit="个百分点" digits={2}/></>:<div className="empty">{activeHistoryCity||'该城市'}没有可与统计局二手同比同月对齐的历史点；不会补零或改用新房指数。</div>}
      <div className="grid" style={{gridTemplateColumns:'repeat(2,minmax(0,1fr))'}}>{[['listing_more_optimistic','挂牌更乐观'],['listing_more_pessimistic','挂牌更悲观']].map(([key,title])=><div key={key}><div className="table-title">分歧 Top 10 · {title}</div><div className="scroll"><table><thead><tr><th>城市</th><th>官方二手同比</th><th>挂牌同比</th><th>分歧</th></tr></thead><tbody>{(compare?.divergence_ranking?.[key]||[]).map(r=><tr key={r.city}><td>{r.city}</td><td className="num"><Pct v={r.official_second_yoy_pct}/></td><td className="num"><Pct v={r.listing_yoy_pct}/></td><td className="num"><Pct v={r.divergence}/></td></tr>)}</tbody></table></div></div>)}</div>
      <div className="table-title">完整对比表</div><div className="scroll"><table><thead><tr><th>城市</th><th>官方新房同比</th><th>官方二手同比</th><th>挂牌同比</th><th>分歧</th></tr></thead><tbody>{(compare?.comparison_table||[]).map(r=><tr key={r.city}><td>{r.city}</td><td className="num"><Pct v={r.official_new_yoy_pct}/></td><td className="num"><Pct v={r.official_second_yoy_pct}/></td><td className="num"><Pct v={r.listing_yoy_pct}/></td><td className="num"><Pct v={r.divergence}/></td></tr>)}</tbody></table></div>
    </section>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
