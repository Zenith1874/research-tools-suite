function ScatterChart({data}){

    setListingBusy(true);try{const r=await fetch('/api/housing/anjuke/update',{method:'POST'});const j=await r.json();if(!r.ok)throw new Error(j.error||`HTTP ${r.status}`);setMsg(j.message||j.status);const t=setInterval(async()=>{const js=await (await fetch('/api/jobs')).json();const job=js.jobs&&js.jobs.anjuke;if(job&&job.status!=='running'){clearInterval(t);setListingBusy(false);setMsg(job.status==='done'?'挂牌价更新完成':'挂牌价更新失败:'+(job.error||''));load()}},3000)}catch(e){setListingBusy(false);setMsg('挂牌价请求失败:'+(e.message||e))}

  useEffect(()=>{load()},[]);
  if(!p)return <div className="wrap"><div className="empty">加载中…</div></div>;
  const b=p.breadth;
  const cityYoY=mergeSeries(Object.fromEntries(Object.entries(p.city_series||{}).map(([c,rows])=>[c,rows])));
  const bis=mergeSeries({real:(p.national||{}).QCNR628BIS||[],nominal:(p.national||{}).QCNN628BIS||[]});
  const listingHistoryCities=listing?.history_cities||[];
  const yearlyHistoryCities=listing?.yearly_history_cities||[];
  const orderedHistoryCities=FOCUS_CITIES;
  const shownCities=(visibleCities===null?orderedHistoryCities:visibleCities.filter(city=>FOCUS_CITIES.includes(city)));
  const activeHistoryCity=FOCUS_CITIES.includes(historyCity)?historyCity:FOCUS_CITIES[0];
  const filteredListingMap=filterHistory(listing?.city_history,historyStart);
  const filteredYearlyMap=filterHistory(listing?.yearly_history_by_city,historyStart);
  const filteredCompareMap=filterHistory(compare?.history_by_city,historyStart);
  const filteredOfficialMap=filterHistory(compare?.official_history_by_city,historyStart);
  const listingHistory=filteredListingMap?.[activeHistoryCity]||[];
  const yearlyHistory=filteredYearlyMap?.[activeHistoryCity]||[];
  const allListingHistory=Object.values(listing?.city_history||{}).flat();
  const compareHistory=filteredCompareMap?.[activeHistoryCity]||[];
  const citySeries=FOCUS_CITIES.filter(city=>filteredListingMap?.[city]?.length).map(city=>({key:city,label:city,color:CITY_COLORS[city],dash:LINE_DASHES[FOCUS_CITIES.indexOf(city)]}));
  const yearlyCitySeries=FOCUS_CITIES.filter(city=>filteredYearlyMap?.[city]?.length).map(city=>({key:city,label:city,color:CITY_COLORS[city],dash:LINE_DASHES[FOCUS_CITIES.indexOf(city)]}));
  const visibleCitySeriesCount=citySeries.filter(s=>shownCities.includes(s.key)).length,visibleYearlySeriesCount=yearlyCitySeries.filter(s=>shownCities.includes(s.key)).length;
  const officialCitySeries=shownCities.filter(city=>filteredOfficialMap?.[city]?.length).map((city,i)=>({key:city,label:city,color:CITY_COLORS[city],dash:LINE_DASHES[i]}));
  const compareCitySeries=shownCities.filter(city=>filteredCompareMap?.[city]?.length).map((city,i)=>({key:city,label:city,color:CITY_COLORS[city],dash:LINE_DASHES[i]}));
  const priceHistoryMatrix=historyMatrix(filteredListingMap,'avg_price');
  const yearlyPriceMatrix=historyMatrix(filteredYearlyMap,'avg_price');
  const priceIndexMatrix=historyMatrix(filteredListingMap,'avg_price',true);
  const officialHistoryMatrix=historyMatrix(filteredOfficialMap,'official_second_yoy_pct');
  const divergenceHistoryMatrix=historyMatrix(filteredCompareMap,'divergence');
  const coverageByCity=Object.fromEntries((listing?.coverage_by_city||[]).map(row=>[row.city,row]));
  const yearlyCoverageByCity=Object.fromEntries((listing?.yearly_coverage_by_city||[]).map(row=>[row.city,row]));
  const rangeYears=[2010,2015,2020,2023,2025].filter((year,i,arr)=>year<=new Date().getFullYear()&&arr.indexOf(year)===i);
  function toggleCity(city){if(!FOCUS_CITIES.includes(city))return;setVisibleCities(current=>{const base=current===null?orderedHistoryCities:current;if(base.includes(city))return base.length===1?base:base.filter(item=>item!==city);return FOCUS_CITIES.filter(item=>base.includes(item)||item===city)})}
  function showOnlyCity(city){if(!FOCUS_CITIES.includes(city))return;setVisibleCities([city]);setHistoryCity(city)}
  return <div className="wrap">
    <div className="top"><div><h1>中国房价</h1>
      <div className="sub">统计局 70 城商品住宅价格指数(月度,官方；逐城可比口径 2011 起) + BIS 全国住宅价格指数(季度,2005起) · 最新期：{p.latest_period||'—'} · 70城库覆盖 {p.coverage?.nbs_70city?.earliest||'—'} 至 {p.coverage?.nbs_70city?.latest||'—'}
        {' · '}<a className="source-link" href={p.source_pages?.nbs} target="_blank" rel="noreferrer">统计局发布页</a></div></div>
      <div className="actions">
        <button className="btn primary" disabled={busy} onClick={update}>{busy?'更新中…':'更新数据'}</button>
        <button className="btn" disabled={listingBusy} onClick={updateListing}>{listingBusy?'挂牌更新中…':'更新挂牌参考'}</button>
        <a className="btn" href="/">首页</a></div></div>
    {msg&&<div className="banner">{msg}</div>}
    {(p.warnings||[]).map((w,i)=><div key={i} className="banner">{w}</div>)}
    {b&&<div className="breadth">
      <span>📉 70城新房环比({b.period})：</span>
      <span>上涨 <b className="delta-up">{b.up}</b> 城</span>
      <span>持平 <b>{b.flat}</b> 城</span>
      <span>下跌 <b className="delta-down">{b.down}</b> 城</span>
      <span className="muted">derived · {b.formula}</span>
    </div>}
    <div className="grid">{(p.cards||[]).map(c=><div className="metric" key={c.label}>
      <div className="metric-label">{c.label} <span className="badge">{c.data_status}</span></div>
      <div className="metric-value">{fmt(c.value)} <Delta v={c.value}/></div>
      <div className="metric-meta">
        新房同比 {fmt(c.extra?.['新房同比'])} <Delta v={c.extra?.['新房同比']}/><br/>
        二手环比 {fmt(c.extra?.['二手环比'])} <Delta v={c.extra?.['二手环比']}/> · 二手同比 {fmt(c.extra?.['二手同比'])} <Delta v={c.extra?.['二手同比']}/><br/>
        {c.source_url&&<a className="source-link" href={c.source_url} target="_blank" rel="noreferrer">月报原文</a>}
      </div>
    </div>)}</div>
    <Chart title="BIS 中国住宅价格指数(2010=100,季度,2005 起)" data={bis} series={[{key:'real',label:'实际(剔通胀)',color:'var(--blue)'},{key:'nominal',label:'名义',color:'var(--yellow)'}]} unit=""/>
    <Chart title="一线城市新房价格同比(上年同月=100,随月份累积)" data={cityYoY} series={[{key:'北京',label:'北京',color:'var(--blue)'},{key:'上海',label:'上海',color:'var(--red)'},{key:'广州',label:'广州',color:'var(--yellow)'},{key:'深圳',label:'深圳',color:'var(--green)'}]} unit=""/>
    <div className="table-title">70 城全表({p.latest_period}) <a className="source-link" style={{cursor:'pointer'}} onClick={()=>csvDownload(p.city_table||[])}>⬇ CSV</a></div>
    <div className="scroll"><table><thead><tr><th>城市</th><th>新房环比</th><th>新房同比</th><th>二手环比</th><th>二手同比</th></tr></thead>
      <tbody>{(p.city_table||[]).map(r=><tr key={r.city}>
        <td>{r.city}</td>
        <td className="num">{fmt(r.new_home_mom_idx)} <Delta v={r.new_home_mom_idx}/></td>
        <td className="num">{fmt(r.new_home_yoy_idx)} <Delta v={r.new_home_yoy_idx}/></td>
        <td className="num">{fmt(r.second_home_mom_idx)} <Delta v={r.second_home_mom_idx}/></td>
        <td className="num">{fmt(r.second_home_yoy_idx)} <Delta v={r.second_home_yoy_idx}/></td>
      </tr>)}</tbody></table></div>
    <div className="muted" style={{marginTop:10}}>{(p.notes||[]).map((n,i)=><div key={i}>· {n}</div>)}</div>
    <section className="section"><div className="section-head"><div><h2>挂牌价参考（安居客） <span className="badge listing">挂牌价·参考</span></h2><div className="sub">安居客，非官方口径 · 月度最新期：{listing?.latest_period||'—'} · 月度历史 {listing?.coverage?.earliest||'—'} 至 {listing?.coverage?.latest||'—'} · 年度快照覆盖 {yearlyHistoryCities.length}/10 城</div></div><div className="actions"><label className="history-picker">图表起点<select value={historyStart} onChange={e=>setHistoryStart(e.target.value)}>{rangeYears.map(year=><option key={year} value={String(year)}>{year}年</option>)}</select></label><label className="history-picker">单城明细<select value={activeHistoryCity||''} onChange={e=>setHistoryCity(e.target.value)}>{orderedHistoryCities.map(city=><option key={city} value={city}>{city}</option>)}</select></label><a className="btn" style={{cursor:'pointer'}} onClick={()=>yearlyListingCsv(listing?.yearly_history_by_city)}>⬇ 年度快照 CSV</a><a className="btn" style={{cursor:'pointer'}} onClick={()=>listingCsv(allListingHistory)}>⬇ 月度历史 CSV</a></div></div>
      <div className="notice">这里分成两种频率：① 你截图中的全国历史排名页，历史年份按年末快照、当年按抓取月展示；② 深圳等城市年度页中的逐月走势。年度点绝不复制成 12 个月，也不进入“挂牌同比－官方二手同比”的月度计算。挂牌价是卖方要价，不等于成交价；数据只在本机独立库保存，不进入公开仓库。</div>
      {(listing?.warnings||[]).map((w,i)=><div className="banner" key={i}>{w}</div>)}
      <div className="grid">{(listing?.cards||[]).map(c=><div className="metric" key={c.city}><div className="metric-label">{c.city} <span className="badge listing">{c.data_status==='listing_reference'?'月度挂牌':(c.data_status==='listing_year_snapshot'?'年度快照':'missing')}</span></div><div className="metric-value">{c.avg_price==null?'—':fmt(c.avg_price,0)} <span style={{fontSize:12}}>元/㎡</span></div><div className="metric-meta">{c.data_status==='listing_reference'?<>环比 <Pct v={c.mom_pct}/> · 同比 <Pct v={c.yoy_pct}/></>:<>快照月份 {c.period||'—'} · 不参与月度同比对比</>}<br/>{c.source_url&&<a className="source-link" href={c.source_url} target="_blank" rel="noreferrer">安居客原页</a>}</div></div>)}</div>
      <div className="table-title">点名十城历史图 · 月度已入库 {listingHistoryCities.length}/10 城 · 年度快照 {yearlyHistoryCities.length}/10 城 · 当前图表从 {historyStart}-01 起</div><div className="city-controls"><button className="city-chip all" onClick={()=>setVisibleCities(null)}>全部显示</button>{FOCUS_CITIES.map(city=>{const hasListing=listingHistoryCities.includes(city),hasYearly=yearlyHistoryCities.includes(city),hasOfficial=Boolean(compare?.official_history_by_city?.[city]?.length),active=shownCities.includes(city),coverage=coverageByCity[city],yearlyCoverage=yearlyCoverageByCity[city],points=listing?.city_history?.[city]?.length||0,yearPoints=yearlyCoverage?.records||0;return <button key={city} aria-pressed={active} title={`单击显示/隐藏；双击只看该城；月度 ${hasListing?`${coverage?.earliest||'—'} 至 ${coverage?.latest||'—'}`:'缺失'}；年度 ${hasYearly?`${yearlyCoverage?.earliest_year} 至 ${yearlyCoverage?.latest_year}`:'缺失'}；官方二手 ${hasOfficial?'有':'不在70城口径'}`} style={{'--city-color':CITY_COLORS[city]}} className={`city-chip ${active?'active':''} ${hasListing?'':'missing'}`} onClick={()=>toggleCity(city)} onDoubleClick={()=>showOnlyCity(city)}>{city} {hasListing?`${points}月`:'月缺'} / {yearPoints}年</button>})}<span className="control-help">单击显示/隐藏，双击只看该城；虚线表示该城缺少逐月挂牌序列，不代表年度快照也缺失。</span></div>
      <div className="scroll"><table><thead><tr><th>城市</th><th>月度范围</th><th>月度点</th><th>可算同比点</th><th>年度范围</th><th>年度点</th><th>排名页直取</th></tr></thead><tbody>{FOCUS_CITIES.map(city=>{const c=coverageByCity[city],y=yearlyCoverageByCity[city];return <tr key={city}><td>{city}</td><td>{c?`${c.earliest} 至 ${c.latest}`:'missing'}</td><td className="num">{c?.records??0}</td><td className="num">{c?.yoy_points??0}</td><td>{y?.records?`${y.earliest_year} 至 ${y.latest_year}`:'missing'}</td><td className="num">{y?.records??0}</td><td className="num">{y?.ranking_points??0}</td></tr>})}</tbody></table></div>
      <Chart title={`安居客十城年度低频挂牌快照（全国排名页优先，其余取逐月页年末/当前期；${historyStart} 起；当前 ${visibleYearlySeriesCount} 条线）`} data={yearlyPriceMatrix} series={yearlyCitySeries} unit="元/㎡" digits={0} height={300} axisControls allowLog visibleKeys={shownCities} onToggleSeries={toggleCity} onOnlySeries={showOnlyCity} onShowAll={()=>setVisibleCities(null)}/>
      <Chart title={`安居客多城市二手挂牌均价（月度，${historyStart}-01 起；当前 ${visibleCitySeriesCount} 条线）`} data={priceHistoryMatrix} series={citySeries} unit="元/㎡" digits={0} height={280} axisControls allowLog visibleKeys={shownCities} onToggleSeries={toggleCity} onOnlySeries={showOnlyCity} onShowAll={()=>setVisibleCities(null)}/>
      <Chart title={`安居客多城市挂牌价相对走势（月度，${historyStart}-01 起；各城市可见首期=100）`} data={priceIndexMatrix} series={citySeries} unit="指数" digits={1} height={280} visibleKeys={shownCities} onToggleSeries={toggleCity} onOnlySeries={showOnlyCity}/>
      <Chart title={`统计局官方二手住宅同比（月度，${historyStart}-01 起；当前 ${officialCitySeries.length} 条有值线）`} data={officialHistoryMatrix} series={officialCitySeries} unit="%" digits={1} height={280}/>
      {yearlyHistory.length?<><Chart title={`${activeHistoryCity||'城市'}安居客年度低频挂牌快照（${yearlyHistory[0]?.year}–${yearlyHistory[yearlyHistory.length-1]?.year}；${yearlyHistory.length}点）`} data={yearlyHistory} series={[{key:'avg_price',label:'年度快照',color:CITY_COLORS[activeHistoryCity]}]} unit="元/㎡" digits={0}/><div className="table-title">{activeHistoryCity}年度快照明细（最新在前）</div><div className="scroll"><table><thead><tr><th>年份</th><th>快照月份</th><th>挂牌均价</th><th>来源粒度</th><th>原页</th></tr></thead><tbody>{yearlyHistory.slice().reverse().map(r=><tr key={r.year}><td>{r.year}</td><td>{r.period}</td><td className="num">{fmt(r.avg_price,0)} 元/㎡</td><td>{r.source_grain==='ranking_page_snapshot'?'全国历史排名页':'逐月页年末/当前期'}</td><td>{(r.detail_url||r.source_url)&&<a className="source-link" href={r.detail_url||r.source_url} target="_blank" rel="noreferrer">查看</a>}</td></tr>)}</tbody></table></div></>:<div className="empty">{activeHistoryCity}没有可用年度快照。</div>}
      {listingHistory.length?<Chart title={`${activeHistoryCity||'城市'}安居客二手挂牌均价（月度，${historyStart}-01 起；${listingHistory.length}个月）`} data={listingHistory} series={[{key:'avg_price',label:'挂牌均价',color:'var(--yellow)'}]} unit="元/㎡" digits={0}/>:<div className="empty">{activeHistoryCity}没有可用的全市逐月挂牌历史；年度快照仍单独显示，但不参与月度官方二手同比对比。</div>}
      {listingHistory.length?<><div className="table-title">{activeHistoryCity||'城市'}逐月挂牌历史明细（最新在前）</div><div className="scroll"><table><thead><tr><th>月份</th><th>挂牌均价</th><th>环比</th><th>同比</th><th>口径</th></tr></thead><tbody>{listingHistory.slice().reverse().map(r=><tr key={r.period}><td>{r.period}</td><td className="num">{fmt(r.avg_price,0)} 元/㎡</td><td className="num"><Pct v={r.mom_pct}/></td><td className="num"><Pct v={r.yoy_pct}/></td><td><span className="badge listing">挂牌价·参考</span></td></tr>)}</tbody></table></div></>:null}
      <div className="table-title">逐月全城市挂牌参考（{listing?.latest_period||'—'}；上海仅有年度快照，故不列入本表）</div><div className="scroll"><table><thead><tr><th>城市</th><th>挂牌均价</th><th>环比</th><th>同比</th><th>口径</th></tr></thead><tbody>{(listing?.city_table||[]).map(r=><tr key={r.city}><td>{r.city}</td><td className="num">{fmt(r.avg_price,0)} 元/㎡</td><td className="num"><Pct v={r.mom_pct}/></td><td className="num"><Pct v={r.yoy_pct}/></td><td><span className="badge listing">挂牌价·参考</span></td></tr>)}</tbody></table></div>
    </section>
    <section className="section"><div className="section-head"><h2>双口径对比 <span className="badge">derived</span></h2><a className="btn" style={{cursor:'pointer'}} onClick={()=>compareHistoryCsv(compare?.history_by_city)}>⬇ 完整历史对比 CSV</a></div><div className="notice">挂牌价均价与官方成交结构加权指数定义不同。挂牌同比主要对标官方二手住宅同比；两者分歧本身是市场情绪信号，不是简单的“误差”。官方现行逐城口径从 2011 年开始，2010 年旧制度不与后续逐城序列强行拼接。</div>
      <div className="grid"><div className="metric"><div className="metric-label">可比城市</div><div className="metric-value">{compare?.summary?.comparable_cities??0}</div><div className="metric-meta">月份 {compare?.period||'—'}</div></div><div className="metric"><div className="metric-label">皮尔逊相关系数 <span className="badge">derived</span></div><div className="metric-value">{fmt(compare?.summary?.pearson_correlation,3)}</div><div className="metric-meta">{compare?.summary?.pearson_formula}</div></div><div className="metric"><div className="metric-label">方向一致率 <span className="badge">derived</span></div><div className="metric-value">{fmt(compare?.summary?.direction_agreement_pct,1)}%</div><div className="metric-meta">{compare?.summary?.direction_formula}</div></div><div className="metric"><div className="metric-label">不可比城市</div><div className="metric-value">{compare?.not_comparable?.length??0}</div><div className="metric-meta">缺任一侧即列入，不补零</div></div></div>
      <ScatterChart data={compare?.scatter_data||[]}/>
      <Chart title={`挂牌同比－官方二手同比（月度，${historyStart}-01 起；当前可比 ${compareCitySeries.length} 城）`} data={divergenceHistoryMatrix} series={compareCitySeries} unit="个百分点" digits={2} height={260}/>
      <div className="table-title">{activeHistoryCity||'城市'}逐月双口径历史 · 当前本地库共 {compare?.history_summary?.points??0} 个可比城市-月份点</div>
      {compareHistory.length?<><Chart title={`${activeHistoryCity}挂牌同比 vs 官方二手同比（月度，${historyStart}-01 起；${compareHistory.length}个月）`} data={compareHistory} series={[{key:'listing_yoy_pct',label:'挂牌同比',color:'var(--yellow)'},{key:'official_second_yoy_pct',label:'官方二手同比',color:'var(--blue)',dash:'6,3'}]} unit="%" digits={2}/><Chart title={`${activeHistoryCity}挂牌同比－官方二手同比（月度，${historyStart}-01 起）`} data={compareHistory} series={[{key:'divergence',label:'分歧',color:'var(--red)'}]} unit="个百分点" digits={2}/></>:<div className="empty">{activeHistoryCity||'该城市'}没有可与统计局二手同比同月对齐的历史点；不会补零或改用新房指数。</div>}
      <div className="grid" style={{gridTemplateColumns:'repeat(2,minmax(0,1fr))'}}>{[['listing_more_optimistic','挂牌更乐观'],['listing_more_pessimistic','挂牌更悲观']].map(([key,title])=><div key={key}><div className="table-title">分歧 Top 10 · {title}</div><div className="scroll"><table><thead><tr><th>城市</th><th>官方二手同比</th><th>挂牌同比</th><th>分歧</th></tr></thead><tbody>{(compare?.divergence_ranking?.[key]||[]).map(r=><tr key={r.city}><td>{r.city}</td><td className="num"><Pct v={r.official_second_yoy_pct}/></td><td className="num"><Pct v={r.listing_yoy_pct}/></td><td className="num"><Pct v={r.divergence}/></td></tr>)}</tbody></table></div></div>)}</div>
      <div className="table-title">完整对比表</div><div className="scroll"><table><thead><tr><th>城市</th><th>官方新房同比</th><th>官方二手同比</th><th>挂牌同比</th><th>分歧</th></tr></thead><tbody>{(compare?.comparison_table||[]).map(r=><tr key={r.city}><td>{r.city}</td><td className="num"><Pct v={r.official_new_yoy_pct}/></td><td className="num"><Pct v={r.official_second_yoy_pct}/></td><td className="num"><Pct v={r.listing_yoy_pct}/></td><td className="num"><Pct v={r.divergence}/></td></tr>)}</tbody></table></div>
    </section>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
