<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>央行金融统计数据 Dashboard</title>
<script src="/vendor/react.min.js"></script>
<script src="/vendor/react-dom.min.js"></script>
<script src="/vendor/babel.min.js"></script>
<style>
:root{--bg:#07111f;--panel:#0d1728;--panel2:#111d31;--bd:#22324b;--text:#e5edf7;--muted:#8ea0b8;--dim:#b8c6d8;--blue:#4f8fff;--green:#00d4aa;--red:#ff5b78;--yellow:#f5a623;--purple:#a78bfa}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif}
.wrap{max-width:1360px;margin:0 auto;padding:22px}
.top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:16px}
h1{font-size:20px;margin:0 0 6px}.sub{font-size:12px;color:var(--muted);line-height:1.7}
.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.btn{background:var(--panel2);border:1px solid var(--bd);color:var(--text);border-radius:6px;padding:8px 12px;cursor:pointer;font:inherit;font-size:12px;text-decoration:none}.btn:hover{border-color:var(--blue)}.btn.primary{background:rgba(79,143,255,.16);border-color:rgba(79,143,255,.5)}
.banner{border:1px solid var(--bd);background:var(--panel);border-radius:8px;padding:12px 14px;margin:12px 0;color:var(--dim);font-size:12px;line-height:1.6}.banner.warn{border-color:rgba(245,166,35,.45);background:rgba(245,166,35,.08)}.banner.err{border-color:rgba(255,91,120,.45);background:rgba(255,91,120,.08)}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.card{background:var(--panel);border:1px solid var(--bd);border-radius:8px;padding:14px}.kpi-name{font-size:11px;color:var(--muted);margin-bottom:8px}.kpi-val{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums}.kpi-meta{font-size:10px;color:var(--muted);line-height:1.5;margin-top:7px}.tag{display:inline-block;border:1px solid var(--bd);border-radius:4px;padding:1px 5px;font-size:10px;color:var(--muted);margin-left:6px}
.section{margin-top:16px}.section h2{font-size:15px;margin:0 0 10px}.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}.three{display:grid;grid-template-columns:1.25fr 1fr .9fr;gap:12px}
table{width:100%;border-collapse:collapse;font-size:12px}th,td{padding:8px;border-bottom:1px solid rgba(34,50,75,.65);text-align:left;vertical-align:middle}th{color:var(--muted);font-weight:600}td.num{text-align:right;font-variant-numeric:tabular-nums}.empty{padding:24px;color:var(--muted);text-align:center;border:1px dashed var(--bd);border-radius:8px;background:rgba(255,255,255,.02)}
.table-wrap{overflow:auto;border:1px solid rgba(34,50,75,.55);border-radius:8px;max-width:100%}.table-wrap table{min-width:1920px}.data-table{table-layout:fixed}.data-table th,.data-table td{white-space:nowrap}.data-table th{position:sticky;top:0;background:var(--panel);z-index:2}.data-table th:first-child,.data-table td:first-child{position:sticky;left:0;background:var(--panel);z-index:3}.data-table th:first-child{z-index:4}.status-cell{min-width:104px}.source-cell{max-width:260px;overflow:hidden;text-overflow:ellipsis}.source-link{color:#9ec2ff;text-decoration:none}.source-link:hover{text-decoration:underline}.source-list{margin-top:12px;border-top:1px solid rgba(34,50,75,.55);padding-top:10px;color:var(--muted);font-size:11px;line-height:1.7}.source-list b{color:var(--dim)}.coverage-note{display:flex;justify-content:space-between;gap:12px;color:var(--muted);font-size:11px;margin:0 0 10px;line-height:1.6}.coverage-note b{color:var(--text)}
.legend{display:flex;gap:12px;align-items:center;color:var(--muted);font-size:11px;margin-bottom:8px}.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px}.chart{width:100%;height:240px}.axis{stroke:#22324b}.line{fill:none;stroke-width:2}.pt{stroke:#07111f;stroke-width:2}.label{fill:#8ea0b8;font-size:10px}.title-row{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:8px}.small{font-size:11px;color:var(--muted)}
@media(max-width:1100px){.grid{grid-template-columns:repeat(2,1fr)}.two,.three{grid-template-columns:1fr}.top{flex-direction:column}.actions{justify-content:flex-start}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useEffect,useMemo,useState}=React;
const API='';

const DEMO_RECORDS=[
  {period:'2026-03',M2_BALANCE:353.86,M2_YOY:8.5,M1_BALANCE:119.32,M1_YOY:5.1,M0_YOY:12.5,TSF_STOCK:456.46,TSF_YOY:7.9,RMB_LOAN_BALANCE:280.51,RMB_LOAN_YOY:5.7,RMB_DEPOSIT_BALANCE:342.41,RMB_DEPOSIT_YOY:8.6,IBOR_WEIGHTED_AVG:1.38,PLEDGED_REPO_WEIGHTED_AVG:1.40,source_name:'演示数据',data_status:'mock',is_mock:true},
  {period:'2026-04',M2_BALANCE:353.04,M2_YOY:8.6,M1_BALANCE:114.58,M1_YOY:5.0,M0_YOY:12.2,TSF_STOCK:456.89,TSF_YOY:7.8,RMB_LOAN_BALANCE:280.50,RMB_LOAN_YOY:5.6,RMB_DEPOSIT_BALANCE:342.68,RMB_DEPOSIT_YOY:8.9,IBOR_WEIGHTED_AVG:1.29,PLEDGED_REPO_WEIGHTED_AVG:1.31,source_name:'演示数据',data_status:'mock',is_mock:true},
  {period:'2026-05',M2_BALANCE:353.67,M2_YOY:11.9,M1_BALANCE:114.89,M1_YOY:11.9,M0_YOY:11.9,TSF_STOCK:458.81,TSF_YOY:5.5,RMB_LOAN_BALANCE:281.02,RMB_LOAN_YOY:5.5,RMB_DEPOSIT_BALANCE:344.45,RMB_DEPOSIT_YOY:8.7,IBOR_WEIGHTED_AVG:1.31,PLEDGED_REPO_WEIGHTED_AVG:1.33,source_name:'演示数据',data_status:'mock',is_mock:true}
];
const DEMO_STRUCTURE=[
  {period:'2026-05',HOUSEHOLD_LOAN_BALANCE:82.639982,HOUSEHOLD_SHORT_LOAN_BALANCE:19.702208,HOUSEHOLD_LONG_LOAN_BALANCE:62.937774,CORPORATE_LOAN_BALANCE:194.792297,CORPORATE_SHORT_LOAN_BALANCE:50.993805,CORPORATE_LONG_LOAN_BALANCE:123.065781,BILL_FINANCING_BALANCE:17.0803,NBFI_LOAN_BALANCE:0.671493,is_balance:true,is_ytd:false,source_name:'演示数据',data_status:'mock'}
];
function fmt(v,d=2){return v===null||v===undefined||Number.isNaN(Number(v))?'—':Number(v).toFixed(d)}
function fmtPct(v,d=1){return v===null||v===undefined||Number.isNaN(Number(v))?'—':`${Number(v).toFixed(d)}%`}
function statusLabel(s){return ({live:'实时',cache:'缓存',seed:'种子/人工',mock:'演示',missing:'缺失',error:'错误'}[s]||s||'未知')}
function sourceLabel(r){
  if(r?.is_mock)return '演示数据';
  if(r?.source_url&&String(r.source_url).startsWith('http'))return '央行官网缓存';
  if(r?.is_seed||r?.data_status==='seed')return '人工/种子';
  return r?.source_name||'—';
}
function sourceLink(r){return r?.source_url&&String(r.source_url).startsWith('http')?r.source_url:null}
function SourceFooter(){
  return <div className="source-list">
    <b>数据来源网站：</b>
    <div>中国人民银行金融统计数据报告</div>
    <div>中国人民银行社会融资规模存量统计数据报告</div>
    <div>中国人民银行社会融资规模增量统计数据报告</div>
  </div>
}
function latest(rows){return rows&&rows.length?rows[rows.length-1]:null}
function field(rows,k){return rows.map(r=>r[k]??null)}
function noZero(v){return v===0?0:(v??null)}

function LineChart({rows,series,unit='%',title}){
  const [hover,setHover]=useState(null);
  const vals=series.flatMap(s=>rows.map(r=>noZero(r[s.field]))).filter(v=>v!==null);
  if(rows.length<2||!vals.length)return <div className="empty">样本不足，无法绘图。</div>;
  const w=720,h=240,p={l:42,r:16,t:18,b:34},cw=w-p.l-p.r,ch=h-p.t-p.b;
  const min=Math.min(...vals),max=Math.max(...vals),pad=(max-min||1)*.12,lo=min-pad,hi=max+pad;
  const x=i=>p.l+(rows.length===1?0:i*cw/(rows.length-1));
  const y=v=>p.t+ch-(v-lo)/(hi-lo)*ch;
  const ticks=[0,.25,.5,.75,1].map(t=>lo+t*(hi-lo));
  function segments(s){
    const out=[];let cur=[];
    rows.forEach((r,i)=>{const v=noZero(r[s.field]); if(v===null){if(cur.length){out.push(cur);cur=[]}} else cur.push(`${x(i)},${y(v)}`)});
    if(cur.length)out.push(cur); return out;
  }
  const onMove=e=>{const rc=e.currentTarget.getBoundingClientRect();const px=(e.clientX-rc.left)/rc.width*w;const i=Math.round((px-p.l)/cw*(rows.length-1));setHover(Math.max(0,Math.min(rows.length-1,i)))};
  const hp=hover===null?null:rows[hover];
  const tipLeft=hover===null?0:Math.max(10,Math.min(90,x(hover)/w*100));
  return <div style={{position:'relative'}}>
  <svg className="chart" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" aria-label={title}
       style={{cursor:'crosshair'}} onMouseMove={onMove} onMouseLeave={()=>setHover(null)}>
    {ticks.map((t,i)=><g key={i}><line className="axis" x1={p.l} y1={y(t)} x2={w-p.r} y2={y(t)}/><text className="label" x={p.l-6} y={y(t)+4} textAnchor="end">{fmt(t,1)}{unit}</text></g>)}
    {rows.map((r,i)=>i%Math.ceil(rows.length/6)===0||i===rows.length-1?<text key={i} className="label" x={x(i)} y={h-12} textAnchor="middle">{r.period.slice(2)}</text>:null)}
    {series.map(s=><g key={s.field}>{segments(s).map((seg,i)=><polyline key={i} className="line" points={seg.join(' ')} stroke={s.color}/>)}</g>)}
    {hp&&<g><line x1={x(hover)} x2={x(hover)} y1={p.t} y2={h-p.b} stroke="#8ea0b8" strokeWidth="0.8" strokeDasharray="3,3"/>
      {series.map(s=>{const v=noZero(hp[s.field]);return v===null?null:<circle key={s.field} cx={x(hover)} cy={y(v)} r="3.5" fill={s.color} stroke="#07111f" strokeWidth="1.2"/>})}</g>}
  </svg>
  {hp&&<div style={{position:'absolute',top:8,left:tipLeft+'%',transform:'translateX(-50%)',background:'rgba(13,23,40,.96)',border:'1px solid #22324b',borderRadius:6,padding:'6px 10px',fontSize:11,lineHeight:1.7,pointerEvents:'none',whiteSpace:'nowrap',zIndex:5}}>
    <b style={{color:'#b8c6d8',fontSize:10}}>{hp.period}</b>
    {series.map(s=>{const v=noZero(hp[s.field]);return v===null?null:<div key={s.field}><i style={{width:8,height:8,borderRadius:2,display:'inline-block',marginRight:5,background:s.color}}/>{s.label||s.field}：{fmt(v,2)}{unit}</div>})}
  </div>}
  </div>
}

function KpiCard({label,value,unit,period,scope,source,status}){
  return <div className="card">
    <div className="kpi-name">{label}<span className="tag">{statusLabel(status)}</span></div>
    <div className="kpi-val">{fmt(value, unit==='%'?1:2)}{unit}</div>
    <div className="kpi-meta">期数：{period||'—'}<br/>口径：{scope}<br/>来源：{source||'—'}</div>
  </div>
}

function App(){
  const [payload,setPayload]=useState(null);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);
  const [updating,setUpdating]=useState(false);

  async function load(){
    setLoading(true); setError(null);
    try{
      const r=await fetch(`${API}/api/data`);
      if(!r.ok)throw new Error(`HTTP ${r.status}`);
      const j=await r.json();
      setPayload(j);
    }catch(e){
      setPayload(null);
      setError('后端未连接，当前没有加载真实央行数据。');
    }finally{setLoading(false)}
  }
  async function update(){
    setUpdating(true);
    try{
      await fetch(`${API}/api/financial/update`,{method:'POST'});
      // 更新已在后台运行：轮询 /api/jobs 到 financial 任务结束再刷新
      const poll=setInterval(async()=>{
        try{
          const js=await (await fetch(`${API}/api/jobs`)).json();
          const job=js.jobs&&js.jobs.financial;
          if(job&&job.status!=='running'){clearInterval(poll);await load();setUpdating(false);}
          else if(!job&&!js.update_lock_busy){clearInterval(poll);await load();setUpdating(false);}
        }catch(e){}
      },3000);
    }catch(e){setUpdating(false)}
  }
  function loadDemo(){
    setPayload({
      success:true,data_mode:'mock',
      pboc_monthly:{latest_period:'2026-05',last_sync:null,source_name:'演示数据',data_status:'mock',warnings:['演示数据，非最新，不用于判断。'],records:DEMO_RECORDS},
      loan_structure:{latest_period:'2026-05',data_status:'mock',records:DEMO_STRUCTURE},
      deposit_structure:{latest_period:null,data_status:'missing',records:[]},
      tsf_structure:{latest_period:null,data_status:'missing',records:[]},
      market_data:{latest_date:null,data_status:'missing',records:[],warnings:['演示模式也不生成随机行情。']},
      metadata:{record_count:DEMO_RECORDS.length,warnings:['演示数据，非最新，不用于判断。'],errors:[]},
      data:[]
    });
    setError(null);
  }
  useEffect(()=>{load()},[]);

  const records=payload?.pboc_monthly?.records||[];
  const la=latest(records);
  const structures=payload?.loan_structure?.records||[];
  const lastStruct=latest(structures);
  const mode=payload?.data_mode||'missing';
  const unsafe=mode==='seed'||mode==='mock';
  const warnings=[...(payload?.metadata?.warnings||[]),...(payload?.pboc_monthly?.warnings||[])];
  const coverage=useMemo(()=>{
    if(!records.length)return null;
    const first=records[0].period, last=records[records.length-1].period;
    const [fy,fm]=first.split('-').map(Number), [ly,lm]=last.split('-').map(Number);
    const expected=(ly-fy)*12+(lm-fm)+1;
    return {first,last,actual:records.length,expected,missing:Math.max(0,expected-records.length)};
  },[records]);

  const kpis=la?[
    ['M2同比',la.M2_YOY,'%','同比', 'M2_YOY'],
    ['M1同比',la.M1_YOY,'%','同比', 'M1_YOY'],
    ['社融存量同比',la.TSF_YOY,'%','同比', 'TSF_YOY'],
    ['社融存量',la.TSF_STOCK,'万亿元','月末/期末存量', 'TSF_STOCK'],
    ['人民币贷款余额',la.RMB_LOAN_BALANCE,'万亿元','月末余额', 'RMB_LOAN_BALANCE'],
    ['贷款余额同比',la.RMB_LOAN_YOY,'%','同比', 'RMB_LOAN_YOY'],
    ['人民币存款余额',la.RMB_DEPOSIT_BALANCE,'万亿元','月末余额', 'RMB_DEPOSIT_BALANCE'],
    ['存款余额同比',la.RMB_DEPOSIT_YOY,'%','同比', 'RMB_DEPOSIT_YOY'],
    ['同业拆借利率',la.IBOR_WEIGHTED_AVG,'%','月加权平均', 'IBOR_WEIGHTED_AVG'],
    ['质押式回购利率',la.PLEDGED_REPO_WEIGHTED_AVG,'%','月加权平均', 'PLEDGED_REPO_WEIGHTED_AVG'],
  ]:[];

  return <div className="wrap">
    <div className="top">
      <div>
        <h1>央行金融统计数据 Dashboard</h1>
        <div className="sub">可信口径优先：前端只展示后端返回数据；市场数据、央行月度数据和演示数据分开。最新期数：{payload?.pboc_monthly?.latest_period||'—'}。</div>
      </div>
      <div className="actions">
        <button className="btn primary" onClick={load} disabled={loading}>{loading?'加载中':'刷新后端数据'}</button>
        <button className="btn" onClick={update} disabled={updating}>{updating?'更新中':'同步观测表'}</button>
        <button className="btn" onClick={loadDemo}>加载演示数据</button>
        <a className="btn" href="/financial/debug">Debug</a>
        <a className="btn" href="/">首页</a>
      </div>
    </div>

    {error&&<div className="banner err">{error}<br/>不会自动使用 seed/mock 数据。需要演示时请点击“加载演示数据”。</div>}
    {unsafe&&<div className="banner warn">演示/种子数据，非最新，不用于判断。当前 dataMode：{statusLabel(mode)}。</div>}
    {warnings.length>0&&<div className="banner warn">{[...new Set(warnings)].map((w,i)=><div key={i}>{w}</div>)}</div>}

    <div className="section">
      <div className="title-row"><h2>A. 央行月度金融数据</h2><span className="small">来源：{payload?.pboc_monthly?.source_name||'—'} · 状态：{statusLabel(payload?.pboc_monthly?.data_status)}</span></div>
      {la?<><div className="grid">{kpis.map(k=><KpiCard key={k[4]} label={k[0]} value={k[1]} unit={k[2]} scope={k[3]} period={la.period} source={la.source_name} status={la.data_status}/>)}</div><SourceFooter/></>:<div className="empty">暂无后端数据。不会用硬编码数据伪装真实数据。</div>}
    </div>

    <div className="section two">
      <div className="card">
        <div className="title-row"><h2>M2 / 社融月度同比增速</h2><span className="small">单位：%</span></div>
        <div className="legend"><span><i className="dot" style={{background:'var(--blue)'}}/>M2同比</span><span><i className="dot" style={{background:'var(--purple)'}}/>社融存量同比</span></div>
        <LineChart rows={records} unit="%" title="M2 / 社融月度同比增速" series={[{field:'M2_YOY',color:'#4f8fff',label:'M2同比'},{field:'TSF_YOY',color:'#a78bfa',label:'社融存量同比'}]}/>
      </div>
      <div className="card">
        <div className="title-row"><h2>银行间利率走势（月度加权平均）</h2><span className="small">单位：%</span></div>
        <div className="legend"><span><i className="dot" style={{background:'var(--red)'}}/>同业拆借</span><span><i className="dot" style={{background:'var(--yellow)'}}/>质押回购</span></div>
        <LineChart rows={records} unit="%" title="银行间利率走势（月度加权平均）" series={[{field:'IBOR_WEIGHTED_AVG',color:'#ff5b78',label:'同业拆借'},{field:'PLEDGED_REPO_WEIGHTED_AVG',color:'#f5a623',label:'质押回购'}]}/>
      </div>
    </div>

    <div className="section three">
      <div className="card">
        <div className="title-row"><h2>B. 贷款余额分部门</h2><span className="small">月末余额 · 万亿元 · 期数：{lastStruct?.period||'—'}</span></div>
        {lastStruct?<table><thead><tr><th>指标</th><th className="num">数值</th><th>口径</th></tr></thead><tbody>
          {[
            ['住户贷款余额',lastStruct.HOUSEHOLD_LOAN_BALANCE],
            ['住户短期贷款余额',lastStruct.HOUSEHOLD_SHORT_LOAN_BALANCE],
            ['住户中长期贷款余额',lastStruct.HOUSEHOLD_LONG_LOAN_BALANCE],
            ['企业贷款余额',lastStruct.CORPORATE_LOAN_BALANCE],
            ['企业短期贷款余额',lastStruct.CORPORATE_SHORT_LOAN_BALANCE],
            ['企业中长期贷款余额',lastStruct.CORPORATE_LONG_LOAN_BALANCE],
            ['票据融资余额',lastStruct.BILL_FINANCING_BALANCE],
            ['非银贷款余额',lastStruct.NBFI_LOAN_BALANCE],
          ].map(([n,v])=><tr key={n}><td>{n}</td><td className="num">{fmt(v,2)}</td><td>余额，非当月新增</td></tr>)}
        </tbody></table>:<div className="empty">暂无贷款结构数据。</div>}
      </div>
      <div className="card">
        <div className="title-row"><h2>贷款新增结构</h2><span className="small">YTD 不等于当月净增</span></div>
        {lastStruct&&lastStruct.is_ytd?<table><tbody>
          {[
            ['人民币贷款YTD',lastStruct.RMB_LOAN_YTD],
            ['住户贷款YTD',lastStruct.HOUSEHOLD_LOAN_YTD],
            ['企业贷款YTD',lastStruct.CORPORATE_LOAN_YTD],
          ].map(([n,v])=><tr key={n}><td>{n}</td><td className="num">{fmt(v,2)}</td><td>年初至今累计</td></tr>)}
        </tbody></table>:<div className="empty">当前最新结构记录没有 YTD 新增字段；不展示为“当月净增”。</div>}
      </div>
      <div className="card">
        <div className="title-row"><h2>C. 市场参考数据</h2><span className="small">状态：{statusLabel(payload?.market_data?.data_status)}</span></div>
        <div className="empty">暂无真实市场数据源，暂不展示。页面不会随机生成市场报价。</div>
      </div>
    </div>

    <div className="section card">
      <div className="title-row"><h2>数据明细</h2><span className="small">缺失值保留为空，不用 0 填补</span></div>
      {coverage&&<div className="coverage-note">
        <span>当前表格显示 <b>{coverage.actual}</b> 条记录，范围 <b>{coverage.first}</b> 至 <b>{coverage.last}</b>。</span>
        <span>该区间理论 <b>{coverage.expected}</b> 个月，缺 <b>{coverage.missing}</b> 个月；当前不是连续全量历史月度数据。</span>
      </div>}
      {records.length?<div className="table-wrap"><table className="data-table"><thead><tr>
        <th style={{width:86}}>期数</th>
        <th className="num" style={{width:110}}>M2余额</th>
        <th className="num" style={{width:96}}>M2同比</th>
        <th className="num" style={{width:110}}>M1余额</th>
        <th className="num" style={{width:96}}>M1同比</th>
        <th className="num" style={{width:112}}>社融存量</th>
        <th className="num" style={{width:100}}>社融同比</th>
        <th className="num" style={{width:112}}>贷款余额</th>
        <th className="num" style={{width:100}}>贷款同比</th>
        <th className="num" style={{width:112}}>存款余额</th>
        <th className="num" style={{width:100}}>存款同比</th>
        <th className="num" style={{width:92}}>拆借</th>
        <th className="num" style={{width:92}}>回购</th>
        <th style={{width:112}}>状态</th>
        <th style={{width:220}}>来源网站</th>
        <th style={{width:110}}>原文</th>
      </tr></thead><tbody>
        {records.slice().reverse().map(r=><tr key={r.period}>
          <td>{r.period}</td>
          <td className="num">{fmt(r.M2_BALANCE,2)}</td>
          <td className="num">{fmtPct(r.M2_YOY,1)}</td>
          <td className="num">{fmt(r.M1_BALANCE,2)}</td>
          <td className="num">{fmtPct(r.M1_YOY,1)}</td>
          <td className="num">{fmt(r.TSF_STOCK,2)}</td>
          <td className="num">{fmtPct(r.TSF_YOY,1)}</td>
          <td className="num">{fmt(r.RMB_LOAN_BALANCE,2)}</td>
          <td className="num">{fmtPct(r.RMB_LOAN_YOY,1)}</td>
          <td className="num">{fmt(r.RMB_DEPOSIT_BALANCE,2)}</td>
          <td className="num">{fmtPct(r.RMB_DEPOSIT_YOY,1)}</td>
          <td className="num">{fmtPct(r.IBOR_WEIGHTED_AVG,2)}</td>
          <td className="num">{fmtPct(r.PLEDGED_REPO_WEIGHTED_AVG,2)}</td>
          <td className="status-cell">{statusLabel(r.data_status)}</td>
          <td className="source-cell" title={r.source_title||r.source_url||r.source_name||''}>{sourceLabel(r)}</td>
          <td>{sourceLink(r)?<a className="source-link" href={sourceLink(r)} target="_blank">查看原文</a>:'—'}</td>
        </tr>)}
      </tbody></table></div>:<div className="empty">暂无明细。</div>}
      <SourceFooter/>
    </div>
  </div>
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
