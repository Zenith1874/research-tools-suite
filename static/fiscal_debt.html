<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>政府债务与央行货币化压力监控</title>
<script src="/vendor/react.min.js"></script>
<script src="/vendor/react-dom.min.js"></script>
<script src="/vendor/babel.min.js"></script>
<style>
:root{--bg:#07111f;--panel:#0d1728;--panel2:#111d31;--bd:#22324b;--text:#e5edf7;--muted:#8ea0b8;--dim:#b8c6d8;--blue:#4f8fff;--green:#00d4aa;--red:#ff5b78;--yellow:#f5a623}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif}.wrap{max-width:1460px;margin:0 auto;padding:20px}.top{display:flex;justify-content:space-between;gap:18px;align-items:flex-start}.title h1{font-size:21px;margin:0 0 7px}.sub,.muted{color:var(--muted);font-size:12px;line-height:1.7}.actions,.section-nav,.module-actions{display:flex;gap:8px;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:34px;background:var(--panel2);border:1px solid var(--bd);color:var(--text);border-radius:6px;padding:7px 11px;text-decoration:none;font:inherit;font-size:12px;cursor:pointer}.btn:hover{border-color:var(--blue)}.btn.primary{background:rgba(79,143,255,.15);border-color:rgba(79,143,255,.5)}.btn:disabled{opacity:.5;cursor:not-allowed}.section-nav{position:sticky;top:0;z-index:10;margin:16px 0;background:rgba(7,17,31,.96);padding:9px 0;border-bottom:1px solid var(--bd)}.section-nav a{color:var(--dim);font-size:12px;text-decoration:none;padding:6px 8px;border-radius:4px}.section-nav a:hover{background:var(--panel2);color:var(--text)}.banner{border:1px solid var(--bd);background:var(--panel);border-radius:6px;padding:10px 12px;margin:12px 0;font-size:12px;line-height:1.7}.banner.error{border-color:rgba(255,91,120,.5);color:#ffc1cb}.banner.warn{border-color:rgba(245,166,35,.45);color:#f8d89b}.section{scroll-margin-top:62px;padding:22px 0;border-top:1px solid var(--bd)}.section-head,.module-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.section h2{font-size:18px;margin:0}.section h3{font-size:14px;margin:0}.section-status{font-size:11px}.module{padding:18px 0}.module+.module{border-top:1px solid rgba(34,50,75,.7)}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin:12px 0}.metric{background:var(--panel);border:1px solid var(--bd);border-radius:6px;padding:13px;min-height:128px}.metric-label{font-size:11px;color:var(--muted);min-height:30px}.metric-value{font-size:22px;font-weight:750;font-variant-numeric:tabular-nums;margin:7px 0;overflow-wrap:anywhere}.metric-missing{font-size:13px;color:#ffc1cb;margin:12px 0}.metric-meta{font-size:10px;color:var(--muted);line-height:1.6;overflow-wrap:anywhere}.badge{display:inline-block;border:1px solid var(--bd);border-radius:4px;padding:1px 6px;font-size:10px;color:var(--muted)}.badge.official{color:#a9efd8;border-color:rgba(0,212,170,.55)}.badge.derived,.badge.partial{color:#f8d89b;border-color:rgba(245,166,35,.55)}.badge.missing,.badge.error{color:#ffc1cb;border-color:rgba(255,91,120,.55)}.badge.scenario,.badge.scenario_only{color:#b9d3ff;border-color:rgba(79,143,255,.55)}.source-link{color:#9ec2ff;text-decoration:none}.source-link:hover{text-decoration:underline}.formula{margin-top:7px}.formula summary{color:#f8d89b;font-size:10px;cursor:pointer}.formula code{display:block;margin-top:5px;white-space:normal;overflow-wrap:anywhere;color:var(--dim)}.table-title{font-size:12px;color:var(--dim);margin:14px 0 7px}.scroll{overflow:auto;border:1px solid rgba(34,50,75,.75);border-radius:6px}table{width:100%;border-collapse:collapse;font-size:11px;min-width:980px}th,td{padding:8px;border-bottom:1px solid rgba(34,50,75,.6);text-align:left;vertical-align:top}th{color:var(--muted);font-weight:600;white-space:nowrap;background:var(--panel)}td.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}.empty{padding:16px;border:1px dashed var(--bd);border-radius:6px;color:var(--muted);font-size:12px;margin-top:10px}.form{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin:12px 0}.field label{display:block;color:var(--muted);font-size:11px;margin-bottom:5px}.field input,.field select{width:100%;background:#081426;border:1px solid var(--bd);border-radius:6px;color:var(--text);padding:8px}.check{display:flex;align-items:center;gap:8px;color:var(--dim);font-size:12px}.check input{width:auto}.scenario-box{border-left:3px solid var(--blue);padding-left:14px}.coverage{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}.coverage-item{border-bottom:1px solid var(--bd);padding:8px 0;font-size:11px}.pending{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.pending-item{border:1px solid var(--bd);border-radius:6px;padding:12px;background:var(--panel)}
@media(max-width:1000px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}.form,.coverage{grid-template-columns:1fr 1fr}.top{flex-direction:column}.actions{justify-content:flex-start}}
@media(max-width:640px){.wrap{padding:14px}.grid,.form,.coverage,.pending{grid-template-columns:1fr}.section-nav{overflow:auto;flex-wrap:nowrap}.section-nav a{white-space:nowrap}.metric{min-height:0}.section-head,.module-head{flex-direction:column}}
.source-list{display:inline-block}.source-list summary{color:#9ec2ff;cursor:pointer;white-space:nowrap}.source-list div{display:grid;gap:4px;min-width:90px;padding-top:5px}
.chart{margin:12px 0;background:var(--panel);border:1px solid var(--bd);border-radius:6px;padding:12px}.chartsvg{width:100%;height:170px;display:block}.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--dim);margin-top:6px}.legend span{display:inline-flex;align-items:center;gap:5px}.legend i{width:12px;height:3px;border-radius:2px;display:inline-block}.charts2{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(max-width:900px){.charts2{grid-template-columns:1fr}}
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const {useEffect,useMemo,useState}=React;
const STATUS_NAME={official:'official',derived:'derived',missing:'missing',partial:'partial',available:'available',scenario:'scenario',scenario_only:'scenario only',error:'error'};
function fmt(v,d=1){if(v===null||v===undefined||v==='')return '—';if(typeof v==='string'&&Number.isNaN(Number(v)))return v;return Number(v).toLocaleString('zh-CN',{minimumFractionDigits:d,maximumFractionDigits:d})}
function Badge({status}){return <span className={'badge '+(status||'missing')}>{STATUS_NAME[status]||status||'missing'}</span>}
function SourceLink({url,urls,label='查看原文'}){let list=Array.isArray(urls)?urls:[];if(!list.length&&Array.isArray(url))list=url;if(!list.length&&typeof url==='string'){try{const parsed=JSON.parse(url);list=Array.isArray(parsed)?parsed:[url]}catch{list=[url]}}list=[...new Set(list.filter(v=>typeof v==='string'&&/^https?:\/\//.test(v)))];if(!list.length)return <span>—</span>;if(list.length===1)return <a className="source-link" href={list[0]} target="_blank" rel="noreferrer">{label}</a>;return <details className="source-list"><summary>{label}（{list.length}条）</summary><div>{list.map((item,i)=><a key={item} className="source-link" href={item} target="_blank" rel="noreferrer">原文 {i+1}</a>)}</div></details>}
function Metric({card}){const missing=['missing','error','not_available'].includes(card?.data_status);return <div className="metric">
  <div className="metric-label">{card?.label||'—'} <Badge status={card?.data_status}/></div>
  {missing?<div className="metric-missing">待接入可靠来源</div>:<div className="metric-value">{fmt(card?.value,card?.unit==='%'?2:1)}{card?.unit||''}</div>}
  <div className="metric-meta">期数：{card?.period||'—'}<br/>来源：{card?.source_name||'—'} · <SourceLink url={card?.source_url}/>{card?.warning&&<><br/>{card.warning}</>}</div>
  {card?.data_status==='derived'&&card?.formula&&<details className="formula"><summary>查看公式</summary><code>{card.formula}</code></details>}
</div>}
function Metrics({cards}){return <div className="grid">{(cards||[]).map((c,i)=><Metric key={c.label+'-'+i} card={c}/>)}</div>}
function Section({id,section,children}){return <section className="section" id={id}><div className="section-head"><div><h2>{section?.title}</h2><div className="muted">{(section?.warnings||[]).join('；')}</div></div><Badge status={section?.status}/></div>{children}</section>}
function ModuleHead({title,moduleCode,onUpdate,busy}){return <div className="module-head"><h3>{title}</h3>{moduleCode&&<button className="btn" disabled={busy} onClick={()=>onUpdate(moduleCode)}>更新此模块</button>}</div>}
function DataTable({title,rows,columns}){if(!rows?.length)return <div className="empty">{title}：暂无可靠数据。</div>;return <><div className="table-title">{title}</div><div className="scroll"><table><thead><tr>{columns.map(c=><th key={c[0]}>{c[1]}</th>)}</tr></thead><tbody>{rows.map((r,i)=><tr key={r.period||r.source_url||i}>{columns.map(([k,label,type])=><td key={k} className={type==='num'?'num':''}>{type==='source'?<SourceLink url={r[k]} urls={r.source_urls}/>:type==='status'?<Badge status={r[k]}/>:type==='num'?fmt(r[k],k.includes('rate')||k.includes('pct')?2:1):(r[k]??'—')}</td>)}</tr>)}</tbody></table></div></>}

function Chart({title,data,series,unit=''}){
  const pts=(data||[]).filter(d=>d.period&&series.some(s=>typeof d[s.key]==='number'));
  if(pts.length<2)return <div className="empty">{title}：可用 official/derived 数据点不足。</div>;
  const W=640,H=170,L=54,R=14,T=12,B=22,vals=[];
  series.forEach(s=>pts.forEach(d=>{if(typeof d[s.key]==='number')vals.push(d[s.key])}));
  let mn=Math.min(...vals),mx=Math.max(...vals);if(mn===mx){mn-=1;mx+=1}
  const sx=i=>L+(W-L-R)*(i/(pts.length-1));
  const sy=v=>T+(H-T-B)*(1-(v-mn)/(mx-mn));
  const pathOf=s=>{let dd='',pen=false;pts.forEach((d,i)=>{const v=d[s.key];if(typeof v==='number'){dd+=`${pen?'L':'M'}${sx(i).toFixed(1)},${sy(v).toFixed(1)} `;pen=true}else pen=false});return dd.trim()};
  const ticks=[mn,(mn+mx)/2,mx];
  return <div className="chart"><div className="table-title">{title}</div>
    <svg viewBox={`0 0 ${W} ${H}`} className="chartsvg" preserveAspectRatio="none">
      {ticks.map((t,i)=><g key={i}><line x1={L} x2={W-R} y1={sy(t)} y2={sy(t)} stroke="rgba(34,50,75,.7)" strokeWidth="0.5"/><text x={L-6} y={sy(t)+3} fill="#8ea0b8" fontSize="9" textAnchor="end">{fmt(t,Math.abs(t)>=1000?0:2)}</text></g>)}
      {series.map(s=><path key={s.key} d={pathOf(s)} fill="none" stroke={s.color} strokeWidth="1.7"/>)}
      <text x={L} y={H-6} fill="#8ea0b8" fontSize="9">{pts[0].period}</text>
      <text x={W-R} y={H-6} fill="#8ea0b8" fontSize="9" textAnchor="end">{pts[pts.length-1].period}</text>
    </svg>
    <div className="legend">{series.map(s=><span key={s.key}><i style={{background:s.color}}/>{s.label}</span>)}{unit&&<span className="muted">单位：{unit}</span>}</div>
  </div>;
}

function App(){
 const [payload,setPayload]=useState(null),[debug,setDebug]=useState(null),[busy,setBusy]=useState(false),[message,setMessage]=useState(''),[error,setError]=useState(''),[scenario,setScenario]=useState(null);
 const [form,setForm]=useState({scenario_name:'用户情景',initial_period:'',initial_cumulative_purchase:'',quarterly_treasury_purchase:'',local_bond_assumption_enabled:false,quarterly_local_bond_purchase:'',comparison_anchor:'foreign_exchange',quarters:8});
 async function load(){setError('');const [a,b]=await Promise.all([fetch('/api/fiscal-debt/data'),fetch('/api/fiscal-debt/debug')]);if(!a.ok||!b.ok)throw new Error(`HTTP ${a.status}/${b.status}`);setPayload(await a.json());setDebug(await b.json())}
 useEffect(()=>{load().catch(e=>setError('加载失败：'+e.message))},[]);
 async function update(moduleCode){setBusy(true);setMessage('正在更新官方数据…');setError('');try{const opts={method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(moduleCode?{module_code:moduleCode}:{})};const r=await fetch('/api/fiscal-debt/update',opts);const j=await r.json();if(!r.ok)throw new Error(j.error||`HTTP ${r.status}`);setMessage(moduleCode?`${moduleCode} 更新完成：${j.status}`:`全部来源更新完成：${j.status}`);await load()}catch(e){setError('更新失败：'+e.message)}finally{setBusy(false)}}
 async function runScenario(e){e.preventDefault();setBusy(true);setError('');try{const body={...form,quarters:Number(form.quarters),local_bond_assumption_enabled:Boolean(form.local_bond_assumption_enabled)};const r=await fetch('/api/fiscal-debt/projection/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const j=await r.json();if(!r.ok||!j.success)throw new Error(j.error||`HTTP ${r.status}`);setScenario(j)}catch(e){setError('情景推算失败：'+e.message)}finally{setBusy(false)}}
 const s=payload?.sections||{};const overview=s.government_debt_overview||{};const pressure=s.debt_rollover_pressure||{};const pboc=s.pboc_monetization_pressure||{};
 const local=pressure.tables?.local_government_debt||[],central=overview.tables?.central_government_debt||[],issueMonthly=pressure.tables?.treasury_monthly_issuance||[],issuePlanned=pressure.tables?.treasury_planned_only||[],issueDetails=pressure.tables?.treasury_issuance_details||[],balance=pboc.tables?.pboc_balance_sheet||[],omo=pboc.tables?.pboc_gov_bond_omo||[],repoCompleted=pboc.tables?.pboc_buyout_reverse_repo_completed_stock||[],repoProjection=pboc.tables?.pboc_buyout_reverse_repo_projection||[],repoActive=pboc.tables?.pboc_buyout_reverse_repo_active_operations||[],repoCards=pboc.repo_cards||[];
 const localCols=[['period','期数'],['local_bond_issuance_current_month','当月发行','num'],['official_principal_repayment_current_month','当月还本','num'],['official_interest_payment_current_month','当月付息','num'],['local_debt_balance_total','债务余额','num'],['local_general_debt_balance','一般债务','num'],['local_special_debt_balance','专项债务','num'],['data_status','状态','status'],['source_url','原文','source']];
 return <div className="wrap">
  <header className="top"><div className="title"><h1>政府债务与央行货币化压力监控</h1><div className="sub">政府债务、财政部国债发行、央行资产负债表、公开市场国债买卖和用户情景使用独立口径。</div></div><div className="actions"><a className="btn" href="/">返回首页</a><a className="btn" href="/fiscal-debt/debug">Debug</a><button className="btn" disabled={busy} onClick={()=>load().then(()=>setMessage('数据已刷新')).catch(e=>setError(e.message))}>刷新数据</button><button className="btn primary" disabled={busy} onClick={()=>update(null)}>更新官方数据</button></div></header>
  {message&&<div className="banner">{message}</div>}{error&&<div className="banner error">{error}</div>}
  <nav className="section-nav"><a href="#overview">1. 政府债务总览</a><a href="#pressure">2. 发行、还本、付息压力</a><a href="#pboc">3. 央行与货币化压力</a><a href="#scenario">4. 情景推算</a><a href="#sources">5. 数据来源与 Debug</a></nav>
  {!payload?<div className="empty">正在加载后端数据…</div>:<>
   <Section id="overview" section={overview}><Metrics cards={overview.cards}/><div className="module"><ModuleHead title="中央政府季度债务余额" moduleCode="central_government_debt" onUpdate={update} busy={busy}/><DataTable title="财政部中央政府债务" rows={central.slice().reverse()} columns={[['period','期数'],['central_government_debt_balance','中央政府债务余额','num'],['central_government_bond_balance','中央政府债券余额','num'],['data_status','状态','status'],['source_url','原文','source']]}/></div><div className="module"><ModuleHead title="地方政府债务余额" moduleCode="local_government_debt" onUpdate={update} busy={busy}/><DataTable title="地方政府债务历史" rows={local.slice().reverse()} columns={localCols}/></div><div className="module"><h3>趋势图（仅 official / derived）</h3><div className="charts2"><Chart title="地方政府债务余额趋势" data={local} series={[{key:'local_debt_balance_total',label:'地方债务余额',color:'var(--blue)'}]} unit="亿元"/><Chart title="一般债 vs 专项债余额" data={local} series={[{key:'local_general_debt_balance',label:'一般债',color:'var(--green)'},{key:'local_special_debt_balance',label:'专项债',color:'var(--yellow)'}]} unit="亿元"/></div><Chart title="中央政府债务余额趋势（季度）" data={central} series={[{key:'central_government_debt_balance',label:'中央债务余额',color:'var(--red)'},{key:'central_government_bond_balance',label:'中央债券余额',color:'var(--blue)'}]} unit="亿元"/></div></Section>
   <Section id="pressure" section={pressure}><div className="module"><ModuleHead title="地方政府债发行与偿付" moduleCode="local_government_debt" onUpdate={update} busy={busy}/><Metrics cards={pressure.cards?.slice(0,10)}/><DataTable title="地方债月度明细" rows={local.slice().reverse()} columns={localCols}/></div><div className="module"><ModuleHead title="国债发行与偿付" moduleCode="treasury_issuance" onUpdate={update} busy={busy}/><Metrics cards={pressure.cards?.slice(10)}/><DataTable title="国债月度实际发行" rows={issueMonthly.slice().reverse()} columns={[['period','期数'],['actual_issue_amount','实际发行额','num'],['records','结果记录数','num']]}/><DataTable title="已发现但未计入 actual 的国债计划公告" rows={issuePlanned.slice(0,40)} columns={[['issue_date','计划发行日'],['bond_name','债券'],['issue_kind','发行性质'],['planned_issue_amount','计划/额度','num'],['maturity_date','到期日'],['data_status','状态','status'],['source_url','原文','source']]}/><DataTable title="最近国债发行结果与计划" rows={issueDetails.slice(0,40)} columns={[['issue_date','发行日'],['bond_name','债券'],['issue_kind','发行性质'],['actual_issue_amount','实际发行额','num'],['planned_issue_amount','计划发行额','num'],['maturity_date','到期日'],['data_status','状态','status'],['source_url','原文','source']]}/></div></Section>
   <Section id="pboc" section={pboc}><div className="module"><ModuleHead title="央行资产负债表 / 货币锚" moduleCode="pboc_balance_sheet" onUpdate={update} busy={busy}/><div className="banner warn">“对政府债权”是央行资产负债表口径，不等于国债余额；资产负债表没有单列地方政府债。</div><Metrics cards={pboc.cards?.slice(0,5)}/><DataTable title="央行资产负债表月度数据" rows={balance.slice().reverse()} columns={[['period','期数'],['total_assets','总资产','num'],['foreign_assets','国外资产','num'],['foreign_exchange','外汇','num'],['claims_on_government','对政府债权','num'],['foreign_assets_pct','国外资产占比','num'],['claims_on_government_pct','对政府债权占比','num'],['source_url','原文','source']]}/><Chart title="央行资产负债表占比趋势" data={balance} series={[{key:'foreign_assets_pct',label:'国外资产占比',color:'var(--blue)'},{key:'foreign_exchange_pct',label:'外汇占比',color:'var(--green)'},{key:'claims_on_government_pct',label:'对政府债权占比',color:'var(--yellow)'},{key:'claims_on_other_depository_corporations_pct',label:'对其他存款性公司债权占比',color:'var(--red)'}]} unit="%"/></div><div className="module"><ModuleHead title="央行公开市场国债买卖" moduleCode="pboc_gov_bond_omo" onUpdate={update} busy={busy}/><Metrics cards={pboc.cards?.slice(5)}/><DataTable title="国债买卖月度公告" rows={omo.slice().reverse()} columns={[['period','期数'],['operation_status','操作状态'],['net_purchase_amount','净买入','num'],['cumulative_net_purchase_amount','累计净买入','num'],['data_status','状态','status'],['published_date','发布日期'],['source_url','原文','source']]}/></div><div className="module"><ModuleHead title="买断式逆回购流动性操作" moduleCode="pboc_buyout_reverse_repo" onUpdate={update} busy={busy}/><div className="muted">该子模块是流动性操作，不是财政部国债发行，也不计入政府债务余额。余额为尚未到期逐笔操作本金之和。</div><Metrics cards={repoCards}/><DataTable title="当前未到期逐笔操作（余额构成）" rows={repoActive} columns={[['buy_date','操作日期'],['amount','金额','num'],['term_months','期限（月）','num'],['term_days','期限（天）','num'],['maturity_date','到期日'],['maturity_date_status','到期日口径','status'],['source_url','原文','source']]}/><DataTable title="已完成月末余额" rows={repoCompleted.slice().reverse()} columns={[['period','期数'],['month_end_date','月末日'],['outstanding_amount','未到期本金余额','num'],['operation_count','未到期笔数','num'],['derived_maturity_count','含推算到期日笔数','num'],['data_status','状态','status'],['source_url','来源集合','source']]}/><DataTable title="未来月末到期路径预测" rows={repoProjection} columns={[['period','预测期'],['month_end_date','月末日'],['outstanding_amount','预测余额','num'],['operation_count','预计未到期笔数','num'],['data_status','状态','status'],['source_url','来源集合','source']]}/><Chart title="月末未到期本金余额趋势（历史实测 + 按已公告操作的到期预测）" data={repoCompleted.concat(repoProjection)} series={[{key:'outstanding_amount',label:'月末未到期本金',color:'var(--blue)'}]} unit="亿元"/></div></Section>
   <Section id="scenario" section={s.scenario_projection||{title:'央行买债压力情景推算',status:'scenario_only'}}><div className="scenario-box"><form onSubmit={runScenario}><div className="form"><div className="field"><label>情景名称</label><input value={form.scenario_name} onChange={e=>setForm({...form,scenario_name:e.target.value})}/></div><div className="field"><label>初始月份</label><input placeholder="留空则使用最新 official 月份" value={form.initial_period} onChange={e=>setForm({...form,initial_period:e.target.value})}/></div><div className="field"><label>初始累计央行国债净买入（亿元）</label><input type="number" placeholder="留空则使用 official 累计值" value={form.initial_cumulative_purchase} onChange={e=>setForm({...form,initial_cumulative_purchase:e.target.value})}/></div><div className="field"><label>假设每季度央行净买入国债（亿元）</label><input required type="number" value={form.quarterly_treasury_purchase} onChange={e=>setForm({...form,quarterly_treasury_purchase:e.target.value})}/></div><div className="field"><label>对比锚</label><select value={form.comparison_anchor} onChange={e=>setForm({...form,comparison_anchor:e.target.value})}><option value="foreign_exchange">外汇资产</option><option value="foreign_assets">国外资产</option><option value="total_assets">央行总资产</option></select></div><div className="field"><label>未来季度数</label><input type="number" min="1" max="40" value={form.quarters} onChange={e=>setForm({...form,quarters:e.target.value})}/></div></div><label className="check"><input type="checkbox" checked={form.local_bond_assumption_enabled} onChange={e=>setForm({...form,local_bond_assumption_enabled:e.target.checked})}/>启用“央行净买入地方债”用户假设</label>{form.local_bond_assumption_enabled&&<><div className="banner warn">央行资产负债表无地方政府债单列项目，此处仅为用户输入的情景假设，不代表官方事实。</div><div className="field"><label>假设每季度央行净买入地方债（亿元）</label><input required type="number" value={form.quarterly_local_bond_purchase} onChange={e=>setForm({...form,quarterly_local_bond_purchase:e.target.value})}/></div></>}<div style={{marginTop:12}}><button className="btn primary" disabled={busy}>运行情景推算</button></div></form>{scenario&&<><div className="banner warn">{scenario.warnings?.join('；')}</div><DataTable title="情景结果" rows={scenario.records} columns={[['period','未来季度'],['cumulative_treasury_purchase','累计国债买入假设','num'],['cumulative_local_bond_purchase','累计地方债买入假设','num'],['cumulative_assumed_purchase','累计买债规模','num'],['comparison_anchor','对比锚'],['anchor_value','锚值','num'],['purchase_to_anchor_pct','累计买债/锚（%）','num'],['data_status','状态','status']]}/></>}</div></Section>
   <Section id="sources" section={s.debug_summary||{title:'数据来源与 Debug',status:'available'}}><div className="actions"><a className="btn primary" href="/fiscal-debt/debug">打开完整 Debug</a><button className="btn" onClick={()=>load().then(()=>setMessage('Debug 已刷新'))}>刷新来源状态</button></div><div className="coverage">{Object.entries(payload.coverage||{}).map(([k,v])=><div className="coverage-item" key={k}><b>{k}</b><br/><span className="muted">{v?.earliest_period||'—'} 至 {v?.latest_period||'—'} · {v?.records??v?.months??0} 条/期</span></div>)}</div><div className="pending">{(debug?.missing_modules||[]).map(m=><div className="pending-item" key={m.module_code}><b>{m.module_code}</b><div className="muted">{m.reason}<br/>下一步来源：{m.next_source}</div></div>)}</div></Section>
  </>}
 </div>
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
