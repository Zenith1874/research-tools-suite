*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif}.wrap{max-width:1460px;margin:0 auto;padding:20px}.top{display:flex;justify-content:space-between;gap:18px;align-items:flex-start}.title h1{font-size:21px;margin:0 0 7px}.sub,.muted{color:var(--muted);font-size:12px;line-height:1.7}.actions,.section-nav,.module-actions{display:flex;gap:8px;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:34px;background:var(--panel2);border:1px solid var(--bd);color:var(--text);border-radius:6px;padding:7px 11px;text-decoration:none;font:inherit;font-size:12px;cursor:pointer}.btn:hover{border-color:var(--blue)}.btn.primary{background:rgba(79,143,255,.15);border-color:rgba(79,143,255,.5)}.btn:disabled{opacity:.5;cursor:not-allowed}.section-nav{position:sticky;top:var(--research-nav-height,0px);z-index:10;margin:16px 0;background:rgba(7,17,31,.96);padding:9px 0;border-bottom:1px solid var(--bd)}.section-nav a{color:var(--dim);font-size:12px;text-decoration:none;padding:6px 8px;border-radius:4px}.section-nav a:hover{background:var(--panel2);color:var(--text)}.banner{border:1px solid var(--bd);background:var(--panel);border-radius:6px;padding:10px 12px;margin:12px 0;font-size:12px;line-height:1.7}.banner.error{border-color:rgba(255,91,120,.5);color:#ffc1cb}.banner.warn{border-color:rgba(245,166,35,.45);color:#f8d89b}.section{scroll-margin-top:calc(var(--research-nav-height,0px) + 62px);padding:22px 0;border-top:1px solid var(--bd)}.section-head,.module-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.section h2{font-size:18px;margin:0}.section h3{font-size:14px;margin:0}.section-status{font-size:11px}.module{padding:18px 0}.module+.module{border-top:1px solid rgba(34,50,75,.7)}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin:12px 0}.metric{background:var(--panel);border:1px solid var(--bd);border-radius:6px;padding:13px;min-height:128px}.metric-label{font-size:11px;color:var(--muted);min-height:30px}.metric-value{font-size:22px;font-weight:750;font-variant-numeric:tabular-nums;margin:7px 0;overflow-wrap:anywhere}.metric-missing{font-size:13px;color:#ffc1cb;margin:12px 0}.metric-meta{font-size:10px;color:var(--muted);line-height:1.6;overflow-wrap:anywhere}.badge{display:inline-block;border:1px solid var(--bd);border-radius:4px;padding:1px 6px;font-size:10px;color:var(--muted)}.badge.official{color:#a9efd8;border-color:rgba(0,212,170,.55)}.badge.derived,.badge.partial{color:#f8d89b;border-color:rgba(245,166,35,.55)}.badge.missing,.badge.error{color:#ffc1cb;border-color:rgba(255,91,120,.55)}.badge.scenario,.badge.scenario_only{color:#b9d3ff;border-color:rgba(79,143,255,.55)}.source-link{color:#9ec2ff;text-decoration:none}.source-link:hover{text-decoration:underline}.formula{margin-top:7px}.formula summary{color:#f8d89b;font-size:10px;cursor:pointer}.formula code{display:block;margin-top:5px;white-space:normal;overflow-wrap:anywhere;color:var(--dim)}.table-title{font-size:12px;color:var(--dim);margin:14px 0 7px}.scroll{overflow:auto;border:1px solid rgba(34,50,75,.75);border-radius:6px}table{width:100%;border-collapse:collapse;font-size:11px;min-width:980px}th,td{padding:8px;border-bottom:1px solid rgba(34,50,75,.6);text-align:left;vertical-align:top}th{color:var(--muted);font-weight:600;white-space:nowrap;background:var(--panel)}td.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}.empty{padding:16px;border:1px dashed var(--bd);border-radius:6px;color:var(--muted);font-size:12px;margin-top:10px}.form{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin:12px 0}.field label{display:block;color:var(--muted);font-size:11px;margin-bottom:5px}.field input,.field select{width:100%;background:#081426;border:1px solid var(--bd);border-radius:6px;color:var(--text);padding:8px}.check{display:flex;align-items:center;gap:8px;color:var(--dim);font-size:12px}.check input{width:auto}.scenario-box{border-left:3px solid var(--blue);padding-left:14px}.coverage{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}.coverage-item{border-bottom:1px solid var(--bd);padding:8px 0;font-size:11px}.pending{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.pending-item{border:1px solid var(--bd);border-radius:6px;padding:12px;background:var(--panel)}
@media(max-width:1000px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}.form,.coverage{grid-template-columns:1fr 1fr}.top{flex-direction:column}.actions{justify-content:flex-start}}
@media(max-width:640px){.wrap{padding:14px}.grid,.form,.coverage,.pending{grid-template-columns:1fr}.section-nav{overflow:auto;flex-wrap:nowrap}.section-nav a{white-space:nowrap}.metric{min-height:0}.section-head,.module-head{flex-direction:column}}
.source-list{display:inline-block}.source-list summary{color:#9ec2ff;cursor:pointer;white-space:nowrap}.source-list div{display:grid;gap:4px;min-width:90px;padding-top:5px}

.chart-subtitle{color:var(--muted);font-size:10px;line-height:1.6;margin-top:-3px}.explorer-toolbar{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;flex-wrap:wrap;margin:16px 0 8px}.control-group{display:grid;gap:5px}.control-label{font-size:10px;color:var(--muted)}.segmented{display:flex;gap:5px;flex-wrap:wrap}.segmented button{border:1px solid var(--bd);background:var(--panel);color:var(--dim);border-radius:5px;padding:6px 9px;font:inherit;font-size:11px;cursor:pointer}.segmented button.active{border-color:var(--blue);background:rgba(79,143,255,.15);color:var(--text)}.forecast-note{font-size:11px;color:var(--dim);line-height:1.7;border-left:3px solid var(--yellow);padding:8px 11px;background:rgba(245,166,35,.05)}
.tip{position:absolute;top:8px;transform:translateX(-50%);background:rgba(13,23,40,.96);border:1px solid var(--bd);border-radius:6px;padding:6px 10px;font-size:11px;line-height:1.7;pointer-events:none;white-space:nowrap;z-index:5}.tip b{color:var(--dim);font-size:10px}.tip i{width:8px;height:8px;border-radius:2px;display:inline-block;margin-right:5px}.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--dim);margin-top:6px}.legend span{display:inline-flex;align-items:center;gap:5px}.legend i{width:12px;height:3px;border-radius:2px;display:inline-block}.charts2{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(max-width:900px){.charts2{grid-template-columns:1fr}}

<body><div id="root"></div>
<script type="text/babel">
const {useEffect,useMemo,useState}=React;
const STATUS_NAME={official:'official',derived:'derived',missing:'missing',partial:'partial',available:'available',scenario:'scenario',scenario_only:'scenario only',error:'error'};
function fmt(v,d=1){if(v===null||v===undefined||v==='')return '—';if(typeof v==='string'&&Number.isNaN(Number(v)))return v;return Number(v).toLocaleString('zh-CN',{minimumFractionDigits:d,maximumFractionDigits:d})}
function Badge({status}){return <span className={'badge '+(status||'missing')}>{STATUS_NAME[status]||status||'missing'}</span>}
function SourceLink({url,urls,label='查看原文'}){let list=Array.isArray(urls)?urls:[];if(!list.length&&Array.isArray(url))list=url;if(!list.length&&typeof url==='string'){try{const parsed=JSON.parse(url);list=Array.isArray(parsed)?parsed:[url]}catch{list=[url]}}list=[...new Set(list.filter(v=>typeof v==='string'&&/^https?:\/\//.test(v)))];if(!list.length)return <span>—</span>;if(list.length===1)return <a className="source-link" href={list[0]} target="_blank" rel="noreferrer">{label}</a>;return <details className="source-list"><summary>{label}（{list.length}条）</summary><div>{list.map((item,i)=><a key={item} className="source-link" href={item} target="_blank" rel="noreferrer">原文 {i+1}</a>)}</div></details>}
function Metric({card}){const missing=['missing','error','not_available'].includes(card?.data_status);return <div className="metric">
  <div className="metric-label">{card?.label||'—'} <Badge status={card?.data_status}/></div>
  {missing?<div className="metric-missing">待接入可靠来源</div>:<div className="metric-value">{fmt(card?.value,card?.unit==='%'?2:1)}{card?.unit||''}</div>}
  <div className="metric-meta">期数：{card?.period||'—'}<br/>来源：{card?.source_name||'—'} · <SourceLink url={card?.source_url}/>{card?.warning&&<><br/>{card.warning}</>}</div>
  {card?.data_status==='derived'&&card?.formula&&<details className="formula"><summary>查看公式</summary><code>{card.formula}</code></details>}
</div>}
function Metrics({cards}){return <div className="grid">{(cards||[]).map((c,i)=><Metric key={c.label+'-'+i} card={c}/>)}</div>}
function Section({id,section,children}){return <section className="section" id={id}><div className="section-head"><div><h2>{section?.title}</h2><div className="muted">{(section?.warnings||[]).join('；')}</div></div><Badge status={section?.status}/></div>{children}</section>}
function ModuleHead({title,moduleCode,onUpdate,busy}){return <div className="module-head"><h3>{title}</h3>{moduleCode&&<button className="btn" disabled={busy} onClick={()=>onUpdate(moduleCode)}>更新此模块</button>}</div>}
function csvDownload(title,rows,columns){
  const esc=v=>{const s=v===null||v===undefined?'':String(v);return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s};
  const head=columns.map(c=>esc(c[1])).join(',');
  const body=rows.map(r=>columns.map(([k])=>esc(Array.isArray(r[k])?r[k].join(';'):r[k])).join(',')).join('\n');
  const blob=new Blob(['﻿'+head+'\n'+body],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=title.replace(/[\\/:*?"<>|\s]+/g,'_')+'.csv';a.click();URL.revokeObjectURL(a.href);
}
function DataTable({title,rows,columns}){if(!rows?.length)return <div className="empty">{title}：暂无可靠数据。</div>;return <><div className="table-title">{title} <a style={{color:'#9ec2ff',cursor:'pointer',fontSize:11,marginLeft:8}} onClick={()=>csvDownload(title,rows,columns)}>⬇ CSV</a></div><div className="scroll"><table><thead><tr>{columns.map(c=><th key={c[0]}>{c[1]}</th>)}</tr></thead><tbody>{rows.map((r,i)=><tr key={r.period||r.source_url||i}>{columns.map(([k,label,type])=><td key={k} className={type==='num'?'num':''}>{type==='source'?<SourceLink url={r[k]} urls={r.source_urls}/>:type==='status'?<Badge status={r[k]}/>:type==='num'?fmt(r[k],k.includes('rate')||k.includes('pct')?2:1):(r[k]??'—')}</td>)}</tr>)}</tbody></table></div></>}

function Chart({title,subtitle='',data,series,unit='',showZero=false}){
  const [hover,setHover]=useState(null);   // hook 必须在任何 return 之前
  const pts=(data||[]).filter(d=>d.period&&series.some(s=>typeof d[s.key]==='number'));
  if(pts.length<2)return <div className="empty">{title}：可用 official/derived 数据点不足。</div>;
  const W=640,H=170,L=54,R=14,T=12,B=22,vals=[];
  series.forEach(s=>pts.forEach(d=>{if(typeof d[s.key]==='number')vals.push(d[s.key])}));
  let mn=Math.min(...vals),mx=Math.max(...vals);if(showZero){mn=Math.min(mn,0);mx=Math.max(mx,0)}if(mn===mx){mn-=1;mx+=1}
  const sx=i=>L+(W-L-R)*(i/(pts.length-1));
  const sy=v=>T+(H-T-B)*(1-(v-mn)/(mx-mn));
  const pathOf=s=>{let dd='',pen=false;pts.forEach((d,i)=>{const v=d[s.key];if(typeof v==='number'){dd+=`${pen?'L':'M'}${sx(i).toFixed(1)},${sy(v).toFixed(1)} `;pen=true}else pen=false});return dd.trim()};
  const ticks=[mn,(mn+mx)/2,mx];
  const onMove=e=>{const r=e.currentTarget.getBoundingClientRect();const x=(e.clientX-r.left)/r.width*W;const i=Math.round((x-L)/(W-L-R)*(pts.length-1));setHover(Math.max(0,Math.min(pts.length-1,i)))};
  const hp=hover===null?null:pts[hover];
  const tipLeft=hover===null?0:Math.max(10,Math.min(90,sx(hover)/W*100));
  return <div className="chart"><div className="table-title">{title}</div>{subtitle&&<div className="chart-subtitle">{subtitle}</div>}
    <div style={{position:'relative'}}>
    <svg viewBox={`0 0 ${W} ${H}`} className="chartsvg" preserveAspectRatio="none" onMouseMove={onMove} onMouseLeave={()=>setHover(null)}>
      {ticks.map((t,i)=><g key={i}><line x1={L} x2={W-R} y1={sy(t)} y2={sy(t)} stroke="rgba(34,50,75,.7)" strokeWidth="0.5"/><text x={L-6} y={sy(t)+3} fill="#8ea0b8" fontSize="9" textAnchor="end">{fmt(t,Math.abs(t)>=1000?0:2)}</text></g>)}
      {showZero&&mn<0&&mx>0&&<line x1={L} x2={W-R} y1={sy(0)} y2={sy(0)} stroke="#b8c6d8" strokeWidth="0.8"/>}
      {series.map(s=><path key={s.key} d={pathOf(s)} fill="none" stroke={s.color} strokeWidth="1.7" strokeDasharray={s.dash||''}/>)}
      {hp&&<g><line x1={sx(hover)} x2={sx(hover)} y1={T} y2={H-B} stroke="#8ea0b8" strokeWidth="0.6" strokeDasharray="3,3"/>
        {series.map(s=>typeof hp[s.key]==='number'?<circle key={s.key} cx={sx(hover)} cy={sy(hp[s.key])} r="3.2" fill={s.color} stroke="#07111f" strokeWidth="1.2"/>:null)}</g>}
      <text x={L} y={H-6} fill="#8ea0b8" fontSize="9">{pts[0].period}</text>
      <text x={W-R} y={H-6} fill="#8ea0b8" fontSize="9" textAnchor="end">{pts[pts.length-1].period}</text>
    </svg>
    {hp&&<div className="tip" style={{left:tipLeft+'%'}}><b>{hp.period}</b>{series.map(s=>typeof hp[s.key]==='number'?<div key={s.key}><i style={{background:s.color}}/>{s.label}：{fmt(hp[s.key],Math.abs(hp[s.key])>=1000?0:2)} {unit}</div>:null)}</div>}
    </div>
    <div className="legend">{series.map(s=><span key={s.key}><i style={s.dash?{background:'none',borderTop:`2px dashed ${s.color}`,height:0}:{background:s.color}}/>{s.label}</span>)}{unit&&<span className="muted">单位：{unit}</span>}</div>
  </div>;
}

function BarChart({title,subtitle='',data,series,unit='',stacked=false}){
 const pts=(data||[]).filter(d=>d.period&&series.some(s=>typeof d[s.key]==='number'));
 if(!pts.length)return <div className="empty">{title}：暂无可靠数据。</div>;
 const W=640,H=190,L=58,R=14,T=16,B=28;
 const totals=pts.map(d=>stacked?series.reduce((sum,s)=>sum+(typeof d[s.key]==='number'?d[s.key]:0),0):Math.max(...series.map(s=>typeof d[s.key]==='number'?d[s.key]:0)));
 const mx=Math.max(...totals,1),sy=v=>T+(H-T-B)*(1-v/mx),group=(W-L-R)/pts.length;
 return <div className="chart"><div className="table-title">{title}</div>{subtitle&&<div className="chart-subtitle">{subtitle}</div>}<svg viewBox={`0 0 ${W} ${H}`} className="chartsvg" preserveAspectRatio="none">
  {[0,mx/2,mx].map((t,i)=><g key={i}><line x1={L} x2={W-R} y1={sy(t)} y2={sy(t)} stroke="rgba(34,50,75,.7)" strokeWidth=".5"/><text x={L-6} y={sy(t)+3} fill="#8ea0b8" fontSize="9" textAnchor="end">{fmt(t,0)}</text></g>)}
  {pts.map((d,i)=>{const x0=L+i*group+group*.15,bw=group*.7;let acc=0;return <g key={d.period}>{series.map((s,j)=>{const v=typeof d[s.key]==='number'?d[s.key]:0;const x=stacked?x0:x0+j*bw/series.length,w=stacked?bw:bw/series.length-1,y=stacked?sy(acc+v):sy(v),h=stacked?sy(acc)-sy(acc+v):sy(0)-sy(v);acc+=v;return <rect key={s.key} x={x} y={y} width={Math.max(w,1)} height={Math.max(h,0)} fill={s.color}><title>{d.period} · {s.label}：{fmt(v,1)} {unit}</title></rect>})}<text x={x0+bw/2} y={H-8} fill="#8ea0b8" fontSize="8" textAnchor="middle">{d.period}</text></g>})}
 </svg><div className="legend">{series.map(s=><span key={s.key}><i style={{background:s.color}}/>{s.label}</span>)}{unit&&<span className="muted">单位：{unit}</span>}</div></div>
}

const BUDGET_ACCOUNTS={
 general:{label:'一般公共预算',revenue:'general_budget_revenue_ytd',expenditure:'general_budget_expenditure_ytd',balance:'general_budget_balance_ytd'},
 fund:{label:'政府性基金',revenue:'gov_fund_revenue_ytd',expenditure:'gov_fund_expenditure_ytd',balance:'gov_fund_balance_ytd'},
 combined:{label:'两本账简单相加',revenue:'combined_budget_revenue_ytd',expenditure:'combined_budget_expenditure_ytd',balance:'combined_budget_balance_ytd'}
};
function BudgetExplorer({section}){
 const [accountCode,setAccountCode]=useState('combined'),[scenarioCode,setScenarioCode]=useState('baseline');
 const account=BUDGET_ACCOUNTS[accountCode],annual=section?.tables?.annual||[],forecast=section?.forecast||{};
 const scenario=forecast?.scenarios?.[scenarioCode]||{records:[]};
 const actualStart=annual.find(r=>typeof r[account.revenue]==='number'&&typeof r[account.expenditure]==='number')?.period||'—';
 const chartData=useMemo(()=>{
   const byPeriod={};
   annual.forEach(r=>{byPeriod[r.period]={period:r.period,revenue_actual:r[account.revenue],expenditure_actual:r[account.expenditure],balance_actual:r[account.balance]}});
   const anchor=annual[annual.length-1];
   if(anchor){byPeriod[anchor.period]={...(byPeriod[anchor.period]||{period:anchor.period}),revenue_forecast:anchor[account.revenue],expenditure_forecast:anchor[account.expenditure],balance_forecast:anchor[account.balance]}}
   ;(scenario.records||[]).forEach(r=>{byPeriod[r.period]={...(byPeriod[r.period]||{period:r.period}),revenue_forecast:r[account.revenue],expenditure_forecast:r[account.expenditure],balance_forecast:r[account.balance]}});
   return Object.values(byPeriod).sort((a,b)=>String(a.period).localeCompare(String(b.period)));
 },[annual,scenarioCode,accountCode]);
 const selectedLabel=forecast?.scenarios?.[scenarioCode]?.label||scenarioCode,cashflow=section?.debt_service_cashflow||{};
 const interestScenario=cashflow?.interest_scenarios?.[scenarioCode]||{records:[]};
 const burdenData=useMemo(()=>{
   const byPeriod={};(cashflow.history||[]).forEach(r=>{byPeriod[r.period]={period:r.period,burden_actual:r.interest_to_revenue_pct}});
   (interestScenario.records||[]).forEach(r=>{byPeriod[r.period]={...(byPeriod[r.period]||{period:r.period}),burden_scenario:r.interest_to_revenue_pct}});
   const anchor=(cashflow.history||[]).filter(r=>typeof r.interest_to_revenue_pct==='number').slice(-1)[0];if(anchor)byPeriod[anchor.period]={...(byPeriod[anchor.period]||{period:anchor.period}),burden_scenario:anchor.interest_to_revenue_pct};
   return Object.values(byPeriod).sort((a,b)=>a.period.localeCompare(b.period));
 },[scenarioCode,section]);
 const detailRows=useMemo(()=>{
   const history=(cashflow.history||[]).map(r=>({...r,record_type:'历史'}));
   const future=(interestScenario.records||[]).map(r=>({...r,record_type:selectedLabel+'情景'}));return history.concat(future);
 },[scenarioCode,section]);
 return <div>
   <div className="explorer-toolbar"><div className="control-group"><div className="control-label">查看账本</div><div className="segmented">{Object.entries(BUDGET_ACCOUNTS).map(([code,item])=><button key={code} className={accountCode===code?'active':''} onClick={()=>setAccountCode(code)}>{item.label}</button>)}</div></div><div className="control-group"><div className="control-label">未来情景</div><div className="segmented">{Object.entries(forecast?.scenarios||{}).map(([code,item])=><button key={code} className={scenarioCode===code?'active':''} onClick={()=>setScenarioCode(code)}>{item.label}</button>)}</div></div></div>
   <div className="charts2"><Chart title={`${account.label}：年度收入与支出`} subtitle={`${actualStart}—${forecast.anchor_year||'—'} 为财政部年度报告；${Number(forecast.anchor_year||0)+1} 年起虚线为“${selectedLabel}”情景，单位：亿元。`} data={chartData} series={[{key:'revenue_actual',label:'收入（历史）',color:'var(--blue)'},{key:'expenditure_actual',label:'支出（历史）',color:'var(--yellow)'},{key:'revenue_forecast',label:'收入（情景）',color:'var(--blue)',dash:'6,4'},{key:'expenditure_forecast',label:'支出（情景）',color:'var(--yellow)',dash:'6,4'}]} unit="亿元"/><Chart title={`${account.label}：年度收支差额（收入 − 支出）`} subtitle="负值表示当年支出大于收入；该差额不等于法定预算赤字。" data={chartData} series={[{key:'balance_actual',label:'历史差额',color:'#a78bfa'},{key:'balance_forecast',label:`${selectedLabel}情景`,color:'var(--yellow)',dash:'6,4'}]} unit="亿元" showZero={true}/></div>
   <div className="forecast-note">预测锚点：{forecast.latest_ytd_period?`${forecast.latest_ytd_period} 对比 ${forecast.comparison_ytd_period}`:'最近完整年度'}。{(forecast.warnings||[]).join(' ')}</div>
   <div className="module"><h3>还本付息压力路径</h3><div className="banner warn">付息与到期为估计口径，详见各卡方法。{(cashflow.warnings||[]).slice(1).join(' ')}</div><Metrics cards={cashflow.cards||[]}/><div className="charts2"><Chart title="付息/一般公共预算收入：历史与三情景路径" subtitle={`当前显示“${selectedLabel}”；未来值仅在余额增速与利率维持当前中位水平时成立。`} data={burdenData} series={[{key:'burden_actual',label:'历史实际',color:'var(--green)'},{key:'burden_scenario',label:`${selectedLabel}情景`,color:'var(--blue)',dash:'6,4'}]} unit="%"/><BarChart title="未来五年到期壁：国债下限 + 地方债粗估" subtitle="国债仅含2024年起已抓逐只债券；地方债按余额/平均剩余期限均匀摊还。" data={cashflow.maturity_wall||[]} series={[{key:'treasury_maturity_lower_bound',label:'国债到期（下限）',color:'var(--blue)'},{key:'local_maturity_even_amortisation',label:'地方债到期（粗估）',color:'var(--yellow)'}]} unit="亿元"/></div><DataTable title={`年度还本付息明细（历史 + ${selectedLabel}情景）`} rows={detailRows} columns={[["period","年份"],["record_type","口径"],["budget_interest_expenditure","一般预算付息（历史）","num"],["local_principal_repayment","地方债还本（历史）","num"],["local_interest_payment","地方债付息（历史）","num"],["local_interest_estimate","地方债付息估计","num"],["treasury_interest_lower_bound_estimate","国债付息估计（下限）","num"],["total_interest_estimate","付息合计估计","num"],["general_budget_revenue_scenario","情景收入","num"],["interest_to_revenue_pct","付息/收入","num"],["data_status","状态","status"],["source_url","原文","source"]]}/></div>
 </div>
}

function App(){
 const [payload,setPayload]=useState(null),[debug,setDebug]=useState(null),[busy,setBusy]=useState(false),[message,setMessage]=useState(''),[error,setError]=useState(''),[scenario,setScenario]=useState(null);
 const [form,setForm]=useState({scenario_name:'用户情景',initial_period:'',initial_cumulative_purchase:'',quarterly_treasury_purchase:'',local_bond_assumption_enabled:false,quarterly_local_bond_purchase:'',comparison_anchor:'foreign_exchange',quarters:8});
 async function load(){setError('');const [a,b]=await Promise.all([fetch('/api/fiscal-debt/data'),fetch('/api/fiscal-debt/debug')]);if(!a.ok||!b.ok)throw new Error(`HTTP ${a.status}/${b.status}`);setPayload(await a.json());setDebug(await b.json())}
 useEffect(()=>{load().catch(e=>setError('加载失败：'+e.message))},[]);
 async function update(moduleCode){setBusy(true);setMessage('正在更新官方数据…');setError('');try{
   const opts={method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(moduleCode?{module_code:moduleCode}:{})};
   const r=await fetch('/api/fiscal-debt/update',opts);const j=await r.json();if(!r.ok)throw new Error(j.error||`HTTP ${r.status}`);
   if(j.status==='already_running'){setMessage('已有更新任务在后台运行('+(j.running||[]).join(',')+')，稍后自动刷新…');}
   else setMessage((moduleCode||'全部来源')+' 已在后台更新，完成后自动刷新…');
   const jobName=j.job||moduleCode||'fiscal_all';
   // 轮询 /api/jobs 直到任务结束，再拉取新数据
   const poll=setInterval(async()=>{
     try{
       const js=await (await fetch('/api/jobs')).json();
       const job=js.jobs&&js.jobs[jobName];
       if(job&&job.status!=='running'){
         clearInterval(poll);
         if(job.status==='done'){await load();setMessage((moduleCode||'全部来源')+' 更新完成，数据已刷新');}
         else setError('更新失败：'+(job.error||'未知错误'));
         setBusy(false);
       }else if(!job&&!js.update_lock_busy){clearInterval(poll);await load();setBusy(false);setMessage('更新结束，数据已刷新');}
     }catch(e){}
   },3000);
 }catch(e){setError('更新失败：'+e.message);setBusy(false)}}
 async function runScenario(e){e.preventDefault();setBusy(true);setError('');try{const body={...form,quarters:Number(form.quarters),local_bond_assumption_enabled:Boolean(form.local_bond_assumption_enabled)};const r=await fetch('/api/fiscal-debt/projection/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const j=await r.json();if(!r.ok||!j.success)throw new Error(j.error||`HTTP ${r.status}`);setScenario(j)}catch(e){setError('情景推算失败：'+e.message)}finally{setBusy(false)}}
 const s=payload?.sections||{};const budget=s.fiscal_revenue_expenditure||{};const overview=s.government_debt_overview||{};const pressure=s.debt_rollover_pressure||{};const pboc=s.pboc_monetization_pressure||{};
 const local=pressure.tables?.local_government_debt||[],central=overview.tables?.central_government_debt||[],issueMonthly=pressure.tables?.treasury_monthly_issuance||[],issuePlanned=pressure.tables?.treasury_planned_only||[],issueDetails=pressure.tables?.treasury_issuance_details||[],panorama=pressure.tables?.annual_borrow_repay_panorama||[],balance=pboc.tables?.pboc_balance_sheet||[],omo=pboc.tables?.pboc_gov_bond_omo||[],repoCompleted=pboc.tables?.pboc_buyout_reverse_repo_completed_stock||[],repoProjection=pboc.tables?.pboc_buyout_reverse_repo_projection||[],repoActive=pboc.tables?.pboc_buyout_reverse_repo_active_operations||[],repoCards=pboc.repo_cards||[],liquidityTimeline=pboc.tables?.new_liquidity_timeline||[],nonFxChanges=pboc.tables?.non_fx_channel_changes||[];
 const localCols=[['period','期数'],['local_bond_issuance_current_month','当月发行','num'],['official_principal_repayment_current_month','当月还本','num'],['official_interest_payment_current_month','当月付息','num'],['local_debt_balance_total','债务余额','num'],['local_general_debt_balance','一般债务','num'],['local_special_debt_balance','专项债务','num'],['data_status','状态','status'],['source_url','原文','source']];
 return <div className="wrap">
  <header className="top"><div className="title"><h1>财政收支、政府债务与央行压力监控</h1><div className="sub">先看一般公共预算与政府性基金每年收支差额，再看显性债务、偿付压力和央行相关口径；official、derived 与 scenario 严格分开。</div></div><div className="actions"><a className="btn" href="/">返回首页</a><a className="btn" href="/fiscal-debt/debug">Debug</a><button className="btn" disabled={busy} onClick={()=>load().then(()=>setMessage('数据已刷新')).catch(e=>setError(e.message))}>刷新数据</button><button className="btn primary" disabled={busy} onClick={()=>update(null)}>更新官方数据</button></div></header>
  {message&&<div className="banner">{message}</div>}{error&&<div className="banner error">{error}</div>}
  <nav className="section-nav"><a href="#fiscal">1. 财政收入与支出</a><a href="#overview">2. 政府债务总览</a><a href="#pressure">3. 发行、还本、付息压力</a><a href="#pboc">4. 央行与流动性投放</a><a href="#scenario">5. 央行买债情景</a><a href="#sources">6. 数据来源与 Debug</a></nav>
  {!payload?<div className="empty">正在加载后端数据…</div>:<>
   <Section id="fiscal" section={budget}><div className="module"><ModuleHead title="全国财政收支年度历史与未来情景" moduleCode="fiscal_budget" onUpdate={update} busy={busy}/><Metrics cards={budget.cards||[]}/><BudgetExplorer section={budget}/><DataTable title="年度财政收支（财政部官方值 + derived 差额）" rows={(budget.tables?.annual||[]).slice().reverse()} columns={[["period","年份"],["general_budget_revenue_ytd","一般公共预算收入","num"],["general_budget_expenditure_ytd","一般公共预算支出","num"],["general_budget_balance_ytd","一般公共预算差额","num"],["gov_fund_revenue_ytd","政府性基金收入","num"],["gov_fund_expenditure_ytd","政府性基金支出","num"],["gov_fund_balance_ytd","政府性基金差额","num"],["combined_budget_balance_ytd","两本账差额(简单相加)","num"],["data_status","年度覆盖","status"],["source_url","原文","source"]]}/></div><div className="module"><h3>本年最新进度（YTD 累计）</h3><div className="muted">用于观察年内进度，不把 YTD 数值和完整年度直接比较。</div><Metrics cards={(budget.latest_ytd_cards||[]).slice(0,6)}/><DataTable title="财政收支历史（YTD）" rows={(budget.tables?.ytd||[]).slice().reverse()} columns={[["period","截止月"],["general_budget_revenue_ytd","一般公共预算收入","num"],["general_budget_expenditure_ytd","一般公共预算支出","num"],["general_budget_balance_ytd","一般公共预算差额","num"],["gov_fund_revenue_ytd","政府性基金收入","num"],["gov_fund_expenditure_ytd","政府性基金支出","num"],["gov_fund_balance_ytd","政府性基金差额","num"],["combined_budget_balance_ytd","两本账差额(简单相加)","num"],["source_url","原文","source"]]}/></div></Section>
   <Section id="overview" section={overview}><Metrics cards={overview.cards}/><div className="module"><ModuleHead title="中央政府季度债务余额" moduleCode="central_government_debt" onUpdate={update} busy={busy}/><DataTable title="财政部中央政府债务" rows={central.slice().reverse()} columns={[['period','期数'],['central_government_debt_balance','中央政府债务余额','num'],['central_government_bond_balance','中央政府债券余额','num'],['data_status','状态','status'],['source_url','原文','source']]}/></div><div className="module"><ModuleHead title="地方政府债务余额" moduleCode="local_government_debt" onUpdate={update} busy={busy}/><DataTable title="地方政府债务历史" rows={local.slice().reverse()} columns={localCols}/></div><div className="module"><h3>趋势图（仅 official / derived）</h3><div className="charts2"><Chart title="地方政府债务余额趋势" data={local} series={[{key:'local_debt_balance_total',label:'地方债务余额',color:'var(--blue)'}]} unit="亿元"/><Chart title="一般债 vs 专项债余额" data={local} series={[{key:'local_general_debt_balance',label:'一般债',color:'var(--green)'},{key:'local_special_debt_balance',label:'专项债',color:'var(--yellow)'}]} unit="亿元"/></div><Chart title="中央政府债务余额趋势（季度）" data={central} series={[{key:'central_government_debt_balance',label:'中央债务余额',color:'var(--red)'},{key:'central_government_bond_balance',label:'中央债券余额',color:'var(--blue)'}]} unit="亿元"/></div></Section>
   <Section id="pressure" section={pressure}><div className="module"><h3>每年借多少、还多少：政府债券现金流全景</h3><div className="banner warn">国债发行、到期只覆盖2024年起已抓明细，属于下限；缺失年份保持空白。</div><BarChart title="地方债发行结构（新增 + 再融资）" subtitle="缺失年度保持空白；不使用其他年份或商业口径填补。" data={panorama} series={[{key:'local_new_issuance',label:'新增债券',color:'var(--blue)'},{key:'local_refinancing_issuance',label:'再融资债券',color:'var(--yellow)'}]} unit="亿元" stacked={true}/><DataTable title="年度政府债券借、还、付息与净增全景" rows={panorama.slice().reverse()} columns={[["period","年份"],["local_new_issuance","地方新增发行","num"],["local_refinancing_issuance","地方再融资发行","num"],["local_issuance","地方发行合计","num"],["local_principal_repayment","地方还本","num"],["local_interest_payment","地方付息","num"],["local_net_increase","地方净增","num"],["local_refinancing_share_pct","再融资占比","num"],["treasury_issuance","国债发行（已抓）","num"],["treasury_principal_repayment_lower_bound","国债到期（下限）","num"],["treasury_net_increase_lower_bound","国债净增（下限）","num"],["combined_issuance","两级借款合计","num"],["combined_principal_repayment_lower_bound","两级还本合计（下限）","num"],["combined_net_increase_lower_bound","两级净增（下限）","num"],["data_status","地方数据覆盖","status"],["source_url","地方债原文","source"]]}/></div><div className="module"><ModuleHead title="地方政府债发行与偿付" moduleCode="local_government_debt" onUpdate={update} busy={busy}/><Metrics cards={pressure.cards?.slice(0,10)}/><DataTable title="地方债月度明细" rows={local.slice().reverse()} columns={localCols}/></div><div className="module"><ModuleHead title="国债发行与偿付" moduleCode="treasury_issuance" onUpdate={update} busy={busy}/><Metrics cards={pressure.cards?.slice(10)}/><DataTable title="国债月度实际发行" rows={issueMonthly.slice().reverse()} columns={[['period','期数'],['actual_issue_amount','实际发行额','num'],['records','结果记录数','num']]}/><DataTable title="国债到期还本逐月分布（derived，仅含已抓逐只国债）" rows={(pressure.tables?.treasury_principal_due_monthly||[]).filter(r=>r.month>=new Date().toISOString().slice(0,7))} columns={[['month','到期月'],['principal_due','到期还本额','num'],['bonds','到期只数','num']]}/><DataTable title="已发现但未计入 actual 的国债计划公告" rows={issuePlanned.slice(0,40)} columns={[['issue_date','计划发行日'],['bond_name','债券'],['issue_kind','发行性质'],['planned_issue_amount','计划/额度','num'],['maturity_date','到期日'],['data_status','状态','status'],['source_url','原文','source']]}/><DataTable title="最近国债发行结果与计划" rows={issueDetails.slice(0,40)} columns={[['issue_date','发行日'],['bond_name','债券'],['issue_kind','发行性质'],['actual_issue_amount','实际发行额','num'],['planned_issue_amount','计划发行额','num'],['maturity_date','到期日'],['data_status','状态','status'],['source_url','原文','source']]}/></div></Section>
   <Section id="pboc" section={pboc}><div className="module"><h3>新型流动性工具时间线</h3><div className="banner warn">2024-08—12央行二级市场净买入国债1万亿元后暂停；买断式逆回购自2024-10起接棒，成为主要的中期流动性投放工具。公告缺月不插值，未来余额仅按已知操作到期推算。</div><Chart title="央行二级市场国债买卖—买断式逆回购—对政府债权" subtitle="虚线为按已知买断式逆回购操作到期推算；三者是不同统计口径，仅作量级和时序对照。" data={liquidityTimeline} series={[{key:'omo_cumulative_net_purchase',label:'国债累计净买入',color:'var(--green)'},{key:'buyout_repo_completed_stock',label:'买断式逆回购月末余额',color:'var(--blue)'},{key:'buyout_repo_projected_stock',label:'买断式余额（已知到期推算）',color:'var(--blue)',dash:'6,4'},{key:'claims_on_government',label:'对政府债权',color:'var(--yellow)'}]} unit="亿元"/><div className="charts2"><Chart title="非外汇渠道投放结构：年度12月变动" subtitle="（对政府债权+对其他存款性公司债权）变动与国外资产变动对比；结构描述非因果。" data={nonFxChanges} series={[{key:'non_fx_channel_change',label:'非外汇渠道变动',color:'var(--red)'},{key:'foreign_assets_change',label:'国外资产变动',color:'var(--green)'}]} unit="亿元" showZero={true}/><DataTable title="非外汇渠道年度变动拆分" rows={nonFxChanges.slice().reverse()} columns={[["period","年份"],["claims_on_government_change","对政府债权变动","num"],["other_depository_claims_change","对其他存款性公司债权变动","num"],["non_fx_channel_change","非外汇渠道合计变动","num"],["foreign_assets_change","国外资产变动","num"],["data_status","状态","status"],["source_url","原文","source"]]}/></div></div><div className="module"><ModuleHead title="央行资产负债表 / 货币锚" moduleCode="pboc_balance_sheet" onUpdate={update} busy={busy}/><div className="banner warn">“对政府债权”是央行资产负债表口径，不等于国债余额；资产负债表没有单列地方政府债。</div><Metrics cards={pboc.cards?.slice(0,5)}/><DataTable title="央行资产负债表月度数据" rows={balance.slice().reverse()} columns={[['period','期数'],['total_assets','总资产','num'],['foreign_assets','国外资产','num'],['foreign_exchange','外汇','num'],['claims_on_government','对政府债权','num'],['foreign_assets_pct','国外资产占比','num'],['claims_on_government_pct','对政府债权占比','num'],['source_url','原文','source']]}/><Chart title="央行资产负债表占比趋势" data={balance} series={[{key:'foreign_assets_pct',label:'国外资产占比',color:'var(--blue)'},{key:'foreign_exchange_pct',label:'外汇占比',color:'var(--green)'},{key:'claims_on_government_pct',label:'对政府债权占比',color:'var(--yellow)'},{key:'claims_on_other_depository_corporations_pct',label:'对其他存款性公司债权占比',color:'var(--red)'}]} unit="%"/></div><div className="module"><ModuleHead title="央行公开市场国债买卖" moduleCode="pboc_gov_bond_omo" onUpdate={update} busy={busy}/><Metrics cards={pboc.cards?.slice(5)}/><DataTable title="国债买卖月度公告" rows={omo.slice().reverse()} columns={[['period','期数'],['operation_status','操作状态'],['net_purchase_amount','净买入','num'],['cumulative_net_purchase_amount','累计净买入','num'],['data_status','状态','status'],['published_date','发布日期'],['source_url','原文','source']]}/></div><div className="module"><ModuleHead title="买断式逆回购流动性操作" moduleCode="pboc_buyout_reverse_repo" onUpdate={update} busy={busy}/><div className="muted">该子模块是流动性操作，不是财政部国债发行，也不计入政府债务余额。余额为尚未到期逐笔操作本金之和。</div><Metrics cards={repoCards}/><DataTable title="当前未到期逐笔操作（余额构成）" rows={repoActive} columns={[['buy_date','操作日期'],['amount','金额','num'],['term_months','期限（月）','num'],['term_days','期限（天）','num'],['maturity_date','到期日'],['maturity_date_status','到期日口径','status'],['source_url','原文','source']]}/><DataTable title="已完成月末余额" rows={repoCompleted.slice().reverse()} columns={[['period','期数'],['month_end_date','月末日'],['outstanding_amount','未到期本金余额','num'],['operation_count','未到期笔数','num'],['derived_maturity_count','含推算到期日笔数','num'],['data_status','状态','status'],['source_url','来源集合','source']]}/><DataTable title="未来月末到期路径预测" rows={repoProjection} columns={[['period','预测期'],['month_end_date','月末日'],['outstanding_amount','预测余额','num'],['operation_count','预计未到期笔数','num'],['data_status','状态','status'],['source_url','来源集合','source']]}/><Chart title="月末未到期本金余额趋势（历史实测 + 按已公告操作的到期预测）" data={repoCompleted.concat(repoProjection)} series={[{key:'outstanding_amount',label:'月末未到期本金',color:'var(--blue)'}]} unit="亿元"/></div></Section>
   <Section id="scenario" section={s.scenario_projection||{title:'央行买债压力情景推算',status:'scenario_only'}}><div className="scenario-box"><form onSubmit={runScenario}><div className="form"><div className="field"><label>情景名称</label><input value={form.scenario_name} onChange={e=>setForm({...form,scenario_name:e.target.value})}/></div><div className="field"><label>初始月份</label><input placeholder="留空则使用最新 official 月份" value={form.initial_period} onChange={e=>setForm({...form,initial_period:e.target.value})}/></div><div className="field"><label>初始累计央行国债净买入（亿元）</label><input type="number" placeholder="留空则使用 official 累计值" value={form.initial_cumulative_purchase} onChange={e=>setForm({...form,initial_cumulative_purchase:e.target.value})}/></div><div className="field"><label>假设每季度央行净买入国债（亿元）</label><input required type="number" value={form.quarterly_treasury_purchase} onChange={e=>setForm({...form,quarterly_treasury_purchase:e.target.value})}/></div><div className="field"><label>对比锚</label><select value={form.comparison_anchor} onChange={e=>setForm({...form,comparison_anchor:e.target.value})}><option value="foreign_exchange">外汇资产</option><option value="foreign_assets">国外资产</option><option value="total_assets">央行总资产</option></select></div><div className="field"><label>未来季度数</label><input type="number" min="1" max="40" value={form.quarters} onChange={e=>setForm({...form,quarters:e.target.value})}/></div></div><label className="check"><input type="checkbox" checked={form.local_bond_assumption_enabled} onChange={e=>setForm({...form,local_bond_assumption_enabled:e.target.checked})}/>启用“央行净买入地方债”用户假设</label>{form.local_bond_assumption_enabled&&<><div className="banner warn">央行资产负债表无地方政府债单列项目，此处仅为用户输入的情景假设，不代表官方事实。</div><div className="field"><label>假设每季度央行净买入地方债（亿元）</label><input required type="number" value={form.quarterly_local_bond_purchase} onChange={e=>setForm({...form,quarterly_local_bond_purchase:e.target.value})}/></div></>}<div style={{marginTop:12}}><button className="btn primary" disabled={busy}>运行情景推算</button></div></form>{scenario&&<><div className="banner warn">{scenario.warnings?.join('；')}</div><DataTable title="情景结果" rows={scenario.records} columns={[['period','未来季度'],['cumulative_treasury_purchase','累计国债买入假设','num'],['cumulative_local_bond_purchase','累计地方债买入假设','num'],['cumulative_assumed_purchase','累计买债规模','num'],['comparison_anchor','对比锚'],['anchor_value','锚值','num'],['purchase_to_anchor_pct','累计买债/锚（%）','num'],['data_status','状态','status']]}/></>}</div></Section>
   <Section id="sources" section={s.debug_summary||{title:'数据来源与 Debug',status:'available'}}><div className="actions"><a className="btn primary" href="/fiscal-debt/debug">打开完整 Debug</a><button className="btn" onClick={()=>load().then(()=>setMessage('Debug 已刷新'))}>刷新来源状态</button></div><div className="coverage">{Object.entries(payload.coverage||{}).map(([k,v])=><div className="coverage-item" key={k}><b>{k}</b><br/><span className="muted">{v?.earliest_period||'—'} 至 {v?.latest_period||'—'} · {v?.records??v?.months??0} 条/期</span></div>)}</div><div className="pending">{(debug?.missing_modules||[]).map(m=><div className="pending-item" key={m.module_code}><b>{m.module_code}</b><div className="muted">{m.reason}<br/>下一步来源：{m.next_source}</div></div>)}</div></Section>
  </>}
 </div>
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
