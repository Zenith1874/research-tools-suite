<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>政府债务与央行表内口径</title>
<script src="/vendor/react.min.js"></script>
<script src="/vendor/react-dom.min.js"></script>
<script src="/vendor/babel.min.js"></script>
<style>
:root{--bg:#07111f;--panel:#0d1728;--panel2:#111d31;--bd:#22324b;--text:#e5edf7;--muted:#8ea0b8;--blue:#4f8fff;--amber:#f5a623;--green:#00d4aa;--red:#ff5b78}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif}.wrap{max-width:1480px;margin:0 auto;padding:22px}
.top{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;margin-bottom:14px}h1{font-size:21px;margin:0 0 6px}h2{font-size:15px;margin:0 0 10px}.sub,.small{color:var(--muted);font-size:12px;line-height:1.7}.actions,.tabs{display:flex;gap:8px;flex-wrap:wrap}.btn,.tab{background:var(--panel2);border:1px solid var(--bd);color:var(--text);border-radius:6px;padding:8px 11px;text-decoration:none;font-size:12px;cursor:pointer}.btn:hover,.tab:hover{border-color:var(--blue)}.tab.active{border-color:var(--blue);background:rgba(79,143,255,.15)}
.card{background:var(--panel);border:1px solid var(--bd);border-radius:8px;padding:14px;margin-bottom:12px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}.k{color:var(--muted);font-size:11px;margin-bottom:6px}.v{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums}.meta{font-size:11px;color:var(--muted);line-height:1.6;margin-top:6px}.badge{display:inline-block;border:1px solid var(--bd);border-radius:4px;padding:1px 6px;margin-left:6px;color:var(--muted);font-size:10px}.badge.official{color:#a9efd8;border-color:rgba(0,212,170,.55)}.badge.derived{color:#f8d89b;border-color:rgba(245,166,35,.55)}.badge.missing,.badge.not_available{color:#ffc1cb;border-color:rgba(255,91,120,.55)}.badge.scenario{color:#b9d3ff;border-color:rgba(79,143,255,.55)}
.missing{border-color:rgba(255,91,120,.45);background:rgba(255,91,120,.08);color:#ffc1cb}.note{border-color:rgba(245,166,35,.45);background:rgba(245,166,35,.08);color:#f2d39a}
table{width:100%;border-collapse:collapse;font-size:12px}th,td{padding:8px;border-bottom:1px solid rgba(34,50,75,.65);text-align:left;vertical-align:top}th{color:var(--muted);font-weight:600;white-space:nowrap}.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}.period{white-space:nowrap}.scroll{overflow:auto;border:1px solid rgba(34,50,75,.55);border-radius:8px}.scroll table{min-width:1280px}.link{color:#9ec2ff;text-decoration:none;white-space:nowrap}.link:hover{text-decoration:underline}input,select{background:#081426;border:1px solid var(--bd);border-radius:6px;color:var(--text);padding:7px 9px;width:100%}.form{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}.formula{font-family:ui-monospace,Consolas,monospace;color:#d6e2f5;background:#081426;border:1px solid var(--bd);border-radius:6px;padding:10px;margin-top:8px}.source{max-width:420px;word-break:break-all}
@media(max-width:1000px){.grid,.two,.form{grid-template-columns:1fr}.top{flex-direction:column}}
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const {useEffect,useState}=React;
const tabs=[
  ['overview','总览'],['treasury','国债'],['local','地方政府债'],['lgfv','城投债'],
  ['balance','央行资产负债表'],['omo','央行国债买卖'],['buyoutRepo','买断式逆回购存量'],['gap','财政缺口'],
  ['maturity','到期还本预测'],['scenario','Scenario 推算'],['sources','数据来源与 Debug']
];
const statusName={official:'official',derived:'derived',rough_estimate:'rough_estimate',scenario:'scenario',missing:'missing',not_available:'not_available',cache:'cache',error:'error'};
function fmt(v,d=0){return v===null||v===undefined||Number.isNaN(Number(v))?'—':Number(v).toLocaleString('zh-CN',{maximumFractionDigits:d,minimumFractionDigits:d})}
function pct(v){return fmt(v,2)+'%'}
function Badge({status}){const s=status||'missing';return <span className={'badge '+s}>{statusName[s]||s}</span>}
function SourceLink({url}){return url?<a className="link" href={url} target="_blank">查看原文</a>:<span>—</span>}
function Kpi({name,value,unit='亿元',status,source,period,formula,digits=0}){
  const missing=status==='missing'||status==='not_available'||value===null||value===undefined;
  return <div className={'card '+(missing?'missing':'')}><div className="k">{name}<Badge status={status}/></div>
    <div className="v">{missing?'待接入可靠来源':fmt(value,digits)+(unit||'')}</div>
    <div className="meta">source: {source||'—'} · period: {period||'—'}</div>
    {formula&&<div className="meta">formula: {formula}</div>}
  </div>
}
function SectionNote({children}){return <div className="card note small">{children}</div>}
function App(){
  const [payload,setPayload]=useState(null),[debug,setDebug]=useState(null),[tab,setTab]=useState('overview'),[busy,setBusy]=useState(false),[err,setErr]=useState(null);
  async function load(){setErr(null);const [a,d]=await Promise.all([fetch('/api/fiscal-debt/data'),fetch('/api/fiscal-debt/debug')]);if(!a.ok||!d.ok){setErr('API 返回失败');return}setPayload(await a.json());setDebug(await d.json())}
  async function post(url){setBusy(true);setErr(null);try{const r=await fetch(url,{method:'POST'});if(!r.ok)throw new Error(await r.text());await load()}catch(e){setErr(e.message)}finally{setBusy(false)}}
  useEffect(()=>{load()},[]);
  const s=payload?.sections||{};
  return <div className="wrap">
    <div className="top"><div><h1>政府债务与央行表内口径</h1><div className="sub">国债、地方政府债、城投债、央行资产负债表、央行公开市场国债买卖、财政缺口和 scenario 分开显示。missing 不补数，derived 必须有公式。</div></div>
      <div className="actions"><button className="btn" onClick={load}>刷新</button><button className="btn" disabled={busy} onClick={()=>post('/api/fiscal-debt/update')}>更新地方债</button><button className="btn" disabled={busy} onClick={()=>post('/api/fiscal-debt/mof-treasury-bonds/update')}>更新财政部国债发行</button><button className="btn" disabled={busy} onClick={()=>post('/api/fiscal-debt/pboc-balance-sheet/update')}>更新央行资产负债表</button><button className="btn" disabled={busy} onClick={()=>post('/api/fiscal-debt/pboc-gov-bond-omo/update')}>更新央行国债买卖</button><button className="btn" disabled={busy} onClick={()=>post('/api/fiscal-debt/pboc-buyout-reverse-repo/update')}>更新买断式逆回购</button><a className="btn" href="/fiscal-debt/debug">Debug</a></div></div>
    {err&&<div className="card missing">{err}</div>}
    <div className="tabs">{tabs.map(t=><button key={t[0]} className={'tab '+(tab===t[0]?'active':'')} onClick={()=>setTab(t[0])}>{t[1]}</button>)}</div>
    {tab==='overview'&&<Overview sections={s}/>}
    {tab==='treasury'&&<TreasuryBonds section={s.central_government_debt}/>}
    {tab==='local'&&<LocalDebt section={s.local_government_debt}/>}
    {tab==='lgfv'&&<MissingSection title="城投债" section={s.urban_investment_bonds} fields={payload?.lgfv_debt?.required_fields}/>}
    {tab==='balance'&&<Balance section={s.pboc_balance_sheet}/>}
    {tab==='omo'&&<Omo section={s.pboc_gov_bond_omo}/>}
    {tab==='buyoutRepo'&&<BuyoutRepo section={s.pboc_buyout_reverse_repo}/>}
    {tab==='gap'&&<FiscalGap section={s.fiscal_gap}/>}
    {tab==='maturity'&&<Maturity section={s.maturity_projection}/>}
    {tab==='scenario'&&<Scenario omo={s.pboc_gov_bond_omo} balance={s.pboc_balance_sheet}/>}
    {tab==='sources'&&<Sources payload={payload} debug={debug}/>}
  </div>
}
function Overview({sections}){
  const local=(sections.local_government_debt?.records||[]).slice(-1)[0];
  const bal=sections.pboc_balance_sheet?.latest;
  const omo=sections.pboc_gov_bond_omo?.latest;
  const repo=sections.pboc_buyout_reverse_repo?.latest;
  return <><div className="grid">
    <Kpi name="地方政府债务余额" value={local?.local_debt_balance_total} status={local?'official':'missing'} source={local?.source_name} period={local?.period}/>
    <Kpi name="央行总资产" value={bal?.total_assets} status={bal?'official':'missing'} source={bal?.source_name} period={bal?.period}/>
    <Kpi name="对政府债权占总资产" value={bal?.claims_on_government_pct} unit="%" status={bal?.claims_on_government_pct__status||'missing'} source={bal?.source_name} period={bal?.period} formula={bal?.claims_on_government_pct__formula} digits={2}/>
    <Kpi name="最近月央行国债净买入" value={omo?.net_purchase_amount} status={omo?'official':'missing'} source={omo?.source_name} period={omo?.period}/>
    <Kpi name="买断式逆回购已完成月末存量" value={repo?.outstanding_amount} status={repo?'derived':'missing'} source={repo?.source_name} period={repo?.period} formula={repo?.formula}/>
  </div>
  <SectionNote>国债余额、城投债余额、财政缺口未接入可靠来源前不在总览显示数值。央行“对政府债权”不等于财政部国债余额，也不等于地方政府债务余额。</SectionNote></>
}
function MissingSection({title,section,fields}){return <><Kpi name={title} value={null} status={section?.data_status||'missing'} source="—" period="—"/><SectionNote>{(section?.warnings||[]).join('；')||'待接入可靠来源，未生成 mock 数据。'}</SectionNote><div className="card"><h2>预留字段</h2><table><tbody>{Object.entries(fields||{}).map(([k,v])=><tr key={k}><td>{k}</td><td>{v}</td></tr>)}</tbody></table></div></>}
function TreasuryBonds({section}){const rows=section?.records||[],yearly=section?.yearly||[],monthly=section?.monthly||[],byType=section?.by_type||[],byTerm=section?.by_term||[],byMat=section?.by_maturity_year||[],cov=section?.coverage||{};const y2024=yearly.find(r=>String(r.year)==='2024'),y2025=yearly.find(r=>String(r.year)==='2025'),ytd=section?.current_year_ytd;return <><SectionNote>国债发行明细来自财政部债务管理司“业务公告”具体原文页。页面主口径只汇总 actual_issue_amount；只有发行通知、没有招标结果公告时标为 planned_only，不把 planned 当 actual。</SectionNote><div className="grid"><Kpi name="2024 年国债实际发行" value={y2024?.actual_issue_amount} status={y2024?'official':'missing'} source={section?.source_name} period="2024"/><Kpi name="2025 年国债实际发行" value={y2025?.actual_issue_amount} status={y2025?'official':'missing'} source={section?.source_name} period="2025"/><Kpi name={`${new Date().getFullYear()} 年 YTD 实际发行`} value={ytd?.actual_issue_amount} status={ytd?'official':'missing'} source={section?.source_name} period={new Date().getFullYear()}/><Kpi name="明细记录" value={cov.records} unit="条" status={rows.length?'official':'missing'} source={section?.source_name} period={`${cov.earliest_period||'—'} 至 ${cov.latest_period||'—'}`}/><Kpi name="official 结果公告" value={cov.official_records} unit="条" status={rows.length?'official':'missing'} source={section?.source_name} period="actual"/><Kpi name="planned_only 发行通知" value={cov.planned_only_records} unit="条" status={rows.length?'official':'missing'} source={section?.source_name} period="planned only"/></div><div className="two"><MiniTable title="年度实际发行额" rows={yearly} cols={[['year','年份'],['actual_issue_amount','实际发行额'],['records','记录数']]}/><MiniTable title="按期限汇总" rows={byTerm} cols={[['term','期限'],['actual_issue_amount','实际发行额'],['records','记录数']]}/></div><div className="two"><MiniTable title="月度实际发行额" rows={monthly.slice().reverse()} cols={[['period','月份'],['actual_issue_amount','实际发行额'],['records','记录数']]}/><MiniTable title="未来到期年份" rows={byMat} cols={[['maturity_year','到期年份'],['actual_issue_amount','到期本金'],['records','记录数']]}/></div><div className="card"><h2>按类型/发行性质</h2><div className="scroll"><table><thead><tr><th>年份</th><th>类型</th><th>发行性质</th><th className="num">实际发行额</th><th className="num">记录数</th></tr></thead><tbody>{byType.map((r,i)=><tr key={i}><td>{r.year}</td><td>{r.bond_type}</td><td>{r.issue_kind}</td><td className="num">{fmt(r.actual_issue_amount,1)}</td><td className="num">{fmt(r.records)}</td></tr>)}</tbody></table></div></div><div className="card"><h2>逐只国债发行明细</h2><div className="scroll"><table><thead><tr><th>发行日</th><th>债券名称</th><th>类型</th><th>性质</th><th>期限</th><th className="num">实际发行额</th><th className="num">计划发行额</th><th className="num">票面利率</th><th className="num">中标收益率</th><th className="num">发行价格</th><th>到期日</th><th>status</th><th>发布日期</th><th>原文</th></tr></thead><tbody>{rows.map((r,i)=><tr key={r.source_url+'-'+i}><td>{r.issue_date||'—'}</td><td>{r.bond_name||r.source_title}</td><td>{r.bond_type}</td><td>{r.issue_kind}</td><td>{r.term_days?`${r.term_days}天`:(r.term_years?`${r.term_years}年`:'—')}</td><td className="num">{fmt(r.actual_issue_amount,1)}</td><td className="num">{fmt(r.planned_issue_amount,1)}</td><td className="num">{r.coupon_rate===null?'—':pct(r.coupon_rate)}</td><td className="num">{r.yield_rate===null?'—':pct(r.yield_rate)}</td><td className="num">{fmt(r.issue_price,3)}</td><td>{r.maturity_date||'—'}</td><td><Badge status={r.data_status}/></td><td>{r.published_date||'—'}</td><td><SourceLink url={r.source_url}/></td></tr>)}</tbody></table></div></div></>}
function MiniTable({title,rows,cols}){return <div className="card"><h2>{title}</h2><div className="scroll"><table><thead><tr>{cols.map(c=><th key={c[0]} className={c[0].includes('amount')||c[0]==='records'?'num':''}>{c[1]}</th>)}</tr></thead><tbody>{(rows||[]).map((r,i)=><tr key={i}>{cols.map(([k])=><td key={k} className={typeof r[k]==='number'?'num':''}>{typeof r[k]==='number'?fmt(r[k],k.includes('amount')?1:0):String(r[k]??'—')}</td>)}</tr>)}</tbody></table></div></div>}
function LocalDebt({section}){const rows=section?.records||[];const fields=[['local_bond_issuance_current_month','当月发行'],['local_bond_issuance_ytd','累计发行'],['official_principal_repayment_current_month','当月还本'],['official_interest_payment_current_month','当月付息'],['local_debt_balance_total','债务余额'],['local_general_debt_balance','一般债务'],['local_special_debt_balance','专项债务'],['local_bond_avg_interest_rate','平均利率']];return <><SectionNote>地方政府债来自财政部债务管理司“地方政府债券发行和债务余额情况”月度原文。城投债不纳入此官方地方政府债余额。</SectionNote><div className="scroll"><table><thead><tr><th>期数</th>{fields.map(f=><th className="num" key={f[0]}>{f[1]}</th>)}<th>status</th><th>source</th><th>原文</th></tr></thead><tbody>{rows.slice().reverse().map(r=><tr key={r.period}><td>{r.period}</td>{fields.map(([k])=><td className="num" key={k}>{fmt(r[k],k.includes('rate')?2:0)}</td>)}<td><Badge status={r.data_status==='cache'?'official':r.data_status}/></td><td>{r.source_name}</td><td><SourceLink url={r.source_url}/></td></tr>)}</tbody></table></div></>}
function Balance({section}){const rows=section?.records||[], latest=section?.latest;return <><SectionNote>{(section?.notes||[]).join(' ')}</SectionNote><div className="grid">
  <Kpi name="总资产" value={latest?.total_assets} status={latest?.total_assets__status||section?.data_status} source={latest?.source_name} period={latest?.period}/>
  <Kpi name="国外资产占比" value={latest?.foreign_assets_pct} unit="%" status={latest?.foreign_assets_pct__status} source={latest?.source_name} period={latest?.period} formula={latest?.foreign_assets_pct__formula} digits={2}/>
  <Kpi name="外汇占比" value={latest?.foreign_exchange_pct} unit="%" status={latest?.foreign_exchange_pct__status} source={latest?.source_name} period={latest?.period} formula={latest?.foreign_exchange_pct__formula} digits={2}/>
  <Kpi name="对政府债权占比" value={latest?.claims_on_government_pct} unit="%" status={latest?.claims_on_government_pct__status} source={latest?.source_name} period={latest?.period} formula={latest?.claims_on_government_pct__formula} digits={2}/>
  <Kpi name="对其他存款性公司债权占比" value={latest?.claims_on_other_depository_corporations_pct} unit="%" status={latest?.claims_on_other_depository_corporations_pct__status} source={latest?.source_name} period={latest?.period} formula={latest?.claims_on_other_depository_corporations_pct__formula} digits={2}/>
  <Kpi name="地方债单列" value={null} status="not_available" source="央行资产负债表" period={latest?.period}/>
  </div><div className="card small">最新来源：<SourceLink url={latest?.source_url}/> · {latest?.source_title} · {latest?.published_date}</div><BalanceTable rows={rows}/></>}
function BalanceTable({rows}){const cols=[['period','期数'],['total_assets','总资产'],['foreign_assets','国外资产'],['foreign_exchange','外汇'],['monetary_gold','货币黄金'],['other_foreign_assets','其他国外资产'],['claims_on_government','对政府债权'],['claims_on_other_depository_corporations','对其他存款性公司债权'],['foreign_assets_pct','国外资产占比'],['claims_on_government_pct','对政府债权占比']];return <div className="scroll"><table><thead><tr>{cols.map(c=><th key={c[0]}>{c[1]}</th>)}<th>原文</th></tr></thead><tbody>{rows.slice().reverse().map(r=><tr key={r.period}>{cols.map(([k])=><td key={k} className={k==='period'?'period':'num'}>{k.endsWith('_pct')?pct(r[k]):k==='period'?r[k]:fmt(r[k])}</td>)}<td><SourceLink url={r.source_url}/></td></tr>)}</tbody></table></div>}
function Omo({section}){const rows=section?.records||[], latest=section?.latest;return <><SectionNote>只解析“公开市场国债买卖业务公告”。普通公开市场业务公告、交易公告、逆回购、买断式逆回购和 MLF 不进入此表。累计净买入只基于已抓取 official 月份。</SectionNote><div className="grid"><Kpi name="最近月是否开展" value={latest? (latest.operation_status==='conducted'?1:0):null} unit="" status={latest?'official':'missing'} source={latest?.source_name} period={latest?.period}/><Kpi name="当月净买入" value={latest?.net_purchase_amount} status={latest?'official':'missing'} source={latest?.source_name} period={latest?.period}/><Kpi name="累计净买入" value={latest?.cumulative_net_purchase_amount} status={latest?'official':'missing'} source={latest?.source_name} period={latest?.period}/></div><div className="scroll"><table><thead><tr><th>期数</th><th>操作状态</th><th className="num">净买入</th><th className="num">累计净买入</th><th>买入描述</th><th>卖出描述</th><th>发布日期</th><th>原文</th></tr></thead><tbody>{rows.slice().reverse().map(r=><tr key={r.period}><td>{r.period}</td><td>{r.operation_status}</td><td className="num">{fmt(r.net_purchase_amount)}</td><td className="num">{fmt(r.cumulative_net_purchase_amount)}</td><td>{r.buy_description||'—'}</td><td>{r.sell_description||'—'}</td><td>{r.published_date}</td><td><SourceLink url={r.source_url}/></td></tr>)}</tbody></table></div></>}
function BuyoutRepo({section}){const stocks=section?.records||[], ops=section?.operations||[], announcements=section?.announcements||[], latest=section?.latest, currentProjection=section?.current_month_projection;const tender=announcements.filter(r=>r.announcement_kind==='tender').length,business=announcements.filter(r=>r.announcement_kind==='business').length;return <><SectionNote>买断式逆回购来自中国人民银行“公开市场买断式逆回购业务公告”栏目。公告全集全部归档；只有“招标公告”进入逐笔买入/操作和月末存量测算。“业务公告”保留来源但不重复计入存量。月末存量 = 月末尚未到期的逐笔本金合计；未到月末的当月值只作为预测显示。</SectionNote><div className="grid"><Kpi name="公告全集" value={announcements.length} unit="条" status={announcements.length?'official':'missing'} source="中国人民银行" period="两页栏目"/><Kpi name="招标公告" value={tender} unit="条" status={tender?'official':'missing'} source="中国人民银行" period="可测算"/><Kpi name="业务公告" value={business} unit="条" status={business?'official':'missing'} source="中国人民银行" period="仅归档"/><Kpi name="逐笔买入/操作" value={ops.length} unit="笔" status={ops.length?'official':'missing'} source="中国人民银行" period={ops.slice(-1)[0]?.operation_date}/><Kpi name="最新已完成月末存量" value={latest?.outstanding_amount} status={latest?'derived':'missing'} source={latest?.source_name} period={latest?.period} formula={latest?.formula}/><Kpi name="当前月末预测" value={currentProjection?.outstanding_amount} status={currentProjection?'derived':'missing'} source={currentProjection?.source_name} period={currentProjection?.period} formula={currentProjection?.formula}/><Kpi name="已完成月末未到期笔数" value={latest?.operation_count} unit="笔" status={latest?'derived':'missing'} source={latest?.source_name} period={latest?.period}/><Kpi name="含 derived 到期日笔数" value={latest?.derived_maturity_count} unit="笔" status={latest?'derived':'missing'} source={latest?.source_name} period={latest?.period}/></div><div className="card"><h2>月末存量</h2><div className="scroll"><table><thead><tr><th>期数</th><th>月末日</th><th className="num">存量</th><th className="num">未到期笔数</th><th>未到期买入日期</th><th className="num">derived 到期日笔数</th><th>status</th><th>公式</th></tr></thead><tbody>{stocks.slice().reverse().map(r=><tr key={r.period}><td>{r.period}</td><td>{r.month_end_date}</td><td className="num">{fmt(r.outstanding_amount)}</td><td className="num">{fmt(r.operation_count)}</td><td>{r.active_operation_dates||'—'}</td><td className="num">{fmt(r.derived_maturity_count)}</td><td><Badge status={r.data_status}/></td><td>{r.formula}</td></tr>)}</tbody></table></div></div><div className="card"><h2>逐笔买入/操作</h2><div className="scroll"><table><thead><tr><th>买入/操作日</th><th>买入时间</th><th>到期日</th><th>到期日状态</th><th className="num">金额</th><th>期限</th><th>公告日期</th><th>公告</th><th>原文</th></tr></thead><tbody>{ops.slice().reverse().map(r=><tr key={r.operation_id}><td>{r.buy_date||r.operation_date}</td><td>{r.buy_time||'—'}</td><td>{r.maturity_date}</td><td><Badge status={r.maturity_date_status}/></td><td className="num">{fmt(r.amount)}</td><td>{r.term_months||'—'}个月 / {r.term_days||'—'}天</td><td>{r.published_date||'—'}</td><td>{r.source_title}</td><td><SourceLink url={r.source_url}/></td></tr>)}</tbody></table></div></div><div className="card"><h2>公告全集</h2><div className="scroll"><table><thead><tr><th>页码</th><th>序号</th><th>公告类型</th><th>公告标题</th><th>列表日期</th><th>发布日期</th><th className="num">解析笔数</th><th>状态</th><th>原文</th></tr></thead><tbody>{announcements.map(r=><tr key={r.source_url}><td>{r.list_page_no}</td><td>{r.list_order}</td><td>{r.announcement_kind}</td><td>{r.source_title}</td><td>{r.listed_date||'—'}</td><td>{r.published_date||'—'}</td><td className="num">{fmt(r.parsed_operation_count)}</td><td>{r.parse_status}</td><td><SourceLink url={r.source_url}/></td></tr>)}</tbody></table></div></div></>}
function FiscalGap({section}){return <><Kpi name="财政缺口" value={null} status={section?.data_status||'missing'} source="—" period="—"/><SectionNote>{(section?.warnings||[]).join('；')}</SectionNote><div className="formula">local_fiscal_balance = local_fiscal_revenue_total - local_fiscal_expenditure_total<br/>local_absolute_gap = local_fiscal_balance + central_to_local_transfer</div></>}
function Maturity({section}){return <><Kpi name="未来到期还本" value={null} status={section?.data_status||'rough_estimate'} source="—" period="—"/><SectionNote>{(section?.warnings||[]).join('；')||'逐只债券到期表未接入时，不显示为 official。'}</SectionNote></>}
function Scenario({omo,balance}){const latestOmo=omo?.latest, latestBal=balance?.latest;const [ran,setRan]=useState(false);const [quarters,setQ]=useState(4);const [gov,setGov]=useState('');const [local,setLocal]=useState('');const base=latestOmo?.cumulative_net_purchase_amount||0;const anchor=latestBal?.foreign_exchange||null;const localEnabled=false;let rows=[];if(ran){for(let i=1;i<=Number(quarters||0);i++){const cum=base+i*Number(gov||0)+(localEnabled?i*Number(local||0):0);rows.push({q:i,cum,fx:anchor?cum/anchor*100:null,foreign:latestBal?.foreign_assets?cum/latestBal.foreign_assets*100:null,total:latestBal?.total_assets?cum/latestBal.total_assets*100:null})}}return <><SectionNote>央行买债压力情景推算是 scenario，不是 official。默认不生成；用户点击后只在本页显示，不写入 official observation。央行资产负债表没有地方债单列，地方债买入假设默认禁用。</SectionNote><div className="form"><label className="small">初始月份<input value={latestOmo?.period||''} readOnly/></label><label className="small">初始累计央行国债净买入<input value={base} readOnly/></label><label className="small">假设每季度净买入国债<input value={gov} onChange={e=>setGov(e.target.value)} placeholder="留空为 0"/></label><label className="small">未来季度数<input value={quarters} onChange={e=>setQ(e.target.value)}/></label></div><button className="btn" onClick={()=>setRan(true)}>运行 scenario</button>{ran&&<div className="scroll"><table><thead><tr><th>季度</th><th className="num">累计值</th><th className="num">累计/外汇资产</th><th className="num">累计/国外资产</th><th className="num">累计/总资产</th><th>status</th></tr></thead><tbody>{rows.map(r=><tr key={r.q}><td>Q+{r.q}</td><td className="num">{fmt(r.cum)}</td><td className="num">{pct(r.fx)}</td><td className="num">{pct(r.foreign)}</td><td className="num">{pct(r.total)}</td><td><Badge status="scenario"/></td></tr>)}</tbody></table></div>}</>}
function Sources({payload,debug}){const regs=payload?.source_registry||[];const sources=debug?.recent_source_records||[];return <><div className="card"><h2>来源 registry</h2><table><thead><tr><th>source</th><th>type</th><th>入口</th><th>说明</th></tr></thead><tbody>{regs.map(r=><tr key={r.source_key}><td>{r.source_name}</td><td>{r.source_type}</td><td className="source">{r.entry_url?<a className="link" href={r.entry_url} target="_blank">{r.entry_url}</a>:'待接入'}</td><td>{r.parser_notes}</td></tr>)}</tbody></table></div><div className="card"><h2>最近 source 记录</h2><table><thead><tr><th>type</th><th>status</th><th>title</th><th>date</th><th>url</th><th>error</th></tr></thead><tbody>{sources.map(r=><tr key={r.source_url}><td>{r.source_type}</td><td>{r.status}</td><td>{r.source_title}</td><td>{r.published_date}</td><td className="source"><SourceLink url={r.source_url}/></td><td>{r.error||''}</td></tr>)}</tbody></table></div></>}
ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
