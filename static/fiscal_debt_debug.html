<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>财政债务数据 Debug</title>
<script src="/vendor/react.min.js"></script><script src="/vendor/react-dom.min.js"></script><script src="/vendor/babel.min.js"></script>
<style>
:root{--bg:#07111f;--panel:#0d1728;--panel2:#111d31;--bd:#22324b;--text:#e5edf7;--muted:#8ea0b8;--blue:#4f8fff;--green:#00d4aa;--red:#ff5b78;--yellow:#f5a623}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif}.wrap{max-width:1500px;margin:0 auto;padding:20px}.top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start}.top h1{font-size:21px;margin:0 0 6px}.muted{color:var(--muted);font-size:12px;line-height:1.7}.actions{display:flex;gap:8px;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;min-height:34px;background:var(--panel2);border:1px solid var(--bd);color:var(--text);border-radius:6px;padding:7px 11px;text-decoration:none;font:inherit;font-size:12px;cursor:pointer}.btn:hover{border-color:var(--blue)}.summary{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin:16px 0}.summary-item{background:var(--panel);border:1px solid var(--bd);border-radius:6px;padding:12px}.summary-item b{display:block;font-size:12px;margin-bottom:6px}.section{padding:18px 0;border-top:1px solid var(--bd)}h2{font-size:15px;margin:0 0 10px}.cards{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.card{border:1px solid var(--bd);border-radius:6px;background:var(--panel);padding:12px}.card h3{font-size:12px;margin:0 0 7px}.scroll{overflow:auto;border:1px solid var(--bd);border-radius:6px}table{width:100%;border-collapse:collapse;font-size:11px;min-width:1100px}th,td{padding:8px;border-bottom:1px solid rgba(34,50,75,.65);text-align:left;vertical-align:top}th{color:var(--muted);background:var(--panel);white-space:nowrap}td.num{text-align:right;font-variant-numeric:tabular-nums}.link{color:#9ec2ff;text-decoration:none}.link:hover{text-decoration:underline}.badge{display:inline-block;border:1px solid var(--bd);border-radius:4px;padding:1px 6px;font-size:10px}.badge.success,.badge.official{color:#a9efd8;border-color:rgba(0,212,170,.55)}.badge.partial{color:#f8d89b;border-color:rgba(245,166,35,.55)}.badge.error,.badge.missing{color:#ffc1cb;border-color:rgba(255,91,120,.55)}.empty{padding:16px;color:var(--muted);border:1px dashed var(--bd);border-radius:6px}.error{color:#ffc1cb}@media(max-width:900px){.summary,.cards{grid-template-columns:1fr 1fr}.top{flex-direction:column}}@media(max-width:600px){.wrap{padding:14px}.summary,.cards{grid-template-columns:1fr}}
</style></head><body><div id="root"></div><script type="text/babel">
const {useEffect,useState}=React;
function Link({url}){return url?<a className="link" href={url} target="_blank" rel="noreferrer">查看原文</a>:'—'}
function Badge({status}){return <span className={'badge '+(status||'missing')}>{status||'missing'}</span>}
function Table({rows,columns}){if(!rows?.length)return <div className="empty">暂无记录</div>;return <div className="scroll"><table><thead><tr>{columns.map(c=><th key={c[0]}>{c[1]||c[0]}</th>)}</tr></thead><tbody>{rows.map((r,i)=><tr key={r.id||r.source_url||r.indicator_code+'-'+i}>{columns.map(([k,label,type])=><td key={k} className={type==='num'?'num':''}>{type==='link'?<Link url={r[k]}/>:type==='status'?<Badge status={r[k]}/>:String(r[k]??'—')}</td>)}</tr>)}</tbody></table></div>}
function App(){const [d,setD]=useState(null),[error,setError]=useState('');async function load(){setError('');const r=await fetch('/api/fiscal-debt/debug');if(!r.ok)throw new Error(`HTTP ${r.status}`);setD(await r.json())}useEffect(()=>{load().catch(e=>setError(e.message))},[]);return <div className="wrap">
 <header className="top"><div><h1>财政债务数据 Debug</h1><div className="muted">覆盖、来源、缺失原因、解析错误和更新日志。</div></div><div className="actions"><a className="btn" href="/fiscal-debt">返回政府债务监控</a><a className="btn" href="/">返回首页</a><button className="btn" onClick={()=>load().catch(e=>setError(e.message))}>刷新 Debug</button></div></header>
 {error&&<div className="empty error">{error}</div>}{!d?<div className="empty">正在读取 Debug…</div>:<>
 <div className="summary"><div className="summary-item"><b>最近更新时间</b><span className="muted">{d.last_update_time||'尚无统一更新日志'}</span></div><div className="summary-item"><b>最近成功时间</b><span className="muted">{d.last_success_time||'—'}</span></div><div className="summary-item"><b>最近错误</b><span className="muted">{d.last_error?.error_message||'无'}</span></div><div className="summary-item"><b>数据库</b><span className="muted">{d.database_path}</span></div></div>
 <section className="section"><h2>模块覆盖</h2><div className="cards">{Object.entries(d.coverage||{}).map(([k,v])=><div className="card" key={k}><h3>{k}</h3><div className="muted">记录：{v?.records??v?.months??'—'}<br/>最早：{v?.earliest_period||'—'}<br/>最新：{v?.latest_period||'—'}<br/>缺 source_url：{v?.missing_source_url??'—'}</div></div>)}</div></section>
 <section className="section"><h2>每个指标覆盖与状态</h2><Table rows={d.indicator_coverage||[]} columns={[["module_code","模块"],["indicator_code","指标"],["count","数量","num"],["earliest_period","最早"],["latest_period","最新"],["data_statuses","状态"],["missing_source_url","缺来源","num"]]}/></section>
 <section className="section"><h2>当前 missing 模块及原因</h2><Table rows={d.missing_modules||[]} columns={[["module_code","模块"],["reason","缺失原因"],["next_source","下一步候选来源"]]}/></section>
 <section className="section"><h2>解析错误</h2><Table rows={d.parser_errors||[]} columns={[["source_type","来源类型"],["source_title","标题"],["source_url","原文","link"],["status","状态","status"],["error","错误"],["updated_at","时间"]]}/></section>
 <section className="section"><h2>最近 20 条更新日志</h2><Table rows={d.recent_update_logs||[]} columns={[["module_code","模块"],["status","状态","status"],["source_url","入口","link"],["http_status","HTTP"],["started_at","开始"],["finished_at","结束"],["records_inserted","新增","num"],["records_updated","更新","num"],["error_message","错误"],["warnings","warnings"]]}/></section>
 <section className="section"><h2>最近 20 条来源记录</h2><Table rows={d.recent_source_records||[]} columns={[["source_type","来源类型"],["status","状态","status"],["source_title","标题"],["published_date","发布日期"],["source_url","原文","link"],["parsed_indicators","解析指标"],["error","错误"],["updated_at","更新时间"]]}/></section>
 <section className="section"><h2>最近 20 条 observation</h2><Table rows={d.recent_observation_records||[]} columns={[["module_code","模块"],["indicator_code","指标"],["period","期数"],["value","值","num"],["unit_display","单位"],["data_status","状态","status"],["source_name","来源"],["source_url","原文","link"],["formula","公式"],["updated_at","更新时间"]]}/></section>
 <section className="section"><h2>数据状态分布</h2><Table rows={d.status_counts||[]} columns={[["source_type","来源类型"],["data_status","状态","status"],["is_mock","mock"],["is_seed","seed"],["is_cache","cache"],["records","记录数","num"]]}/></section>
 </>}</div>}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
